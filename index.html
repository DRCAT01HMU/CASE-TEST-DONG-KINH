Giải thích: Ở người cao tuổi, các cơn động kinh có thể biểu hiện một cách không điển hình. Các cơn mất trương lực, co cứng ngắn, hoặc cục bộ phức tạp có thể chỉ biểu hiện bằng một cú ngã đột ngột mà không có các đặc điểm co giật kinh điển. Những "cơn ngã đột ngột" (drop attacks) này là một biểu hiện quan trọng cần được xem xét trong chẩn đoán phân biệt.
Tại sao các lựa chọn khác lại sai: Bệnh Parkinson gây ra các vấn đề về thăng bằng và dáng đi dẫn đến ngã, nhưng không phải là các cơn ngã đột ngột, không giải thích được. MS hiếm khi khởi phát ở tuổi này. Bệnh thần kinh ngoại biên ảnh hưởng đến cảm giác và sức mạnh ở chân nhưng không gây ngã đột ngột.
Câu 2: Bước chẩn đoán nào sau đây có khả năng cung cấp nhiều thông tin nhất để xác định xem các cú ngã có phải do động kinh hay không?
A. Siêu âm động mạch cảnh
B. Điện não đồ kéo dài hoặc theo dõi lưu động 
C. Lặp lại Holter ECG trong 72 giờ
D. Chụp CT cột sống cổ
Đáp án: B
Giải thích: Nếu nghi ngờ các cơn động kinh không được nhận biết là nguyên nhân gây ngã, EEG là công cụ chẩn đoán chính. Vì các phóng điện dạng động kinh có thể không thường xuyên, một EEG kéo dài (ví dụ: 24-72 giờ) hoặc theo dõi EEG lưu động tại nhà sẽ tăng cơ hội ghi lại được các bất thường hoặc thậm chí là một cơn, giúp xác nhận chẩn đoán.
Tại sao các lựa chọn khác lại sai: Các xét nghiệm tim mạch đã âm tính. CT cột sống cổ để đánh giá chấn thương, không phải nguyên nhân.
Câu 3: Nếu bệnh nhân được chẩn đoán là động kinh và bắt đầu điều trị bằng một ASM, mối quan tâm chính về tác dụng phụ của ASM ở nhóm tuổi này là gì?
A. Gây rụng tóc
B. Tăng nguy cơ ngã do an thần và chóng mặt
C. Gây tăng cân nhanh chóng
D. Tương tác với thực phẩm chứa tyramine
Đáp án: B
Giải thích: Người cao tuổi đặc biệt nhạy cảm với các tác dụng phụ lên hệ thần kinh trung ương của ASM như buồn ngủ, chóng mặt và mất thăng bằng. Những tác dụng phụ này có thể làm tăng nguy cơ ngã, chính là vấn đề ban đầu cần điều trị. Do đó, cần bắt đầu với liều rất thấp và tăng liều từ từ ("start low, go slow").
Tại sao các lựa chọn khác lại sai: Các tác dụng phụ khác ít phổ biến hơn và ít gây ra hậu quả tức thì hơn so với nguy cơ ngã.
Câu 4: Bệnh nhân được chẩn đoán động kinh cục bộ và bắt đầu dùng Lamotrigine. Liều khởi đầu và tốc độ tăng liều nên như thế nào so với một người trưởng thành trẻ tuổi?
A. Giống hệt nhau
B. Liều khởi đầu cao hơn nhưng tăng liều chậm hơn
C. Liều khởi đầu thấp hơn và tốc độ tăng liều chậm hơn
D. Liều khởi đầu thấp hơn nhưng tăng liều nhanh hơn
Đáp án: C
Giải thích: Do sự thay đổi về dược động học (giảm thanh thải ở gan và thận) và tăng độ nhạy cảm với các tác dụng phụ, nguyên tắc chung khi kê đơn ASM cho người cao tuổi là bắt đầu với liều thấp hơn liều thông thường của người lớn và tăng liều một cách từ từ, cẩn thận hơn để cải thiện khả năng dung nạp.

TÌNH HUỐNG LÂM SÀNG 46
Bố mẹ của một bé trai 3 tuổi đưa bé đến khám vì những cơn "cười khúc khích" bất thường. Các cơn này xảy ra bất chợt, không có yếu tố khởi phát, trong đó bé phát ra tiếng cười trống rỗng, vô cảm, kéo dài 10-20 giây. Trong cơn, bé không đáp ứng và mắt nhìn vô định. Sau cơn, bé có vẻ hơi bối rối. Bé cũng bắt đầu có dấu hiệu dậy thì sớm.
Câu 1: Loại cơn động kinh hiếm gặp này được gọi là gì?
A. Cơn giật cơ
B. Cơn co thắt
C. Cơn động kinh Gelastic 
D. Cơn động kinh Dacrystic (khóc)
Đáp án: C
Giải thích: Cơn động kinh Gelastic được định nghĩa là các cơn co giật biểu hiện bằng tiếng cười tự động, không phù hợp. Đây là một dạng động kinh cục bộ hiếm gặp. Cơn động kinh Dacrystic là các cơn biểu hiện bằng tiếng khóc.
Tại sao các lựa chọn khác lại sai: Các loại cơn khác có các biểu hiện vận động khác biệt.
Câu 2: Tổn thương não nào có mối liên quan kinh điển với cơn động kinh Gelastic và dậy thì sớm?
A. Xơ hóa hồi hải mã
B. U mô thừa vùng dưới đồi 
C. Loạn sản vỏ não thùy trán
D. Dị dạng cavernoma ở thân não
Đáp án: B
Giải thích: Sự kết hợp của cơn động kinh Gelastic và dậy thì sớm trung ương là dấu hiệu rất đặc trưng của u mô thừa vùng dưới đồi, một tổn thương bẩm sinh lành tính ở sàn não thất ba. Tổn thương này có tính sinh động kinh nội tại và cũng có thể gây rối loạn chức năng nội tiết của trục hạ đồi-yên.
Tại sao các lựa chọn khác lại sai: Các tổn thương khác không gây ra sự kết hợp đặc trưng của các triệu chứng này. Xơ hóa hồi hải mã gây động kinh thùy thái dương. Loạn sản vỏ trán gây động kinh thùy trán.
Câu 3: Phương pháp chẩn đoán hình ảnh nào là tốt nhất để xác định tổn thương nghi ngờ ở bệnh nhân này?
A. Chụp CT sọ não không cản quang
B. Siêu âm xuyên thóp
C. Chụp cộng hưởng từ sọ não
D. Chụp động mạch não xóa nền (DSA)
Đáp án: C
Giải thích: MRI là phương pháp chẩn đoán hình ảnh được lựa chọn để khảo sát các tổn thương não gây động kinh. Nó có độ phân giải mô mềm vượt trội so với CT và có thể xác định rõ các tổn thương nhỏ, tinh vi như u mô thừa vùng dưới đồi.
Tại sao các lựa chọn khác lại sai: CT có thể bỏ sót các tổn thương nhỏ. Siêu âm xuyên thóp không còn hữu ích sau khi thóp đã đóng. DSA dùng để khảo sát mạch máu.
Câu 4: Việc điều trị các cơn động kinh liên quan đến u mô thừa vùng dưới đồi thường có đặc điểm gì?
A. Thường đáp ứng rất tốt với đơn trị liệu bằng Levetiracetam.
B. Thường có tính kháng thuốc cao với các thuốc chống động kinh.
C. Thường tự khỏi khi trẻ đến tuổi dậy thì.
D. Chỉ có thể được điều trị bằng chế độ ăn ketogenic.
Đáp án: B
Giải thích: Các cơn động kinh Gelastic liên quan đến u mô thừa vùng dưới đồi nổi tiếng là khó điều trị và thường kháng với các thuốc chống động kinh. Do đó, các phương pháp điều trị can thiệp như phẫu thuật cắt bỏ, xạ phẫu, hoặc hủy mô bằng laser thường được xem xét sớm để kiểm soát cơn và cải thiện kết quả nhận thức.
Tại sao các lựa chọn khác lại sai: Chúng hiếm khi đáp ứng tốt với đơn trị liệu và không tự khỏi. Chế độ ăn ketogenic có thể được thử nhưng không phải là lựa chọn duy nhất.

TÌNH HUỐNG LÂM SÀNG 47
Một bà mẹ có con trai 7 tuổi bị động kinh kháng thuốc. Cậu bé thường có những cụm cơn co giật cục bộ phức tạp, trong đó cậu có thể bị 3-4 cơn trong vòng vài giờ. Các cơn này không đủ dài để được coi là trạng thái động kinh, nhưng chúng làm cậu bé rất mệt mỏi và làm gián đoạn các hoạt động của gia đình. Bà mẹ muốn có một loại thuốc có thể sử dụng tại nhà để cắt các cụm cơn này.
Câu 1: Thuốc nào sau đây thường được kê đơn dưới dạng "thuốc cấp cứu" để sử dụng tại nhà cho các cụm cơn động kinh?
A. Phenobarbital đường uống
B. Dung dịch Valproate
C. Một loại Benzodiazepine tác dụng nhanh (ví dụ: Midazolam xịt mũi, Diazepam gel trực tràng)
D. Phenytoin viên nhai
Đáp án: C
Giải thích: Các loại benzodiazepine tác dụng nhanh, được bào chế để hấp thu nhanh qua các đường không phải tiêm tĩnh mạch, là lựa chọn tiêu chuẩn cho thuốc cấp cứu tại nhà. Midazolam xịt mũi (intranasal) hoặc đặt niêm mạc má (buccal), và Diazepam gel trực tràng (rectal) là các chế phẩm phổ biến cho phép người chăm sóc có thể cắt một cụm cơn hoặc một cơn co giật kéo dài một cách nhanh chóng và an toàn.
Tại sao các lựa chọn khác lại sai: Các loại thuốc đường uống khác hấp thu quá chậm để có hiệu quả trong việc cắt một cơn cấp tính.
Câu 2: Mục tiêu chính của việc sử dụng thuốc cấp cứu tại nhà là gì?
A. Thay thế cho việc dùng thuốc chống động kinh hàng ngày.
B. Ngăn chặn một cụm cơn tiến triển thành trạng thái động kinh và giảm nhu cầu đến phòng cấp cứu.
C. Chữa khỏi bệnh động kinh.
D. Cải thiện tác dụng của các thuốc chống động kinh khác.
Đáp án: B
Giải thích: Thuốc cấp cứu được sử dụng không thường xuyên để can thiệp sớm vào các cơn co giật kéo dài hoặc các cụm cơn. Mục tiêu là để phá vỡ mô hình co giật, ngăn chặn nó leo thang thành trạng thái động kinh, và do đó tránh được một chuyến đi đến phòng cấp cứu và các can thiệp y tế phức tạp hơn.
Tại sao các lựa chọn khác lại sai: Nó không thay thế thuốc hàng ngày, không chữa khỏi bệnh, và không cải thiện tác dụng của các thuốc khác một cách trực tiếp.
Câu 3: Trước khi kê đơn thuốc cấp cứu, điều quan trọng nhất mà bác sĩ cần làm là gì?
A. Yêu cầu bệnh nhân ngừng một trong các loại thuốc hàng ngày của họ.
B. Cung cấp một "Kế hoạch Hành động Co giật" (Seizure Action Plan) chi tiết cho gia đình.
C. Yêu cầu gia đình ghi lại video của tất cả các cơn co giật.
D. Yêu cầu bệnh nhân nhập viện để dùng liều đầu tiên.
Đáp án: B
Giải thích: Một Kế hoạch Hành động Co giật là một tài liệu quan trọng, được cá nhân hóa, hướng dẫn rõ ràng cho người chăm sóc khi nào và làm thế nào để sử dụng thuốc cấp cứu. Nó định nghĩa chính xác một "cụm cơn" hoặc "cơn kéo dài" đối với bệnh nhân đó, liều lượng thuốc, cách dùng, các bước an toàn cần thực hiện, và khi nào cần gọi cấp cứu ngay cả sau khi đã dùng thuốc.
Tại sao các lựa chọn khác lại sai: Việc thay đổi thuốc hàng ngày là không cần thiết. Ghi video là hữu ích nhưng không phải là điều kiện tiên quyết. Thuốc cấp cứu được thiết kế để sử dụng tại nhà, không cần nhập viện.
Câu 4: Tác dụng phụ tức thời phổ biến nhất của Midazolam xịt mũi là gì?
A. Buồn ngủ và an thần
B. Tăng huyết áp
C. Buồn nôn và nôn
D. Phát ban
Đáp án: A
Giải thích: Giống như tất cả các benzodiazepine, tác dụng phụ phổ biến nhất là ức chế hệ thần kinh trung ương, dẫn đến buồn ngủ và an thần sau khi dùng thuốc. Bệnh nhân cần được theo dõi để đảm bảo đường thở thông thoáng sau khi dùng thuốc.
Tại sao các lựa chọn khác lại sai: Các tác dụng phụ khác không phổ biến. Benzodiazepine thường gây hạ huyết áp nhẹ, không phải tăng.

TÌNH HUỐNG LÂM SÀNG 48
Một người đàn ông 50 tuổi đến khám vì các đợt tái phát kéo dài khoảng 1-2 phút. Cơn bắt đầu bằng cảm giác "khó chịu kỳ lạ ở cổ họng" và cảm giác tim đập rất nhanh. Sau đó, da anh ta trở nên đỏ bừng, và anh cảm thấy buồn nôn dữ dội. Anh hoàn toàn tỉnh táo trong suốt cơn. Khám toàn diện, bao gồm cả khám tim mạch, đều bình thường. MRI sọ não cho thấy một khối u thần kinh đệm cấp thấp ở vùng vỏ não thùy đảo bên phải.
Câu 1: Loại cơn động kinh này được mô tả tốt nhất là gì?
A. Cơn động kinh vận động
B. Cơn động kinh thực vật 
C. Cơn động kinh tâm thần
D. Cơn co cứng
Đáp án: B
Giải thích: Các triệu chứng chính của cơn là các thay đổi trong chức năng của hệ thần kinh tự chủ (thực vật), bao gồm thay đổi nhịp tim (tim đập nhanh), thay đổi vận mạch da (đỏ bừng), và các triệu chứng tiêu hóa (buồn nôn, cảm giác ở họng). Đây là những đặc điểm của một cơn động kinh thực vật.
Tại sao các lựa chọn khác lại sai: Cơn không có các triệu chứng vận động, tâm thần, hoặc co cứng chiếm ưu thế.
Câu 2: Vị trí của khối u ở vỏ não thùy đảo giải thích các triệu chứng của bệnh nhân như thế nào?
A. Vỏ não thùy đảo là trung tâm xử lý thị giác chính.
B. Vỏ não thùy đảo là một trung tâm cấp cao điều hòa các chức năng nội tạng và tự chủ.
C. Vỏ não thùy đảo chịu trách nhiệm cho các cử động vận động phức tạp.
D. Vỏ não thùy đảo không liên quan đến các triệu chứng động kinh.
Đáp án: B
Giải thích: Vỏ não thùy đảo (insula) là một trung tâm quan trọng trong việc tích hợp và điều hòa các cảm giác nội tạng (interoception) và các chức năng của hệ thần kinh tự chủ. Hoạt động động kinh khởi phát từ hoặc lan đến thùy đảo có thể gây ra một loạt các triệu chứng tự chủ và cảm giác nội tạng, chẳng hạn như những triệu chứng mà bệnh nhân này trải qua.
Tại sao các lựa chọn khác lại sai: Vỏ não thùy đảo không phải là trung tâm chính cho thị giác hoặc vận động. Nó có vai trò đã được biết rõ trong động kinh.
Câu 3: Các cơn động kinh thực vật như thế này có thể bị chẩn đoán nhầm với tình trạng nào sau đây?
A. Cơn hoảng sợ 
B. Rối loạn nhịp tim
C. Trào ngược dạ dày thực quản
D. Tất cả các lựa chọn trên
Đáp án: D
Giải thích: Do các triệu chứng nổi bật là tim mạch (tim đập nhanh), tiêu hóa (buồn nôn), và cảm giác (khó chịu ở họng), các cơn động kinh thực vật rất dễ bị nhầm lẫn với các bệnh lý không phải thần kinh. Chúng có thể bị chẩn đoán nhầm là các cơn hoảng sợ, các rối loạn nhịp tim nguyên phát, hoặc các vấn đề về tiêu hóa như trào ngược.
Câu 4: Vì bệnh nhân hoàn toàn tỉnh táo trong cơn, cơn của anh ấy được phân loại là gì theo ILAE 2017?
A. Cơn cục bộ có ý thức 
B. Cơn cục bộ suy giảm ý thức 
C. Cơn toàn thể không vận động
D. Cơn không xác định
Đáp án: A
Giải thích: Vì ý thức (awareness) của bệnh nhân được bảo tồn hoàn toàn trong suốt sự kiện, cơn này được phân loại là một cơn động kinh cục bộ có ý thức.
Tại sao các lựa chọn khác lại sai: Các lựa chọn khác đều ngụ ý có sự suy giảm ý thức hoặc khởi phát toàn thể.

TÌNH HUỐNG LÂM SÀNG 49
Một phụ nữ 40 tuổi bị động kinh cục bộ và chứng đau nửa đầu. Cô cũng bị béo phì (BMI 35 kg/m²) và đang cố gắng giảm cân. Các cơn co giật của cô không được kiểm soát tốt bằng Levetiracetam. Bác sĩ đang xem xét việc thêm vào hoặc chuyển sang một loại thuốc chống động kinh khác.
Câu 1: Dựa trên các bệnh đi kèm của bệnh nhân, việc chuyển sang loại thuốc nào sau đây sẽ có lợi nhất?
A. Valproate
B. Topiramate
C. Pregabalin
D. Carbamazepine
Đáp án: B
Giải thích: Topiramate là một lựa chọn tuyệt vời cho bệnh nhân này vì nó giải quyết cả ba vấn đề: nó là một thuốc chống động kinh phổ rộng hiệu quả cho động kinh cục bộ, nó là một liệu pháp dự phòng đau nửa đầu đã được chứng minh, và một trong những tác dụng phụ phổ biến nhất của nó là giảm cân.
Tại sao các lựa chọn khác lại sai: Valproate cũng có hiệu quả cho động kinh và đau nửa đầu nhưng gây tăng cân đáng kể, điều này không mong muốn ở bệnh nhân béo phì. Pregabalin cũng gây tăng cân và không phải là thuốc điều trị đau nửa đầu hàng đầu. Carbamazepine không có tác dụng dự phòng đau nửa đầu đáng kể.
Câu 2: Nếu bệnh nhân này cũng bị suy gan nặng, loại thuốc nào sau đây nên được TRÁNH?
A. Levetiracetam
B. Gabapentin
C. Valproate
D. Lacosamide
Đáp án: C
Giải thích: Valproate được chuyển hóa phần lớn ở gan và có một cảnh báo "hộp đen" (black box warning) về nguy cơ gây suy gan cấp gây tử vong. Do đó, nó nên được tránh ở những bệnh nhân có bệnh gan nặng từ trước.
Tại sao các lựa chọn khác lại sai: Levetiracetam và Gabapentin được thải trừ chủ yếu qua thận và là những lựa chọn an toàn hơn ở bệnh nhân bệnh gan. Lacosamide cũng được chuyển hóa ở gan nhưng không có độc tính gan nghiêm trọng như Valproate.
Câu 3: Giả sử bệnh nhân có tiền sử sỏi thận. Lựa chọn thuốc ở câu 1 (Topiramate) sẽ trở nên kém hấp dẫn hơn vì lý do gì?
A. Topiramate có thể làm nặng thêm chứng đau nửa đầu.
B. Topiramate gây tăng cân, làm tăng nguy cơ sỏi thận.
C. Topiramate làm tăng nguy cơ hình thành sỏi thận.
D. Topiramate không hiệu quả ở bệnh nhân có sỏi thận.
Đáp án: C
Giải thích: Như đã đề cập trong một TÌNH HUỐNG LÂM SÀNG trước, Topiramate (và Zonisamide) ức chế carbonic anhydrase, làm tăng nguy cơ hình thành sỏi thận. Ở một bệnh nhân đã có tiền sử sỏi thận, việc sử dụng Topiramate sẽ làm tăng nguy cơ tái phát và do đó là một lựa chọn kém mong muốn hơn.
Tại sao các lựa chọn khác lại sai: Topiramate điều trị, không làm nặng thêm, đau nửa đầu. Nó gây giảm cân. Hiệu quả của nó không bị ảnh hưởng bởi sỏi thận.
Câu 4: Việc lựa chọn ASM dựa trên bệnh đi kèm của bệnh nhân là một ví dụ của nguyên tắc điều trị nào?
A. Đơn trị liệu
B. Điều trị cá nhân hóa
C. Bắt đầu thấp, đi chậm
D. Điều trị theo kinh nghiệm
Đáp án: B
Giải thích: Điều trị cá nhân hóa có nghĩa là điều chỉnh việc lựa chọn thuốc không chỉ dựa trên loại động kinh mà còn dựa trên các đặc điểm riêng của bệnh nhân, bao gồm tuổi, giới tính, các bệnh đi kèm, các loại thuốc khác đang dùng, và lối sống. Trong trường hợp này, việc chọn một loại thuốc có lợi cho cả động kinh, đau nửa đầu, và béo phì là một ví dụ điển hình của y học cá nhân hóa.
Tại sao các lựa chọn khác lại sai: Các nguyên tắc khác cũng quan trọng trong điều trị động kinh nhưng không mô tả cụ thể hành động này.

TÌNH HUỐNG LÂM SÀNG 50
Một cặp vợ chồng đến gặp bạn để thảo luận về con trai 18 tuổi của họ, người bị động kinh do một tổn thương loạn sản vỏ não bẩm sinh. Cậu đã không có cơn co giật trong 3 năm khi đang dùng Oxcarbazepine. Cậu sắp vào đại học và muốn ngừng thuốc vì cảm thấy nó làm cậu "chậm chạp". Bố mẹ rất lo lắng về nguy cơ tái phát, đặc biệt là khi cậu sẽ sống xa nhà.
Câu 1: Khi thảo luận về khả năng ngưng thuốc, yếu tố nào trong bệnh sử của bệnh nhân này làm tăng nguy cơ tái phát?
A. Cậu đã không có cơn trong 3 năm.
B. Cậu là nam giới.
C. Động kinh của cậu là động kinh triệu chứng do một tổn thương cấu trúc.
D. Cậu đang được điều trị bằng đơn trị liệu.
Đáp án: C
Giải thích: Trong số các yếu tố tiên lượng, có một nguyên nhân cấu trúc cơ bản cho bệnh động kinh (động kinh triệu chứng) là một trong những yếu tố dự báo mạnh nhất về việc tái phát cơn sau khi ngưng thuốc. Nguy cơ tái phát ở nhóm này cao hơn đáng kể so với những người bị động kinh vô căn.
Tại sao các lựa chọn khác lại sai: Thời gian không có cơn dài và đơn trị liệu là những yếu tố tiên lượng tốt. Giới tính không phải là một yếu tố nguy cơ chính.
Câu 2: Cách tiếp cận tốt nhất của bác sĩ trong cuộc thảo luận này là gì?
A. Quyết định một mình rằng bệnh nhân phải tiếp tục dùng thuốc.
B. Đồng ý ngay lập tức với yêu cầu của bệnh nhân để tôn trọng quyền tự chủ của cậu.
C. Trình bày các rủi ro (tái phát, mất bằng lái, ảnh hưởng đến học tập) và lợi ích (tránh tác dụng phụ) của việc ngưng thuốc và đưa ra quyết định chung với bệnh nhân và gia đình.
D. Nói với bố mẹ rằng quyết định là của họ vì bệnh nhân còn trẻ.
Đáp án: C
Giải thích: Tình huống này đòi hỏi một quá trình ra quyết định chung (shared decision-making). Vai trò của bác sĩ là cung cấp thông tin y tế chính xác về các rủi ro và lợi ích của mỗi lựa chọn, trong khi lắng nghe các giá trị, mục tiêu và mối quan tâm của bệnh nhân (và gia đình). Quyết định cuối cùng nên được đưa ra cùng nhau, cân nhắc tất cả các yếu tố.
Tại sao các lựa chọn khác lại sai: Cách tiếp cận độc đoán (A) hoặc quá thụ động (B) đều không tối ưu. Bệnh nhân 18 tuổi có quyền tự quyết về mặt pháp lý, vì vậy quyết định không hoàn toàn thuộc về bố mẹ (D).
Câu 3: Bệnh nhân nói: "Cháu thà chấp nhận nguy cơ có một cơn co giật còn hơn là tiếp tục cảm thấy chậm chạp mỗi ngày." Bác sĩ nên đáp lại như thế nào?
A. "Đó là một suy nghĩ thiếu chín chắn. Sự an toàn của cháu là quan trọng nhất."
B. "Tôi hiểu rằng các tác dụng phụ đang ảnh hưởng đến chất lượng cuộc sống của anh. Hãy cùng xem xét các lựa chọn, có thể là giảm liều hoặc chuyển sang một loại thuốc khác ít gây buồn ngủ hơn."
C. "Nếu anh ngừng thuốc và bị co giật, đó sẽ là lỗi của anh."
D. "Hầu hết mọi người đều cảm thấy như vậy nhưng họ vẫn tiếp tục dùng thuốc."
Đáp án: B
Giải thích: Câu trả lời này thể hiện sự đồng cảm, xác nhận mối quan tâm của bệnh nhân, và mở ra một cuộc đối thoại về các giải pháp thay thế. Nó cho thấy bác sĩ đang lắng nghe và sẵn sàng làm việc cùng bệnh nhân để tìm ra một giải pháp tốt nhất, có thể không phải là lựa chọn nhị phân giữa việc tiếp tục hoặc ngừng thuốc hoàn toàn.
Tại sao các lựa chọn khác lại sai: Các câu trả lời khác mang tính phán xét, đổ lỗi, hoặc coi nhẹ mối quan tâm của bệnh nhân và sẽ làm tổn hại đến mối quan hệ bác sĩ-bệnh nhân.
Câu 4: Nếu cả nhóm quyết định thử giảm liều Oxcarbazepine, điều quan trọng là phải tư vấn cho bệnh nhân về việc tạm thời điều chỉnh lối sống nào?
A. Tạm thời tránh lái xe
B. Tăng cường tập thể dục nặng
C. Bắt đầu một chế độ ăn nhiều carbohydrate
D. Tránh tiếp xúc với ánh nắng mặt trời
Đáp án: A
Giải thích: Giai đoạn giảm liều và vài tháng sau khi ngừng thuốc hoàn toàn là thời điểm có nguy cơ tái phát cơn cao nhất. Do đó, bệnh nhân nên được tư vấn tạm thời tuân thủ các hạn chế về an toàn giống như sau một cơn co giật đầu tiên, quan trọng nhất là không lái xe, cho đến khi sự ổn định được xác lập lại.
Tại sao các lựa chọn khác lại sai: Các lựa chọn khác không phải là các biện pháp phòng ngừa tiêu chuẩn trong giai đoạn này.

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function parseQuizData(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    const questions = [];
    let currentQ = null;
    let currentMode = 'context';
    let currentContext = "";
    let isBuildingContext = false;

    lines.forEach(line => {
        line = line.replace(/^[\u2022\u00b7\-\*]\s*/, '').trim();
        if (!line) return;

        const isSection = line.match(/^(?:PHẦN|Phần)\s+[I|V|X|\d]+/i);
        if (isSection) {
            currentContext = "";
            isBuildingContext = false;
        }

        const isCaseStart = line.match(/^(?:TÌNH HUỐNG LÂM SÀNG|Case lâm sàng|Tình huống|Case\s*\d+)/i);
        const isQ = line.match(/^(?:Câu|Question)\s*([\d\.]+)[^:\.\-]*[:\.\-]\s*(.*)/i);
        const isOpt = line.match(/^([A-E])[\.\)\:\-\/]\s*(.*)/i);
        const isAns = line.match(/^(?:Đáp án(?: đúng)?|Answer)\s*[:\.\-]?\s*([A-E])/i);

        if (isCaseStart && !isQ) {
            currentContext = line + '\n';
            isBuildingContext = true;
            currentMode = 'context';
            return;
        }

        if (isQ && !isAns) {
            isBuildingContext = false;
            if (currentQ) questions.push(currentQ);
            
            currentQ = { 
                id: questions.length + 1, 
                originalId: isQ[1], 
                context: currentContext.trim(), 
                question: isQ[2] || '', 
                options: {}, 
                answer: '' 
            };
            currentMode = 'question';
            return;
        }

        // Lọc bỏ 100% phần giải thích
        if (isAns && currentQ) {
            currentQ.answer = isAns[1].toUpperCase();
            currentMode = 'skip';
            return;
        }
        
        if (line.match(/^(Giải thích|Tại sao các lựa chọn khác|Tài liệu được biên soạn|Nghiêm cấm sao chép|Đúng:|Sai:)/i)) {
            currentMode = 'skip';
            return;
        }

        if (currentMode === 'skip') return;

        if (isBuildingContext) {
            if (!line.match(/^(TRẮC NGHIỆM|BASEDOW|BỆNH LÝ BASEDOW|HỘI CHỨNG|ĐỘT QUỴ|ĐỘNG KINH|COPD|ĐÁI MÁU|NỘI KHOA|TEAMDRCAT|==========|Tài liệu được|Nghiêm cấm|\[🛑)/i)) {
                currentContext += line + '\n';
            }
            return;
        }

        if (currentQ) {
            if (isOpt) {
                currentQ.options[isOpt[1].toUpperCase()] = isOpt[2].trim();
                currentMode = 'options';
            } else if (currentMode === 'question') {
                currentQ.question += '\n' + line;
            } else if (currentMode === 'options') {
                const keys = Object.keys(currentQ.options);
                if (keys.length > 0) {
                    const lastKey = keys[keys.length - 1];
                    currentQ.options[lastKey] += '\n' + line;
                }
            } 
        }
    });
    if (currentQ) questions.push(currentQ);
    return questions;
}

const playCorrectSound = () => {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.15);
    } catch (e) { console.error(e); }
};

const playIncorrectSound = () => {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.2);
    } catch (e) { console.error(e); }
};

function App() {
    const [appState, setAppState] = useState('intro');
    const [questions, setQuestions] = useState([]);
    const [currentIndex, setCurrentIndex] = useState(0);
    const [answers, setAnswers] = useState({});
    const [flagged, setFlagged] = useState(new Set());
    const [timeRemaining, setTimeRemaining] = useState(0); 
    const [showMatrix, setShowMatrix] = useState(false);
    const [isPaused, setIsPaused] = useState(false);
    const [isDarkMode, setIsDarkMode] = useState(false);
    const [isSoundEnabled, setIsSoundEnabled] = useState(true);
      const [zoomLevel, setZoomLevel] = useState(100);
    
    const scrollContainerRef = useRef(null);

    useEffect(() => {
        const rawData = document.getElementById('quizData').textContent || '';
        const parsedQs = parseQuizData(rawData);
        setQuestions(parsedQs);
        setTimeRemaining(parsedQs.length * 60);
    }, []);

    useEffect(() => {
        if (appState === 'result' && scrollContainerRef.current) {
            scrollContainerRef.current.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }, [appState]);

    useEffect(() => {
        let timer;
        if (appState === 'quiz' && !isPaused && timeRemaining > 0) {
            timer = setInterval(() => setTimeRemaining(p => p - 1), 1000);
        } else if (timeRemaining <= 0 && appState === 'quiz') {
            setAppState('result');
        }
        return () => clearInterval(timer);
    }, [appState, timeRemaining, isPaused]);

    useEffect(() => {
        if (isDarkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
    }, [isDarkMode]);

      useEffect(() => {
          document.documentElement.style.fontSize = `${zoomLevel}%`;
      }, [zoomLevel]);

    const formatTime = (seconds) => {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    };

    const startQuiz = () => {
        if (questions.length === 0) {
            alert("Lỗi tải dữ liệu câu hỏi. Vui lòng kiểm tra lại file data.");
            return;
        }
        setAppState('quiz');
        setAnswers({});
        setFlagged(new Set());
        setTimeRemaining(questions.length * 60);
        setCurrentIndex(0);
        setIsPaused(false);
    };

    const restartQuiz = () => {
        setAppState('intro');
        setAnswers({});
        setFlagged(new Set());
        setTimeRemaining(questions.length * 60);
        setCurrentIndex(0);
        setShowMatrix(false);
        if (scrollContainerRef.current) scrollContainerRef.current.scrollTo({ top: 0 });
    };

    const togglePause = () => {
        if (appState === 'quiz') setIsPaused(!isPaused);
    };

    const handleSelectAnswer = (key) => {
        if (answers[currentIndex] || appState !== 'quiz' || isPaused) return;
        
        const isCorrect = questions[currentIndex].answer === key;
        if (isSoundEnabled) {
            if (isCorrect) {
                playCorrectSound();
            } else {
                playIncorrectSound();
            }
        }
        
        setAnswers(prev => ({ ...prev, [currentIndex]: key }));
    };

    const toggleFlag = () => {
        const newFlagged = new Set(flagged);
        if (newFlagged.has(currentIndex)) newFlagged.delete(currentIndex);
        else newFlagged.add(currentIndex);
        setFlagged(newFlagged);
    };

    const calculateScore = () => questions.reduce((acc, q, i) => (answers[i] === q.answer ? acc + 1 : acc), 0);

    const getEncouragement = () => {
        if (questions.length === 0) return null;
        const score = calculateScore();
        const percent = score / questions.length;
        if (percent >= 0.9) return { title: "Kiến Thức Tuyệt Vời!", text: "Bạn nắm rất vững chuyên đề Nội khoa. Chúc mừng bạn!", icon: "fa-vial-circle-check", color: "text-violet-700 dark:text-violet-300 bg-violet-100 dark:bg-violet-900/40 border-violet-300 dark:border-violet-700" };
        if (percent >= 0.7) return { title: "Kết Quả Khá Tốt!", text: "Kiến thức của bạn hoạt động rất ổn định. Hãy xem lại vài câu sai nhé.", icon: "fa-check-circle", color: "text-fuchsia-600 dark:text-fuchsia-300 bg-fuchsia-50 dark:bg-fuchsia-900/40 border-fuchsia-200 dark:border-fuchsia-700" };
        if (percent >= 0.5) return { title: "Cần Bổ Sung Thêm!", text: "Bạn cần nạp thêm kiến thức để xử lý các câu hỏi phức tạp hơn nhé!", icon: "fa-book-medical", color: "text-orange-600 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/40 border-orange-200 dark:border-orange-700" };
        return { title: "Cần Cố Gắng Hơn!", text: "Đừng nản chí! Hãy ôn tập lại kỹ lý thuyết nhé!", icon: "fa-triangle-exclamation", color: "text-slate-600 dark:text-slate-400 bg-slate-100 dark:bg-slate-800/40 border-slate-300 dark:border-slate-700" };
    };

    const renderBackgroundBlobs = () => (
        <div className="absolute inset-0 overflow-hidden pointer-events-none z-0">
            <div className="absolute top-[-10%] left-[-10%] w-[30rem] h-[30rem] bg-violet-300/30 rounded-full mix-blend-multiply filter blur-[100px] animate-blob dark:bg-violet-900/30 dark:mix-blend-screen"></div>
            <div className="absolute top-[20%] right-[-10%] w-[30rem] h-[30rem] bg-fuchsia-300/30 rounded-full mix-blend-multiply filter blur-[100px] animate-blob animation-delay-2000 dark:bg-fuchsia-900/30 dark:mix-blend-screen"></div>
            <div className="absolute bottom-[-20%] left-[20%] w-[30rem] h-[30rem] bg-pink-300/30 rounded-full mix-blend-multiply filter blur-[100px] animate-blob animation-delay-4000 dark:bg-pink-900/30 dark:mix-blend-screen"></div>
        </div>
    );

    const renderQuizContent = () => {
        if (isPaused) {
            return (
                <div className="glass-panel rounded-3xl p-16 text-center shadow-2xl animate-in fade-in zoom-in duration-300 mt-10 relative z-10">
                    <div className="w-24 h-24 bg-violet-100 dark:bg-violet-900/50 text-violet-600 dark:text-violet-400 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                        <i className="fa-solid fa-pause text-5xl"></i>
                    </div>
                    <h2 className="text-3xl font-black text-slate-800 dark:text-slate-100 mb-4">Bài thi đang tạm dừng</h2>
                    <button onClick={togglePause} className="btn-gradient text-white px-12 py-4 rounded-2xl font-bold text-xl shadow-lg shadow-violet-300/50 dark:shadow-none hover:shadow-violet-400/50 transition-all">Tiếp tục ngay</button>
                </div>
            );
        }

        if (appState === 'result') {
            const msg = getEncouragement();
            return (
                <div className="space-y-8 animate-in slide-in-from-bottom-8 duration-500 mt-4 relative z-10">
                    <div className="glass-panel p-10 md:p-12 rounded-[2rem] text-center shadow-2xl relative overflow-hidden border-t-4 border-t-violet-500">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-violet-500 to-fuchsia-600"></div>
                        <div className="w-28 h-28 bg-gradient-to-br from-violet-500 to-fuchsia-600 text-white rounded-full flex items-center justify-center text-5xl mx-auto mb-6 shadow-[0_0_30px_rgba(139,92,246,0.4)] border-4 border-white dark:border-slate-800">
                            <i className="fa-solid fa-award text-5xl"></i>
                        </div>
                        <h2 className="text-3xl font-black text-slate-800 dark:text-slate-100 mb-6 tracking-tight">HOÀN THÀNH BÀI THI</h2>
                        
                        {msg && (
                            <div className={`p-6 rounded-2xl border mb-8 flex flex-col items-center gap-2 ${msg.color} backdrop-blur-md`}>
                                <i className={`fa-solid ${msg.icon} text-4xl mb-2 opacity-90 drop-shadow-sm`}></i>
                                <h3 className="text-2xl font-black uppercase tracking-wide">{msg.title}</h3>
                                <p className="text-base font-semibold opacity-90 max-w-lg">{msg.text}</p>
                            </div>
                        )}
                        
                        <div className="flex flex-col items-center gap-1 mb-10">
                            <div className="flex items-baseline gap-2">
                                <span className="text-8xl font-black bg-clip-text text-transparent bg-gradient-to-r from-violet-600 to-fuchsia-600 dark:from-violet-400 dark:to-fuchsia-400 tracking-tighter drop-shadow-sm">{calculateScore()}</span>
                                <span className="text-3xl font-bold text-slate-400 dark:text-slate-500">/ {questions.length}</span>
                            </div>
                            <p className="text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest text-sm mt-2">Tổng điểm của bạn</p>
                        </div>
                        
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                            <div className="glass-panel p-5 rounded-2xl border-green-200 dark:border-green-800/50 hover:-translate-y-1 transition-transform duration-300">
                                <p className="text-xs font-black text-green-600 dark:text-green-400 uppercase mb-1 tracking-wider">Đúng</p>
                                <p className="text-3xl font-black text-green-700 dark:text-green-300">{calculateScore()}</p>
                            </div>
                            <div className="glass-panel p-5 rounded-2xl border-red-200 dark:border-red-800/50 hover:-translate-y-1 transition-transform duration-300">
                                <p className="text-xs font-black text-red-600 dark:text-red-400 uppercase mb-1 tracking-wider">Sai</p>
                                <p className="text-3xl font-black text-red-700 dark:text-red-300">{Object.keys(answers).length - calculateScore()}</p>
                            </div>
                            <div className="glass-panel p-5 rounded-2xl border-slate-200 dark:border-slate-600 hover:-translate-y-1 transition-transform duration-300">
                                <p className="text-xs font-black text-slate-500 dark:text-slate-400 uppercase mb-1 tracking-wider">Bỏ qua</p>
                                <p className="text-3xl font-black text-slate-700 dark:text-slate-300">{questions.length - Object.keys(answers).length}</p>
                            </div>
                            <div className="glass-panel p-5 rounded-2xl border-orange-200 dark:border-orange-800/50 hover:-translate-y-1 transition-transform duration-300">
                                <p className="text-xs font-black text-orange-600 dark:text-orange-400 uppercase mb-1 tracking-wider">Có Cờ</p>
                                <p className="text-3xl font-black text-orange-700 dark:text-orange-300">{flagged.size}</p>
                            </div>
                        </div>

                        <div className="mt-8 mb-8 p-6 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 flex items-center gap-3 text-left w-full shadow-sm">
                            <i className="fa-solid fa-file-pdf text-violet-500 text-2xl"></i>
                            <span className="text-sm font-medium text-slate-700 dark:text-slate-300 leading-snug">Bạn có thể tra cứu đáp án chi tiết ở file PDF do <strong>TEAMDRCAT</strong> biên soạn.</span>
                        </div>

                        <div className="flex flex-col sm:flex-row gap-4">
                            <button onClick={restartQuiz} className="flex-1 bg-slate-900 dark:bg-slate-700 hover:bg-slate-800 dark:hover:bg-slate-600 text-white text-lg font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-all duration-300 shadow-xl hover:shadow-slate-500/30 dark:shadow-none uppercase tracking-wide hover:-translate-y-1">
                                <i className="fa-solid fa-rotate-right text-xl"></i> Làm lại bài
                            </button>
                            <button onClick={() => { setAppState('review'); setCurrentIndex(0); }} className="flex-1 bg-violet-100 dark:bg-violet-900/40 hover:bg-violet-200 dark:hover:bg-violet-800/60 text-violet-700 dark:text-violet-300 text-lg font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-all duration-300 uppercase tracking-wide hover:-translate-y-1">
                                <i className="fa-solid fa-eye text-xl"></i> Xem đáp án
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        if (appState === 'review') {
            return (
                <div className="space-y-6 animate-in fade-in duration-300 relative z-10">
                    <div className="glass-panel p-5 rounded-2xl border-l-4 border-l-orange-500 flex items-center justify-between shadow-lg sticky top-0 z-20">
                        <h2 className="text-lg font-black text-orange-600 dark:text-orange-400 uppercase tracking-tight flex items-center gap-2"><i className="fa-solid fa-list-check text-xl"></i> Review Đáp Án</h2>
                    </div>
                    
                    {questions.length > 0 && questions.map((q, index) => {
                        const isSelected = !!answers[index];
                        const isCorrect = answers[index] === q.answer;
                        const isFlagged = flagged.has(index);
                        const showContext = q.context && (index === 0 || q.context !== questions[index - 1].context);
                        
                        let qStatus = <span className="text-slate-500 dark:text-slate-400 font-bold text-sm bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-lg"><i className="fa-solid fa-minus mr-1"></i>Chưa làm</span>;
                        let qTagClass = "px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest text-white shadow-sm bg-slate-400 dark:bg-slate-600";
                        let qBoxClass = "glass-panel rounded-[1.5rem] shadow-lg p-6 md:p-8 relative overflow-hidden";

                        if (isSelected) {
                            if (isCorrect) {
                                qStatus = <span className="text-green-700 dark:text-green-300 font-bold text-sm bg-green-100 dark:bg-green-900/50 px-3 py-1 rounded-lg border border-green-200 dark:border-green-800"><i className="fa-solid fa-check mr-1"></i>Chính xác</span>;
                                qTagClass = "px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest text-white shadow-sm bg-green-500 dark:bg-green-600";
                                qBoxClass = "glass-panel rounded-[1.5rem] shadow-lg border-l-4 border-l-green-500 p-6 md:p-8 relative overflow-hidden";
                            } else {
                                qStatus = <span className="text-red-700 dark:text-red-300 font-bold text-sm bg-red-100 dark:bg-red-900/50 px-3 py-1 rounded-lg border border-red-200 dark:border-red-800"><i className="fa-solid fa-xmark mr-1"></i>Sai</span>;
                                qTagClass = "px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest text-white shadow-sm bg-red-500 dark:bg-red-600";
                                qBoxClass = "glass-panel rounded-[1.5rem] shadow-lg border-l-4 border-l-red-500 p-6 md:p-8 relative overflow-hidden";
                            }
                        }
                        
                        return (
                            <div key={index} id={`review-q-${index}`} className={qBoxClass}>
                                {showContext && (
                                    <div className="medical-record-box rounded-xl p-5 mb-8 shadow-sm text-left">
                                        <div className="flex items-center gap-2 mb-3 border-b border-violet-200 dark:border-violet-800 pb-2">
                                            <i className="fa-solid fa-notes-medical text-violet-600 dark:text-violet-400 text-lg"></i>
                                            <span className="font-black text-violet-800 dark:text-violet-300 uppercase text-sm tracking-wide">TÌNH HUỐNG LÂM SÀNG</span>
                                        </div>
                                        <p className="text-slate-800 dark:text-slate-200 text-lg md:text-xl font-bold leading-relaxed whitespace-pre-wrap">{q.context}</p>
                                    </div>
                                )}
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-3">
                                        <span className={qTagClass}>Câu {q.id}</span>
                                        {isFlagged && <span className="text-orange-600 dark:text-orange-400 font-bold text-sm bg-orange-100 dark:bg-orange-900/50 px-3 py-1 rounded-lg border border-orange-200 dark:border-orange-800"><i className="fa-solid fa-flag mr-1"></i>Đã cờ</span>}
                                        {qStatus}
                                    </div>
                                </div>
                                <h3 className="text-lg md:text-xl font-bold text-slate-800 dark:text-slate-100 leading-relaxed mb-6 whitespace-pre-wrap">{q.question}</h3>
                                <div className="grid gap-3 mb-2">
                                    {['A', 'B', 'C', 'D', 'E'].map(key => {
                                        const label = q.options[key];
                                        if (!label) return null;
                                        
                                        const isUserChoice = answers[index] === key;
                                        const isCorrectOption = q.answer === key;
                                        
                                        let btnClass = "w-full p-4 rounded-xl border border-slate-200/60 dark:border-slate-600/60 text-left flex items-center gap-4 relative bg-white/40 dark:bg-slate-700/40 text-slate-600 dark:text-slate-400 opacity-60 grayscale";
                                        let spanClass = "w-8 h-8 rounded-lg flex items-center justify-center font-bold text-base shrink-0 bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 shadow-sm border border-slate-200 dark:border-slate-600";
                                        
                                        if (isCorrectOption) {
                                            btnClass = "w-full p-4 rounded-xl border-2 text-left flex items-center gap-4 relative bg-violet-50/80 dark:bg-violet-900/30 border-violet-500 dark:border-violet-600 text-violet-800 dark:text-violet-200 shadow-md ring-1 ring-violet-500 opacity-100 grayscale-0";
                                            spanClass = "w-8 h-8 rounded-lg flex items-center justify-center font-bold text-base shrink-0 bg-violet-500 dark:bg-violet-600 text-white shadow-sm border-none";
                                        } else if (isUserChoice) {
                                            btnClass = "w-full p-4 rounded-xl border-2 text-left flex items-center gap-4 relative bg-red-50/80 dark:bg-red-900/30 border-red-400 dark:border-red-600 text-red-800 dark:text-red-200 shadow-md opacity-100 grayscale-0";
                                            spanClass = "w-8 h-8 rounded-lg flex items-center justify-center font-bold text-base shrink-0 bg-red-500 dark:bg-red-600 text-white shadow-sm border-none";
                                        }
                                        
                                        return (
                                            <div key={key} className={btnClass}>
                                                <span className={spanClass}>{key}</span>
                                                <span className="text-base font-medium leading-relaxed flex-1 pr-8 whitespace-pre-wrap">{label}</span>
                                                {isCorrectOption && <i className="fa-solid fa-circle-check text-2xl text-violet-500 dark:text-violet-400 absolute right-4 top-1/2 -translate-y-1/2 drop-shadow-sm"></i>}
                                                {isUserChoice && !isCorrectOption && <i className="fa-solid fa-circle-xmark text-2xl text-red-500 dark:text-red-400 absolute right-4 top-1/2 -translate-y-1/2 drop-shadow-sm"></i>}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        const currentQ = questions[currentIndex];
        const hasAnsweredCurrent = !!answers[currentIndex];
        
        return (
            <div className="space-y-4 relative z-10">
                {questions.length > 0 && currentQ && (
                    <div className="glass-panel rounded-[2rem] shadow-2xl p-6 md:p-8 md:px-10 relative overflow-hidden border-t-4 border-t-violet-500/80">
                        {currentQ.context && (
                            <div className="medical-record-box rounded-2xl p-5 md:p-6 mb-8 shadow-sm text-left animate-in fade-in slide-in-from-top-4 duration-500">
                                <div className="flex items-center gap-3 mb-3 border-b border-violet-200 dark:border-violet-800 pb-3">
                                    <div className="bg-violet-100 dark:bg-violet-900 p-2 rounded-lg">
                                        <i className="fa-solid fa-file-waveform text-violet-600 dark:text-violet-400 text-lg"></i>
                                    </div>
                                    <span className="font-black text-violet-800 dark:text-violet-300 uppercase text-sm tracking-wider">TÌNH HUỐNG LÂM SÀNG (Dùng cho câu {currentQ.id})</span>
                                </div>
                                <p className="text-slate-800 dark:text-slate-200 text-lg md:text-xl font-bold leading-relaxed whitespace-pre-wrap">{currentQ.context}</p>
                            </div>
                        )}
                        <div className="flex justify-between items-center mb-8">
                            <div className="flex items-center gap-2">
                                <span className="bg-gradient-to-r from-violet-500 to-fuchsia-600 text-white px-5 py-2 rounded-xl text-sm font-black uppercase tracking-widest shadow-md">Câu {currentQ.id}</span>
                                <span className="text-slate-500 dark:text-slate-400 font-bold text-xs tracking-widest uppercase ml-1">/ {questions.length}</span>
                            </div>
                            <button onClick={toggleFlag} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold border transition-all duration-300 shadow-sm hover:-translate-y-0.5 ${flagged.has(currentIndex) ? 'bg-orange-100 dark:bg-orange-900/60 border-orange-400 text-orange-600 dark:text-orange-400' : 'bg-white/80 dark:bg-slate-800/80 border-slate-200/80 dark:border-slate-600/80 text-slate-500 hover:text-slate-700 dark:hover:text-slate-200 hover:border-slate-300 dark:hover:border-slate-500'}`}>
                                <i className={`fa-solid fa-flag text-sm ${flagged.has(currentIndex) ? 'animate-pulse' : ''}`}></i>
                                <span>Đánh dấu cờ</span>
                            </button>
                        </div>
                        <h3 className="text-lg md:text-xl font-bold text-slate-800 dark:text-slate-100 leading-relaxed mb-8 whitespace-pre-wrap drop-shadow-sm">{currentQ.question}</h3>
                        <div className="grid gap-4">
                            {['A', 'B', 'C', 'D', 'E'].map(key => {
                                const label = currentQ.options[key];
                                if (!label) return null;
                                
                                const isSelected = answers[currentIndex] === key;
                                const isCorrect = currentQ.answer === key;
                                const showAnswerState = hasAnsweredCurrent;
                                
                                let btnClass = "group w-full p-4 md:p-5 rounded-2xl border border-white/60 dark:border-slate-600/50 text-left flex items-center gap-4 option-transition relative bg-white/70 dark:bg-slate-800/70 hover:border-violet-400 dark:hover:border-violet-500 hover:bg-white dark:hover:bg-slate-800 shadow-sm hover:shadow-lg transform hover:-translate-y-1 active:scale-[0.98]";
                                let spanClass = "w-10 h-10 rounded-xl flex items-center justify-center font-black text-base shrink-0 transition-all duration-300 bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 shadow-sm group-hover:bg-violet-500 dark:group-hover:bg-violet-600 group-hover:text-white border border-slate-200 dark:border-slate-600 group-hover:border-transparent";
                                
                                if (showAnswerState) {
                                    if (isCorrect) {
                                        btnClass = "group w-full p-4 md:p-5 rounded-2xl border-2 text-left flex items-center gap-4 option-transition relative bg-green-50/95 dark:bg-green-900/40 border-green-500 dark:border-green-500 text-green-900 dark:text-green-100 shadow-md ring-4 ring-green-500/20 transform scale-[1.02] z-10";
                                        spanClass = "w-10 h-10 rounded-xl flex items-center justify-center font-black text-base shrink-0 transition-all bg-green-500 dark:bg-green-500 text-white shadow-sm border-none";
                                    } else if (isSelected) {
                                        btnClass = "group w-full p-4 md:p-5 rounded-2xl border-2 text-left flex items-center gap-4 option-transition relative bg-red-50/95 dark:bg-red-900/40 border-red-400 dark:border-red-500 text-red-900 dark:text-red-100 shadow-md ring-4 ring-red-500/20";
                                        spanClass = "w-10 h-10 rounded-xl flex items-center justify-center font-black text-base shrink-0 transition-all bg-red-500 dark:bg-red-500 text-white shadow-sm border-none";
                                    } else {
                                        btnClass = "group w-full p-4 md:p-5 rounded-2xl border text-left flex items-center gap-4 option-transition relative border-slate-200/50 dark:border-slate-700/50 bg-white/30 dark:bg-slate-800/30 text-slate-500 dark:text-slate-500 opacity-50 grayscale";
                                        spanClass = "w-10 h-10 rounded-xl flex items-center justify-center font-black text-base shrink-0 transition-all bg-slate-100/50 dark:bg-slate-700/50 text-slate-400 dark:text-slate-500 shadow-none border border-slate-200/50 dark:border-slate-700/50";
                                    }
                                }
                                
                                return (
                                    <button key={key} onClick={() => handleSelectAnswer(key)} disabled={showAnswerState} className={btnClass}>
                                        <span className={spanClass}>{key}</span>
                                        <span className="text-base font-semibold leading-relaxed flex-1 pr-8 whitespace-pre-wrap dark:text-slate-200">{label}</span>
                                        {showAnswerState && isCorrect && <i className="fa-solid fa-circle-check text-3xl text-violet-500 dark:text-violet-400 absolute right-5 top-1/2 -translate-y-1/2 drop-shadow-md animate-in zoom-in duration-300"></i>}
                                        {showAnswerState && isSelected && !isCorrect && <i className="fa-solid fa-circle-xmark text-3xl text-red-500 dark:text-red-400 absolute right-5 top-1/2 -translate-y-1/2 drop-shadow-md animate-in zoom-in duration-300"></i>}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                )}

                {questions.length > 0 && (
                    <div className="flex items-center justify-between gap-4 pt-6 pb-20 md:pb-4 relative z-10">
                        <button onClick={() => setCurrentIndex(p => Math.max(0, p - 1))} disabled={currentIndex === 0} className="flex-1 glass-panel px-6 py-4 rounded-2xl font-bold text-slate-600 dark:text-slate-300 hover:text-violet-600 dark:hover:text-violet-400 hover:border-violet-300 dark:hover:border-violet-600 disabled:opacity-0 transition-all duration-300 flex items-center justify-center gap-2 uppercase tracking-wide text-sm shadow-sm hover:shadow-md hover:-translate-y-1">
                            <i className="fa-solid fa-arrow-left text-base"></i> 
                            <span className="hidden sm:inline">Câu trước</span>
                        </button>
                        <button onClick={() => setCurrentIndex(p => Math.min(questions.length - 1, p + 1))} disabled={currentIndex === questions.length - 1} className="flex-1 btn-gradient text-white px-6 py-4 rounded-2xl font-bold transition-all duration-300 shadow-lg hover:shadow-violet-500/40 flex items-center justify-center gap-2 uppercase tracking-wide text-sm hover:-translate-y-1">
                            <span className="hidden sm:inline">Câu tiếp</span> 
                            <i className="fa-solid fa-arrow-right text-base"></i>
                        </button>
                    </div>
                )}
            </div>
        );
    };

    if (appState === 'intro') {
        return (
            <div className="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
                {renderBackgroundBlobs()}
                <div className="absolute top-4 right-4 z-50 flex gap-3">
                    <button onClick={() => setIsSoundEnabled(!isSoundEnabled)} className="p-3 glass-panel shadow-lg rounded-full hover:bg-white/90 dark:hover:bg-slate-700/90 transition-all duration-300 text-slate-600 dark:text-slate-300 hover:scale-110">
                        {isSoundEnabled ? <i className="fa-solid fa-volume-high text-xl text-violet-500"></i> : <i className="fa-solid fa-volume-xmark text-xl text-slate-400"></i>}
                    </button>
                    <button onClick={() => setZoomLevel(prev => Math.min(prev + 10, 150))} title="Phóng to" className="p-3 glass-panel shadow-lg rounded-full hover:bg-white/90 dark:hover:bg-slate-700/90 transition-all duration-300 text-slate-600 dark:text-slate-300 hover:scale-110">
                          <i className="fa-solid fa-magnifying-glass-plus text-xl text-emerald-500"></i>
                      </button>
                      <button onClick={() => setZoomLevel(prev => Math.max(prev - 10, 50))} title="Thu nhỏ" className="p-3 glass-panel shadow-lg rounded-full hover:bg-white/90 dark:hover:bg-slate-700/90 transition-all duration-300 text-slate-600 dark:text-slate-300 hover:scale-110">
                          <i className="fa-solid fa-magnifying-glass-minus text-xl text-pink-500"></i>
                      </button>
                      <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-3 glass-panel shadow-lg rounded-full hover:bg-white/90 dark:hover:bg-slate-700/90 transition-all duration-300 text-slate-600 dark:text-slate-300 hover:scale-110">
                        {isDarkMode ? <i className="fa-solid fa-sun text-xl text-amber-500"></i> : <i className="fa-solid fa-moon text-xl text-violet-500"></i>}
                    </button>
                </div>
                <div className="max-w-2xl w-full glass-panel rounded-[2.5rem] shadow-2xl overflow-hidden relative z-10 border-t border-l border-white/80 dark:border-slate-700/50 animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <div className="p-12 pb-8 flex flex-col items-center text-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-violet-500/10 to-fuchsia-600/10 dark:from-violet-900/20 dark:to-fuchsia-900/20 pointer-events-none"></div>
                        <div className="w-24 h-24 bg-white dark:bg-slate-800 rounded-full mb-6 shadow-xl border border-violet-100 dark:border-slate-700 flex items-center justify-center relative group">
                            <div className="absolute inset-0 bg-violet-400 rounded-full opacity-20 group-hover:scale-150 transition-transform duration-700"></div>
                            <i className="fa-solid fa-staff-snake text-5xl bg-clip-text text-transparent bg-gradient-to-br from-violet-500 to-fuchsia-600 drop-shadow-sm text-violet-500"></i>
                        </div>
                        <h1 className="text-4xl md:text-5xl font-black uppercase tracking-tighter mb-3 z-10 bg-clip-text text-transparent bg-gradient-to-r from-violet-600 to-fuchsia-600 dark:from-violet-400 dark:to-fuchsia-400 drop-shadow-sm">NỘI KHOA LÂM SÀNG</h1>
                        <p className="text-violet-700 dark:text-violet-300 text-lg font-bold tracking-widest uppercase z-10 opacity-80">CHUYÊN ĐỀ: ĐỘNG KINH</p>
                    </div>
                    <div className="p-10 pt-2 bg-white/40 dark:bg-slate-900/40 backdrop-blur-md">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                            <div className="flex items-center gap-4 bg-white/70 dark:bg-slate-800/70 p-5 rounded-2xl border border-white/50 dark:border-slate-700/50 shadow-sm transition-transform duration-300 hover:-translate-y-1 hover:shadow-md">
                                <div className="bg-violet-100 dark:bg-violet-900/50 w-12 h-12 flex items-center justify-center rounded-xl text-violet-600 dark:text-violet-400 shadow-inner"><i className="fa-solid fa-layer-group text-xl"></i></div>
                                <div><p className="text-[10px] text-slate-500 dark:text-slate-400 font-black uppercase tracking-widest mb-1">Tổng câu hỏi</p><p className="text-2xl font-black text-slate-800 dark:text-slate-100 leading-none">{questions.length}</p></div>
                            </div>
                            <div className="flex items-center gap-4 bg-white/70 dark:bg-slate-800/70 p-5 rounded-2xl border border-white/50 dark:border-slate-700/50 shadow-sm transition-transform duration-300 hover:-translate-y-1 hover:shadow-md">
                                <div className="bg-fuchsia-100 dark:bg-fuchsia-900/50 w-12 h-12 flex items-center justify-center rounded-xl text-fuchsia-600 dark:text-fuchsia-400 shadow-inner"><i className="fa-regular fa-hourglass-half text-xl"></i></div>
                                <div><p className="text-[10px] text-slate-500 dark:text-slate-400 font-black uppercase tracking-widest mb-1">Thời gian</p><p className="text-2xl font-black text-slate-800 dark:text-slate-100 leading-none">{questions.length} Phút</p></div>
                            </div>
                        </div>
                        <div className="bg-violet-50/80 dark:bg-violet-900/20 rounded-2xl p-6 mb-10 border border-violet-100 dark:border-violet-800/30 flex items-start gap-4 text-violet-900 dark:text-violet-100 shadow-inner">
                            <i className="fa-solid fa-circle-info shrink-0 mt-0.5 text-2xl text-fuchsia-600 dark:text-fuchsia-400"></i>
                            <div className="text-base leading-relaxed font-medium">
                                <p className="font-bold mb-3 text-fuchsia-800 dark:text-fuchsia-300 text-lg">Hướng dẫn làm bài:</p>
                                <ul className="list-disc pl-5 space-y-2 opacity-90 marker:text-fuchsia-600 dark:marker:text-fuchsia-400">
                                    <li>Kết quả đúng/sai sẽ hiển thị <strong className="text-fuchsia-900 dark:text-fuchsia-200 font-bold">ngay lập tức</strong> khi chọn.</li>
                                    <li>Khi đã chọn, bạn <strong className="text-fuchsia-900 dark:text-fuchsia-200 font-bold">không thể thay đổi</strong> đáp án của câu đó.</li>
                                    <li>Sử dụng nút <strong className="text-fuchsia-900 dark:text-fuchsia-200 font-bold">Đánh dấu cờ</strong> để lưu lại những câu khó.</li>
                                    <li>Được biên soạn bởi <strong className="text-fuchsia-900 dark:text-fuchsia-200 font-bold">TEAMDRCAT</strong>.</li>
                                </ul>
                            </div>
                        </div>
                        <button onClick={startQuiz} className="w-full btn-gradient text-white text-xl font-black py-5 rounded-2xl transition-all duration-300 shadow-[0_10px_20px_-10px_rgba(139,92,246,0.6)] hover:shadow-[0_15px_25px_-10px_rgba(139,92,246,0.8)] flex items-center justify-center gap-3 uppercase tracking-widest hover:-translate-y-1 active:scale-95 border border-white/20">
                            <i className="fa-solid fa-rocket text-xl"></i> Bắt đầu ngay
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    return (
        <div className="min-h-screen flex flex-col md:flex-row relative bg-animated">
            {renderBackgroundBlobs()}
            {showMatrix && <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 md:hidden transition-opacity" onClick={() => setShowMatrix(false)}></div>}
            
            <aside className={`fixed md:sticky top-0 right-0 h-screen w-[320px] md:w-[400px] glass-panel z-50 flex flex-col transition-transform duration-500 ease-in-out ${showMatrix ? 'translate-x-0' : 'translate-x-full md:translate-x-0'} md:order-2 shadow-[-10px_0_30px_rgba(0,0,0,0.05)] dark:shadow-none border-l border-white/40 dark:border-slate-700/50`}>
                <div className="p-6 border-b border-slate-200/50 dark:border-slate-700/50 flex justify-between items-center bg-white/40 dark:bg-slate-800/40 backdrop-blur-md sticky top-0 z-10">
                    <h2 className="font-black text-slate-800 dark:text-slate-100 flex items-center gap-3 uppercase tracking-tighter text-base"><div className="w-8 h-8 rounded-lg bg-violet-100 dark:bg-violet-900/50 flex items-center justify-center text-violet-600 dark:text-violet-400"><i className="fa-solid fa-grip"></i></div> Bảng câu hỏi</h2>
                    <button className="md:hidden text-slate-500 p-2 bg-white/50 dark:bg-slate-700/50 rounded-full hover:bg-white dark:hover:bg-slate-600 transition-colors shadow-sm" onClick={() => setShowMatrix(false)}><i className="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div className="flex-1 overflow-y-auto p-6 custom-scrollbar grid grid-cols-5 gap-3 content-start">
                    {questions.map((q, i) => {
                        let navBtnClass = "h-12 w-full rounded-xl text-sm font-black border transition-all duration-300 relative flex items-center justify-center hover:brightness-95 bg-white/60 dark:bg-slate-700/60 text-slate-500 border-white/50 dark:border-slate-600/50 dark:text-slate-300 shadow-sm hover:-translate-y-1 hover:shadow-md";
                        if (!!answers[i]) {
                            if (answers[i] === q.answer) {
                                navBtnClass = "h-12 w-full rounded-xl text-sm font-black border-2 transition-all duration-300 relative flex items-center justify-center hover:brightness-95 bg-green-100/90 dark:bg-green-900/60 text-green-700 dark:text-green-300 border-green-400/50 dark:border-green-600/50 shadow-sm hover:-translate-y-1";
                            } else {
                                navBtnClass = "h-12 w-full rounded-xl text-sm font-black border-2 transition-all duration-300 relative flex items-center justify-center hover:brightness-95 bg-red-100/90 dark:bg-red-900/60 text-red-700 dark:text-red-300 border-red-400/50 dark:border-red-600/50 shadow-sm hover:-translate-y-1";
                            }
                        }
                        if (currentIndex === i && appState !== 'review') {
                            navBtnClass += " ring-4 ring-violet-500/30 ring-offset-1 dark:ring-offset-slate-800 scale-105 z-10";
                        }
                        if (flagged.has(i)) {
                            navBtnClass += " !border-orange-400 dark:!border-orange-500 !bg-orange-100/90 dark:!bg-orange-900/50 text-orange-700 dark:text-orange-400";
                        }
                        return (
                            <button 
                                key={i} 
                                onClick={() => { 
                                    if (appState === 'review') { 
                                        const target = document.getElementById(`review-q-${i}`); 
                                        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
                                    } else { 
                                        setCurrentIndex(i); 
                                    } 
                                    if (window.innerWidth < 768) setShowMatrix(false); 
                                }} 
                                className={navBtnClass}
                            >
                                {i + 1}
                                {flagged.has(i) && <div className="absolute -top-2 -right-2 w-5 h-5 bg-gradient-to-br from-orange-400 to-red-500 rounded-full border border-white dark:border-slate-800 shadow-md flex items-center justify-center text-white text-[10px]"><i className="fa-solid fa-flag"></i></div>}
                            </button>
                        );
                    })}
                </div>
                <div className="p-6 border-t border-slate-200/50 dark:border-slate-700/50 bg-white/40 dark:bg-slate-800/40 backdrop-blur-md z-10">
                    {appState === 'quiz' ? (
                        <button onClick={() => setAppState('result')} className="w-full btn-gradient text-white font-black py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 uppercase tracking-widest hover:shadow-violet-500/40 transition-all hover:-translate-y-1"><i className="fa-solid fa-paper-plane text-lg"></i> Nộp bài ngay</button>
                    ) : (
                        <button onClick={restartQuiz} className="w-full bg-slate-800 dark:bg-slate-700 text-white font-black py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-900 dark:hover:bg-slate-600 transition-colors shadow-md hover:-translate-y-1"><i className="fa-solid fa-rotate-right text-lg"></i> Làm lại từ đầu</button>
                    )}
                </div>
            </aside>

            <main className="flex-1 flex flex-col h-screen md:order-1 overflow-hidden relative z-10">
                <header className="glass-panel border-b border-white/50 dark:border-slate-700/50 px-6 py-4 flex items-center justify-between sticky top-0 z-30 shadow-sm rounded-none">
                    <div className="flex items-center gap-4">
                        <div className="w-12 h-12 btn-gradient rounded-2xl flex items-center justify-center text-white shadow-lg shadow-violet-200/50 dark:shadow-none"><i className="fa-solid fa-staff-snake text-2xl"></i></div>
                        <div className="hidden sm:block"><h1 className="text-sm font-black text-slate-800 dark:text-slate-100 uppercase tracking-tight drop-shadow-sm">NỘI KHOA: ĐỘNG KINH</h1><p className="text-[10px] text-violet-600 dark:text-violet-400 font-bold uppercase tracking-widest mt-0.5">Tài liệu bởi TeamDrCat</p></div>
                    </div>
                    <div className="flex items-center gap-2 sm:gap-4">
                        <button onClick={() => setIsSoundEnabled(!isSoundEnabled)} className="p-2.5 bg-white/60 dark:bg-slate-700/60 rounded-xl hover:bg-white dark:hover:bg-slate-600 transition-colors text-slate-600 dark:text-slate-300 border border-white/40 dark:border-slate-600/50 shadow-sm">
                            {isSoundEnabled ? <i className="fa-solid fa-volume-high text-lg text-violet-500"></i> : <i className="fa-solid fa-volume-xmark text-lg text-slate-400"></i>}
                        </button>
                        <button onClick={() => setZoomLevel(prev => Math.min(prev + 10, 150))} title="Phóng to" className="p-2.5 bg-white/60 dark:bg-slate-700/60 rounded-xl hover:bg-white dark:hover:bg-slate-600 transition-colors text-slate-600 dark:text-slate-300 border border-white/40 dark:border-slate-600/50 shadow-sm">
                              <i className="fa-solid fa-magnifying-glass-plus text-lg text-emerald-500"></i>
                          </button>
                          <button onClick={() => setZoomLevel(prev => Math.max(prev - 10, 50))} title="Thu nhỏ" className="p-2.5 bg-white/60 dark:bg-slate-700/60 rounded-xl hover:bg-white dark:hover:bg-slate-600 transition-colors text-slate-600 dark:text-slate-300 border border-white/40 dark:border-slate-600/50 shadow-sm">
                              <i className="fa-solid fa-magnifying-glass-minus text-lg text-pink-500"></i>
                          </button>
                          <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2.5 bg-white/60 dark:bg-slate-700/60 rounded-xl hover:bg-white dark:hover:bg-slate-600 transition-colors text-slate-600 dark:text-slate-300 border border-white/40 dark:border-slate-600/50 shadow-sm">
                            {isDarkMode ? <i className="fa-solid fa-sun text-lg text-amber-500"></i> : <i className="fa-solid fa-moon text-lg text-violet-500"></i>}
                        </button>
                        {appState === 'quiz' && (
                            <React.Fragment>
                                <div className={`px-4 py-2 rounded-xl font-mono text-lg font-black border flex items-center gap-2 shadow-sm transition-colors ${timeRemaining < 300 ? 'bg-red-50/90 dark:bg-red-900/50 border-red-300 dark:border-red-700 text-red-600 dark:text-red-400 animate-pulse' : 'bg-white/60 dark:bg-slate-700/60 border-white/50 dark:border-slate-600/50 text-violet-700 dark:text-violet-300'}`}>
                                    <i className="fa-regular fa-clock"></i> {formatTime(timeRemaining)}
                                </div>
                                <button onClick={togglePause} className="p-2.5 bg-white/60 dark:bg-slate-700/60 rounded-xl hover:bg-white dark:hover:bg-slate-600 transition-colors text-violet-600 dark:text-violet-400 border border-white/40 dark:border-slate-600/50 shadow-sm">
                                    {isPaused ? <i className="fa-solid fa-play text-lg"></i> : <i className="fa-solid fa-pause text-lg"></i>}
                                </button>
                            </React.Fragment>
                        )}
                        {appState === 'review' && <div className="px-4 py-2 rounded-xl font-black bg-amber-100/90 dark:bg-amber-900/50 text-amber-700 dark:text-amber-400 flex items-center gap-2 border border-amber-300/50 dark:border-amber-700/50 shadow-sm"><i className="fa-solid fa-eye"></i> <span className="hidden sm:inline uppercase text-xs tracking-wider">Xem lại</span></div>}
                        <button className="md:hidden bg-white/60 dark:bg-slate-700/60 text-violet-600 dark:text-violet-400 p-2.5 rounded-xl flex items-center justify-center border border-white/40 dark:border-slate-600/50 shadow-sm" onClick={() => setShowMatrix(true)}><i className="fa-solid fa-bars text-lg"></i></button>
                    </div>
                </header>

                <div ref={scrollContainerRef} className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar relative z-0">
                    <div className="max-w-4xl mx-auto w-full pb-8">
                        {renderQuizContent()}
                    </div>
                </div>
            </main>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
