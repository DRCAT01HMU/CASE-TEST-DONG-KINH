Giải thích: Trong trường hợp hạ natri máu do thuốc, bước đầu tiên là xác định và ngừng các thuốc gây bệnh. Vì cả hai loại thuốc đều có thể là nguyên nhân, việc tạm ngưng cả hai là hợp lý. Hạn chế dịch là biện pháp điều trị chính cho hạ natri máu do SIADH hoặc các tình trạng tương tự. Truyền muối ưu trương chỉ dành cho các trường hợp hạ natri máu nặng có triệu chứng thần kinh cấp tính (co giật, hôn mê).
Tại sao các lựa chọn khác lại sai: Truyền muối ưu trương có thể không cần thiết và có nguy cơ gây hội chứng hủy myelin thẩm thấu nếu điều chỉnh natri quá nhanh. Demeclocycline là một lựa chọn điều trị cho SIADH mạn tính, không phải là điều trị cấp cứu. Tiếp tục dùng thuốc sẽ làm tình trạng tồi tệ hơn.
Câu 3: Nếu bệnh nhân cần một ASM thay thế cho động kinh cục bộ, lựa chọn nào sau đây có nguy cơ gây hạ natri máu thấp nhất?
A. Carbamazepine
B. Eslicarbazepine
C. Levetiracetam
D. Valproate
Đáp án: C
Giải thích: Levetiracetam không được biết là gây hạ natri máu và có ít tương tác thuốc, làm cho nó trở thành một lựa chọn thay thế an toàn ở bệnh nhân đã có biến chứng này.
Tại sao các lựa chọn khác lại sai: Carbamazepine và Eslicarbazepine có cấu trúc tương tự Oxcarbazepine và cũng có nguy cơ gây hạ natri máu đáng kể. Valproate có thể gây hạ natri máu nhưng ít phổ biến hơn so với nhóm carbamazepine. Levetiracetam là lựa chọn an toàn nhất trong số này.
Câu 4: Triệu chứng nào sau đây là chỉ báo sớm nhất của hạ natri máu ở người cao tuổi?
A. Co giật
B. Hôn mê
C. Yếu cơ
D. Lú lẫn và mất thăng bằng
Đáp án: D
Giải thích: Ở người cao tuổi, các triệu chứng của hạ natri máu thường không đặc hiệu và tinh vi ở giai đoạn đầu. Lú lẫn, thay đổi trạng thái tinh thần, và mất thăng bằng (dẫn đến ngã) thường là những biểu hiện sớm nhất, trước khi các triệu chứng nghiêm trọng hơn như co giật và hôn mê xuất hiện.

TÌNH HUỐNG LÂM SÀNG 23
Một bé trai 6 tháng tuổi được đưa đến khám vì những cơn co giật kỳ lạ xuất hiện trong tuần qua. Mẹ bé mô tả các cơn xảy ra thành từng chùm khi bé vừa thức dậy, mỗi cơn là một động tác gập người đột ngột về phía trước, cả hai tay vung ra. Mỗi chùm kéo dài vài phút với hàng chục cơn co giật liên tiếp. Giữa các chùm, bé rất cáu kỉnh. Bé cũng dường như đã mất đi khả năng mỉm cười và giao tiếp bằng mắt. EEG cho thấy một mẫu hình hỗn loạn, điện thế cao, không đồng bộ của các sóng chậm và gai nhọn, được gọi là hypsarrhythmia.
Câu 1: Chẩn đoán phù hợp nhất là gì?
A. Cơn co giật do sốt
B. Co thắt ở trẻ sơ sinh (Hội chứng West)
C. Động kinh giật cơ lành tính ở trẻ nhỏ
D. Trào ngược dạ dày thực quản
Đáp án: B
Giải thích: Bộ ba lâm sàng của co thắt ở trẻ sơ sinh (Infantile Spasms hay Hội chứng West) bao gồm: (1) các cơn co thắt đặc trưng, thường là gập người, xảy ra thành từng chùm; (2) sự thoái triển hoặc ngừng phát triển tâm thần vận động; và (3) mẫu EEG hypsarrhythmia. Bệnh cảnh của bệnh nhân hoàn toàn phù hợp với chẩn đoán này.
Tại sao các lựa chọn khác lại sai: Co giật do sốt liên quan đến sốt và thường là cơn co cứng-co giật. Động kinh giật cơ lành tính là các cơn giật đơn lẻ, không xảy ra thành chùm và không gây thoái triển tâm thần. Trào ngược (hội chứng Sandifer) có thể gây ra các tư thế ưỡn người nhưng không có bất thường EEG.
Câu 2: Lựa chọn điều trị nào sau đây được coi là liệu pháp hàng đầu cho co thắt ở trẻ sơ sinh?
A. Phenobarbital
B. Liệu pháp hormone (ACTH) hoặc Vigabatrin
C. Levetiracetam
D. Chế độ ăn ketogenic
Đáp án: B
Giải thích: Liệu pháp hormone (ACTH liều cao) và Vigabatrin là hai phương pháp điều trị hàng đầu đã được chứng minh là có hiệu quả trong việc ngăn chặn các cơn co thắt và cải thiện mẫu EEG hypsarrhythmia. Lựa chọn giữa hai loại thuốc này phụ thuộc vào nguyên nhân cơ bản (Vigabatrin đặc biệt hiệu quả cho co thắt do xơ cứng củ).
Tại sao các lựa chọn khác lại sai: Phenobarbital và Levetiracetam không được coi là liệu pháp hàng đầu và ít hiệu quả hơn. Chế độ ăn ketogenic là một lựa chọn điều trị quan trọng nhưng thường được dành cho các trường hợp kháng với liệu pháp hormone hoặc Vigabatrin.
Câu 3: Tác dụng phụ nghiêm trọng, không hồi phục nào cần được theo dõi khi sử dụng Vigabatrin?
A. Suy thận
B. Rụng tóc
C. Thu hẹp thị trường hai bên vĩnh viễn
D. Tăng cân
Đáp án: C
Giải thích: Vigabatrin có liên quan đến nguy cơ gây độc tính võng mạc, dẫn đến thu hẹp thị trường đồng tâm hai bên vĩnh viễn. Nguy cơ này xảy ra ở một tỷ lệ đáng kể bệnh nhân và đòi hỏi phải theo dõi thị trường thường xuyên trong quá trình điều trị.
Tại sao các lựa chọn khác lại sai: Các tác dụng phụ khác không phải là đặc trưng của Vigabatrin. Tăng cân là tác dụng phụ của valproate.
Câu 4: Mục tiêu cấp bách của việc điều trị co thắt ở trẻ sơ sinh là gì?
A. Chỉ để giảm số lượng cơn co thắt
B. Bình thường hóa giấc ngủ của trẻ
C. Nhanh chóng ngăn chặn các cơn co thắt và giải quyết mẫu EEG hypsarrhythmia để cải thiện kết quả phát triển thần kinh lâu dài
D. Phòng ngừa sự phát triển của chứng đau nửa đầu trong tương lai
Đáp án: C
Giải thích: Co thắt ở trẻ sơ sinh là một bệnh não động kinh, có nghĩa là bản thân hoạt động động kinh (cả lâm sàng và trên EEG) góp phần gây ra suy giảm nhận thức. Do đó, việc điều trị nhanh chóng và hiệu quả để chấm dứt cơn và bình thường hóa EEG là rất quan trọng, với hy vọng giảm thiểu tổn thương não và cải thiện tiên lượng phát triển lâu dài.
Tại sao các lựa chọn khác lại sai: Mục tiêu không chỉ là giảm số lượng cơn mà là loại bỏ hoàn toàn cơn và bất thường EEG. Cải thiện giấc ngủ là một lợi ích phụ. Đau nửa đầu không liên quan.

TÌNH HUỐNG LÂM SÀNG 24
Một phụ nữ 40 tuổi mô tả các cơn kỳ lạ bắt đầu bằng cảm giác "tê và ngứa ran" ở bàn tay trái, sau đó lan dần lên cánh tay và đến mặt bên trái của cô. Trong suốt quá trình này, cô hoàn toàn tỉnh táo và có thể mô tả các triệu chứng khi chúng xảy ra. Đôi khi, sau cảm giác này, cô có thể cảm thấy như thể cánh tay trái của mình không phải là một phần của cơ thể cô nữa. Cơn kéo dài khoảng 1 phút.
Câu 1: Mô tả về sự lan truyền của các triệu chứng cảm giác được gọi là gì?
A. Hành trình Jackson 
B. Hiện tượng Todd
C. Động tác tự động
D. Aura tâm thần
Đáp án: A
Giải thích: Hành trình Jackson (hay cơn Jackson) mô tả sự lan truyền tuần tự, có trật tự của các triệu chứng vận động hoặc cảm giác dọc theo cơ thể, phản ánh sự lan truyền của hoạt động động kinh dọc theo vỏ não vận động hoặc cảm giác. Sự lan truyền từ tay lên mặt phù hợp với bản đồ đại diện cơ thể (homunculus) trên vỏ não.
Tại sao các lựa chọn khác lại sai: Hiện tượng Todd (liệt Todd) là tình trạng yếu hoặc liệt thoáng qua sau cơn. Động tác tự động là các hành vi không có mục đích trong cơn cục bộ phức tạp. Aura tâm thần là các trải nghiệm phức tạp như déjà vu.
Câu 2: Dựa trên các triệu chứng ban đầu, ổ động kinh có khả năng nhất nằm ở đâu?
A. Thùy thái dương phải
B. Vỏ não cảm giác sơ cấp ở thùy đỉnh phải
C. Thùy chẩm trái
D. Hồi hải mã trái
Đáp án: B
Giải thích: Các triệu chứng cảm giác (tê, ngứa ran) ở nửa người bên trái cho thấy ổ động kinh khởi phát ở bán cầu não phải. Cụ thể, cảm giác này bắt nguồn từ vỏ não cảm giác sơ cấp (hồi sau trung tâm) ở thùy đỉnh, nơi xử lý các cảm giác cơ thể. Cảm giác biến dạng hình ảnh cơ thể cũng có thể gặp trong động kinh thùy đỉnh.
Tại sao các lựa chọn khác lại sai: Thùy thái dương thường gây ra các aura nội tạng hoặc tâm thần. Thùy chẩm gây ra aura thị giác. Hồi hải mã liên quan đến trí nhớ và cảm xúc. Bất thường ở bên trái sẽ gây triệu chứng bên phải.
Câu 3: Bệnh nhân này đang trải qua loại cơn động kinh nào?
A. Cơn cục bộ đơn giản 
B. Cơn cục bộ phức tạp 
C. Cơn vắng ý thức
D. Cơn giật cơ
Đáp án: A
Giải thích: Bệnh nhân hoàn toàn tỉnh táo và nhận thức được môi trường xung quanh trong suốt cơn co giật. Theo phân loại của ILAE 2017, đây được định nghĩa là một cơn động kinh cục bộ có ý thức (focal aware seizure), trước đây gọi là cơn cục bộ đơn giản.
Tại sao các lựa chọn khác lại sai: Cơn cục bộ phức tạp (suy giảm ý thức) và cơn vắng ý thức đều có rối loạn ý thức. Cơn giật cơ là các cơn giật cơ ngắn.
Câu 4: Nếu cơn động kinh của bệnh nhân này tiến triển và gây ra co giật ở cả tay và chân bên trái, sau đó lan ra toàn bộ cơ thể với co cứng và co giật, nó sẽ được phân loại là gì?
A. Cơn động kinh toàn thể nguyên phát
B. Trạng thái động kinh
C. Cơn cục bộ chuyển thành co cứng-co giật hai bên 
D. Cơn co cứng
Đáp án: C
Giải thích: Đây là mô tả kinh điển của một cơn động kinh khởi phát cục bộ (với các triệu chứng cảm giác ở bên trái) sau đó lan tỏa ra cả hai bán cầu não, dẫn đến một cơn co cứng-co giật toàn thể. Thuật ngữ hiện tại của ILAE cho hiện tượng này là "cơn cục bộ chuyển thành co cứng-co giật hai bên" 14, trước đây gọi là toàn thể hóa thứ phát15.
Tại sao các lựa chọn khác lại sai: Cơn toàn thể nguyên phát bắt đầu ở cả hai bán cầu cùng một lúc, không có khởi đầu cục bộ. Trạng thái động kinh là cơn kéo dài. Cơn co cứng chỉ có giai đoạn co cứng.

TÌNH HUỐNG LÂM SÀNG 25
Một người đàn ông 28 tuổi, có tiền sử động kinh cục bộ, được vợ đưa vào cấp cứu. Vợ anh cho biết anh vừa có một cơn co giật vận động ở tay và chân bên phải kéo dài khoảng 2 phút. Ngay sau khi cơn co giật kết thúc, anh hoàn toàn không thể cử động được tay và chân bên phải, mặc dù anh tỉnh táo và có thể nói chuyện. Khám tại phòng cấp cứu, sức cơ ở tay và chân phải là 0/5. Phản xạ gân xương giảm ở bên phải.
Câu 1: Tình trạng yếu liệt cấp tính ở nửa người bên phải của bệnh nhân được gọi là gì?
A. Đột quỵ nhồi máu não
B. Xuất huyết nội sọ
C. Liệt Todd 
D. Hội chứng Guillain-Barré
Đáp án: C
Giải thích: Liệt Todd là tình trạng yếu hoặc liệt thoáng qua ở một phần cơ thể sau một cơn động kinh cục bộ, ảnh hưởng đến chính khu vực đã bị co giật. Nó được cho là do sự ức chế thần kinh sau cơn tại vùng vỏ não đã hoạt động quá mức. Tình trạng này thường hồi phục hoàn toàn trong vòng vài phút đến 48 giờ.
Tại sao các lựa chọn khác lại sai: Mặc dù liệt Todd có thể bắt chước một cơn đột quỵ, bối cảnh xảy ra ngay sau một cơn co giật làm cho nó trở thành chẩn đoán có khả năng nhất. Hội chứng Guillain-Barré là tình trạng yếu liệt đối xứng, thường đi lên và không liên quan đến co giật.
Câu 2: Bước xử trí phù hợp nhất tiếp theo cho bệnh nhân này tại khoa cấp cứu là gì?
A. Bắt đầu ngay lập tức liệu pháp tiêu sợi huyết (tPA)
B. Theo dõi và quan sát, đồng thời loại trừ các nguyên nhân cấp tính khác bằng hình ảnh học
C. Tiêm tĩnh mạch một liều benzodiazepine
D. Chọc dịch não tủy
Đáp án: B
Giải thích: Mặc dù liệt Todd là chẩn đoán có khả năng nhất, việc loại trừ một biến cố mạch máu não cấp tính (đột quỵ) là rất quan trọng, đặc biệt nếu tình trạng yếu liệt kéo dài. Do đó, bệnh nhân cần được theo dõi sát và thường được chỉ định chụp CT hoặc MRI sọ não để loại trừ đột quỵ. Tuy nhiên, không nên vội vàng can thiệp điều trị đột quỵ.
Tại sao các lựa chọn khác lại sai: Tiêu sợi huyết chống chỉ định vì co giật có thể là một triệu chứng của xuất huyết não. Benzodiazepine dùng để điều trị cơn co giật đang diễn ra, không phải tình trạng sau cơn. Chọc dịch não tủy không được chỉ định trừ khi có nghi ngờ nhiễm trùng.
Câu 3: Yếu tố nào giúp phân biệt liệt Todd với đột quỵ não?
A. Tình trạng yếu liệt chỉ kéo dài dưới 1 giờ
B. Xảy ra ngay sau một cơn co giật được chứng kiến
C. Bệnh nhân có các yếu tố nguy cơ tim mạch
D. Không có thay đổi trên CT sọ não ban đầu
Đáp án: B
Giải thích: Yếu tố quan trọng nhất và định nghĩa của liệt Todd là sự xuất hiện của nó ngay sau một cơn co giật. Nếu không có cơn co giật được chứng kiến, tình trạng yếu liệt cấp tính phải luôn được xem xét là đột quỵ cho đến khi có bằng chứng ngược lại.
Tại sao các lựa chọn khác lại sai: Liệt Todd có thể kéo dài đến 48 giờ. Bệnh nhân động kinh vẫn có thể có các yếu tố nguy cơ tim mạch. CT sọ não ban đầu có thể bình thường trong đột quỵ nhồi máu não giai đoạn sớm.
Câu 4: Tiên lượng của liệt Todd là gì?
A. Thường dẫn đến yếu liệt vĩnh viễn
B. Hồi phục hoàn toàn trong vòng vài phút đến 48 giờ
C. Tăng nguy cơ tử vong trong 30 ngày
D. Luôn đòi hỏi phải phẫu thuật giải áp
Đáp án: B
Giải thích: Liệt Todd là một hiện tượng tạm thời và tự giới hạn. Theo định nghĩa, chức năng vận động sẽ hồi phục hoàn toàn. Thời gian hồi phục có thể thay đổi nhưng thường là trong vòng 48 giờ.
Tại sao các lựa chọn khác lại sai: Nó không gây ra yếu liệt vĩnh viễn, không làm tăng nguy cơ tử vong, và không cần phẫu thuật.

TÌNH HUỐNG LÂM SÀNG 26
Một phụ nữ 68 tuổi, có tiền sử bệnh Alzheimer, được đưa đến phòng khám vì những cơn "lơ đãng" ngày càng thường xuyên. Trong cơn, bà ngừng nói chuyện, miệng chép nhẹ, và tay phải của bà bắt đầu mân mê cúc áo. Cơn kéo dài khoảng 90 giây, sau đó bà lú lẫn và mệt mỏi trong vài phút. Bác sĩ gia đình ban đầu chẩn đoán là cơn vắng ý thức và cho dùng Ethosuximide nhưng không cải thiện.
Câu 1: Dựa trên các triệu chứng học, chẩn đoán nào là phù hợp hơn so với cơn vắng ý thức?
A. Cơn giả động kinh do nguyên nhân tâm lý (PNES)
B. Cơn thiếu máu não thoáng qua (TIA)
C. Động kinh cục bộ phức tạp 
D. Cơn ngất
Đáp án: C
Giải thích: Các đặc điểm như sự hiện diện của động tác tự động (chép miệng, mân mê cúc áo), thời gian kéo dài hơn 30 giây, và một giai đoạn lú lẫn sau cơn (post-ictal confusion) là những dấu hiệu điển hình của một cơn động kinh cục bộ phức tạp, không phải là cơn vắng ý thức. Cơn vắng ý thức điển hình rất ngắn (<20 giây), không có động tác tự động phức tạp và không có lú lẫn sau cơn. 
Tại sao các lựa chọn khác lại sai: PNES thường có các đặc điểm không điển hình khác (nhắm mắt, đẩy vùng chậu). TIA thường gây ra các triệu chứng "âm tính" (mất chức năng) hơn là các hành vi "dương tính". Ngất gây mất ý thức và trương lực tư thế đột ngột.
Câu 2: Việc các cơn không đáp ứng với Ethosuximide củng cố chẩn đoán động kinh cục bộ phức tạp vì sao?
A. Ethosuximide chỉ có hiệu quả đối với các cơn co cứng-co giật.
B. Ethosuximide là thuốc phổ hẹp chỉ có tác dụng điều trị cơn vắng ý thức. 
C. Ethosuximide thường gây ra các động tác tự động.
D. Ethosuximide cần nồng độ rất cao để điều trị động kinh ở người cao tuổi.
Đáp án: B
Giải thích: Ethosuximide là một thuốc chống động kinh phổ hẹp với cơ chế tác động chính là ức chế kênh canxi loại T ở đồi thị, làm cho nó rất hiệu quả đối với cơn vắng ý thức nhưng hoàn toàn không hiệu quả đối với các cơn động kinh cục bộ.  Việc thất bại trong điều trị này là một bằng chứng dược lý mạnh mẽ chống lại chẩn đoán cơn vắng.
Tại sao các lựa chọn khác lại sai: Ethosuximide không hiệu quả đối với cơn co cứng-co giật. Nó không gây ra động tác tự động. Vấn đề không phải là liều lượng mà là phổ tác dụng của thuốc.
Câu 3: Lựa chọn thuốc nào sau đây là phù hợp để bắt đầu điều trị cho bệnh nhân này?
A. Vigabatrin
B. Lamotrigine
C. Tiagabine
D. Clonazepam
Đáp án: B
Giải thích: Lamotrigine là một thuốc chống động kinh phổ rộng, hiệu quả cho các cơn động kinh cục bộ và thường được dung nạp tốt ở người cao tuổi với ít tác dụng phụ lên nhận thức và ít tương tác thuốc.  Đây là một lựa chọn hàng đầu cho động kinh cục bộ mới khởi phát ở người cao tuổi.
Tại sao các lựa chọn khác lại sai: Vigabatrin và Tiagabine không phải là lựa chọn hàng đầu và có các tác dụng phụ đáng kể. Clonazepam là một benzodiazepine, thường được sử dụng để cắt cơn cấp tính hoặc điều trị bổ trợ, không phải là đơn trị liệu hàng đầu do nguy cơ lệ thuộc và lờn thuốc.
Câu 4: Sự khác biệt chính về điện não đồ (EEG) giữa cơn vắng ý thức điển hình và cơn cục bộ phức tạp nguồn gốc thùy thái dương là gì?
A. Cơn vắng có phức hợp gai-sóng chậm 3 Hz lan tỏa, trong khi cơn cục bộ có hoạt động kịch phát khu trú ở vùng thái dương. 
B. Cả hai đều cho thấy hoạt động delta nhịp nhàng ở thùy trán.
C. EEG hoàn toàn bình thường trong cả hai loại cơn.
D. Cơn vắng cho thấy các gai nhọn ở thùy chẩm, trong khi cơn cục bộ cho thấy sóng chậm lan tỏa.
Đáp án: A
Giải thích: Đây là sự khác biệt điện sinh lý cơ bản. Cơn vắng ý thức là một cơn toàn thể, đặc trưng bởi các phóng điện gai-sóng chậm 3 Hz đồng bộ, lan tỏa khắp hai bán cầu. 6Cơn cục bộ phức tạp khởi phát từ một vùng khu trú (ví dụ, thùy thái dương) và EEG trong cơn sẽ cho thấy hoạt động kịch phát bắt đầu từ vùng đó trước khi có thể lan rộng. 

TÌNH HUỐNG LÂM SÀNG 27
Một bé gái 4 tuổi mắc hội chứng Dravet, một bệnh não động kinh nặng, tiếp tục có nhiều cơn co giật hàng ngày bao gồm co giật do sốt, giật cơ, và co cứng-co giật, mặc dù đã điều trị phối hợp Valproate và Clobazam. Bác sĩ đề nghị một phương pháp điều trị không dùng thuốc.
Câu 1: Phương pháp điều trị không dùng thuốc nào sau đây đã được chứng minh hiệu quả như một liệu pháp bổ trợ cho động kinh kháng thuốc ở trẻ em như hội chứng Dravet?
A. Châm cứu
B. Liệu pháp oxy cao áp
C. Chế độ ăn ketogenic
D. Kích thích từ xuyên sọ (TMS)
Đáp án: C
Giải thích: Chế độ ăn ketogenic là một chế độ ăn rất ít carbohydrate, nhiều chất béo, và đủ protein, buộc cơ thể phải chuyển sang trạng thái ketosis. Nó là một liệu pháp điều trị đã được thiết lập và có hiệu quả cho động kinh kháng thuốc ở trẻ em, đặc biệt là trong các hội chứng như Dravet, LGS, và thiếu hụt GLUT1. 
Tại sao các lựa chọn khác lại sai: Châm cứu, liệu pháp oxy cao áp, và TMS không phải là các phương pháp điều trị tiêu chuẩn và chưa được chứng minh hiệu quả một cách nhất quán cho động kinh kháng thuốc ở trẻ em.
Câu 2: Tác dụng phụ ngắn hạn phổ biến nhất khi bắt đầu chế độ ăn ketogenic là gì?
A. Tăng cân
B. Rối loạn tiêu hóa (buồn nôn, nôn, táo bón) và hạ đường huyết
C. Rụng tóc
D. Tăng huyết áp
Đáp án: B
Giải thích: Giai đoạn bắt đầu chế độ ăn ketogenic thường được thực hiện trong bệnh viện để theo dõi. Các tác dụng phụ cấp tính thường gặp bao gồm rối loạn tiêu hóa khi cơ thể thích nghi với lượng chất béo cao, cũng như nguy cơ hạ đường huyết do hạn chế carbohydrate nghiêm ngặt.
Tại sao các lựa chọn khác lại sai: Bệnh nhân thường giảm cân hoặc duy trì cân nặng, không tăng cân. Rụng tóc có thể xảy ra do thiếu hụt vi chất nhưng không phải là tác dụng phụ cấp tính. Tăng huyết áp không liên quan.
Câu 3: Biến chứng lâu dài nào cần được theo dõi ở trẻ em theo chế độ ăn ketogenic?
A. Sỏi thận
B. Suy giáp
C. Đái tháo đường type 1
D. Hen phế quản
Đáp án: A
Giải thích: Việc duy trì trạng thái ketosis lâu dài có thể dẫn đến một số biến chứng, trong đó sỏi thận (nephrolithiasis) là một trong những biến chứng phổ biến nhất. Điều này là do tình trạng toan chuyển hóa mạn tính và giảm citrat niệu. Các biến chứng khác bao gồm rối loạn lipid máu, chậm tăng trưởng, và giảm mật độ xương.
Tại sao các lựa chọn khác lại sai: Chế độ ăn này không gây ra suy giáp, đái tháo đường type 1, hoặc hen phế quản.
Câu 4: Cơ chế chính xác mà chế độ ăn ketogenic giúp kiểm soát co giật vẫn chưa được hiểu đầy đủ, nhưng giả thuyết hàng đầu là gì?
A. Tăng nồng độ glucose trong não
B. Ức chế hệ thống GABA
C. Tăng sản xuất thể ketone, có tác dụng ổn định thần kinh và chống viêm
D. Giảm nồng độ cholesterol toàn phần
Đáp án: C
Giải thích: Giả thuyết chính cho rằng các thể ketone (beta-hydroxybutyrate, acetoacetate) được sản xuất ra có thể trực tiếp ổn định màng tế bào thần kinh, giảm tính kích thích, tăng cường dẫn truyền thần kinh ức chế (GABA), và có tác dụng chống viêm trong não, tất cả đều góp phần vào hiệu quả chống co giật.
Tại sao các lựa chọn khác lại sai: Chế độ ăn này làm giảm glucose não. Nó tăng cường, không ức chế, hệ thống GABA. Nó làm tăng cholesterol, không phải giảm.

TÌNH HUỐNG LÂM SÀNG 28
Một người đàn ông 38 tuổi bị động kinh cục bộ kháng thuốc sau viêm não herpes. Anh tiếp tục có 3-4 cơn cục bộ phức tạp mỗi tháng mặc dù đã thử 4 loại ASM khác nhau. Đánh giá trước phẫu thuật cho thấy ổ động kinh nằm ở thùy thái dương trái, gần vùng ngôn ngữ, làm cho phẫu thuật cắt bỏ có nguy cơ cao gây di chứng. Bệnh nhân được đề nghị một phương pháp điều trị giảm nhẹ.
Câu 1: Phương pháp điều trị nào sau đây là một lựa chọn giảm nhẹ tiêu chuẩn cho động kinh cục bộ kháng thuốc khi phẫu thuật không phải là một lựa chọn?
A. Liệu pháp sốc điện (ECT)
B. Phẫu thuật cắt thể chai
C. Kích thích dây thần kinh phế vị (VNS)
D. Hủy ổ động kinh bằng laser
Đáp án: C
Giải thích: Kích thích dây thần kinh phế vị (VNS) là một thiết bị được cấy ghép, gửi các xung điện đến não thông qua dây thần kinh phế vị. Đây là một liệu pháp bổ trợ được FDA chấp thuận cho động kinh cục bộ kháng thuốc ở bệnh nhân từ 4 tuổi trở lên không phải là ứng cử viên cho phẫu thuật cắt bỏ. 9Nó giúp giảm tần suất và mức độ nặng của cơn ở khoảng 30-40% bệnh nhân. 
Tại sao các lựa chọn khác lại sai: ECT dùng trong tâm thần học. Cắt thể chai dùng cho các cơn ngã đột ngột (atonic seizures), không phải động kinh cục bộ. Hủy bằng laser là một dạng phẫu thuật cắt bỏ, không phải giảm nhẹ.
Câu 2: Tác dụng phụ phổ biến nhất liên quan đến việc kích thích của thiết bị VNS là gì?
A. Tăng cân
B. Buồn ngủ
C. Khàn giọng, ho, hoặc cảm giác khó thở trong khi kích thích
D. Rụng tóc
Đáp án: C
Giải thích: Dây thần kinh phế vị (dây X) chi phối cho thanh quản và hầu họng. Do đó, tác dụng phụ phổ biến nhất của VNS là do kích thích nhánh quặt ngược thanh quản, gây ra khàn giọng, ho, đau họng, hoặc khó thở. Những triệu chứng này thường chỉ xảy ra trong thời gian thiết bị đang phát xung (ví dụ: 30 giây mỗi 5 phút) và có xu hướng giảm dần theo thời gian.
Tại sao các lựa chọn khác lại sai: Tăng cân, buồn ngủ, và rụng tóc không phải là tác dụng phụ điển hình của VNS.
Câu 3: Bệnh nhân được cấy thiết bị VNS. Anh ta nên được hướng dẫn làm gì khi cảm thấy một cơn động kinh sắp xảy ra (có aura)?
A. Uống ngay một liều benzodiazepine
B. Đặt một nam châm đặc biệt lên trên máy phát điện ở ngực
C. Tăng gấp đôi liều ASM tiếp theo
D. Nằm xuống và chờ cơn qua đi
Đáp án: B
Giải thích: Bệnh nhân được cung cấp một nam châm để có thể tự kích hoạt một liều kích thích bổ sung khi cảm thấy sắp lên cơn. Việc quẹt nam châm qua máy phát điện có thể giúp ngăn chặn cơn co giật hoặc giảm mức độ nặng của nó.
Tại sao các lựa chọn khác lại sai: Các lựa chọn khác không liên quan đến việc sử dụng chức năng đặc biệt của thiết bị VNS.
Câu 4: Phương pháp điều trị điều biến thần kinh nào khác cũng đã được chấp thuận cho động kinh cục bộ kháng thuốc?
A. Kích thích não sâu (DBS)
B. Kích thích tủy sống
C. Kích thích từ xuyên sọ lặp lại (rTMS)
D. Phản hồi sinh học EEG 
Đáp án: A
Giải thích: Kích thích não sâu (DBS), với các điện cực được cấy vào nhân trước của đồi thị, là một liệu pháp điều biến thần kinh khác đã được FDA chấp thuận để điều trị bổ trợ cho động kinh cục bộ kháng thuốc ở người lớn. 
Tại sao các lựa chọn khác lại sai: Kích thích tủy sống dùng để điều trị đau mạn tính. rTMS và phản hồi sinh học EEG vẫn đang được nghiên cứu và chưa phải là phương pháp điều trị tiêu chuẩn cho động kinh.

TÌNH HUỐNG LÂM SÀNG 29
Một người đàn ông 55 tuổi, không có tiền sử bệnh lý, được đưa đến cấp cứu sau một cơn co cứng-co giật toàn thể kéo dài 2 phút, đây là cơn đầu tiên trong đời. Khám thần kinh sau cơn cho thấy ông bị yếu nhẹ ở tay trái. Chụp CT sọ não có tiêm thuốc cản quang cho thấy một khối u não kích thước 3 cm ở thùy trán phải, có viền ngấm thuốc và phù nề xung quanh.
Câu 1: Chẩn đoán phù hợp nhất cho cơn co giật của bệnh nhân là gì?
A. Cơn động kinh không do kích thích
B. Cơn động kinh triệu chứng cấp tính 
C. Cơn co giật do sốt
D. Cơn giả động kinh
Đáp án: B
Giải thích: Một cơn co giật xảy ra trong mối liên quan thời gian gần với một tổn thương não cấp tính hoặc đang hoạt động (như khối u não có phù nề) được định nghĩa là một cơn động kinh triệu chứng cấp tính (hoặc "provoked").  Điều này khác với cơn không do kích thích, xảy ra mà không có yếu tố thúc đẩy cấp tính.
Tại sao các lựa chọn khác lại sai: Cơn co giật này có một nguyên nhân rõ ràng, do đó không phải là không do kích thích. Nó không liên quan đến sốt và các đặc điểm lâm sàng cũng như hình ảnh học không phù hợp với cơn giả động kinh.
Câu 2: Bước xử trí nào sau đây là quan trọng nhất trong việc quản lý bệnh nhân này tại bệnh viện?
A. Chỉ bắt đầu điều trị bằng thuốc chống động kinh
B. Chỉ bắt đầu điều trị bằng Dexamethasone
C. Bắt đầu cả thuốc chống động kinh và Dexamethasone, và hội chẩn phẫu thuật thần kinh
D. Chỉ theo dõi và chờ sinh thiết khối u
Đáp án: C
Giải thích: Việc quản lý đòi hỏi một cách tiếp cận đa mô thức. Bệnh nhân cần được bắt đầu dùng thuốc chống động kinh (ví dụ: Levetiracetam) để ngăn ngừa các cơn co giật tiếp theo. Dexamethasone (một loại corticosteroid) được sử dụng để giảm phù não quanh u, giúp giảm hiệu ứng khối và có thể cả tính kích thích của vỏ não. Hội chẩn phẫu thuật thần kinh là cần thiết để lên kế hoạch chẩn đoán (sinh thiết) và điều trị khối u.
Tại sao các lựa chọn khác lại sai: Chỉ điều trị một khía cạnh của vấn đề là không đủ. Chờ đợi mà không điều trị triệu chứng là không an toàn.
Câu 3: Lựa chọn thuốc chống động kinh nào sau đây nên được ưu tiên ở bệnh nhân có u não đang hoặc sẽ được hóa trị?
A. Phenytoin
B. Carbamazepine
C. Levetiracetam
D. Phenobarbital
Đáp án: C
Giải thích: Levetiracetam là một lựa chọn ưu tiên vì nó không phải là chất cảm ứng hay ức chế men gan. Nhiều loại thuốc hóa trị được chuyển hóa qua hệ thống men gan Cytochrome P450. Các ASM cảm ứng men gan như Phenytoin, Carbamazepine, và Phenobarbital có thể làm tăng chuyển hóa và giảm hiệu quả của các thuốc hóa trị. Levetiracetam tránh được tương tác này.
Tại sao các lựa chọn khác lại sai: Phenytoin, Carbamazepine, và Phenobarbital đều là các chất cảm ứng men gan mạnh và có thể gây ra các tương tác thuốc-thuốc đáng kể với các phác đồ hóa trị.
Câu 4: Tình trạng yếu tay trái của bệnh nhân sau cơn co giật được giải thích tốt nhất là do đâu?
A. Hiệu ứng khối của khối u chèn ép vào vỏ não vận động
B. Liệt Todd 
C. Cả hiệu ứng khối và khả năng có liệt Todd
D. Một cơn đột quỵ đồng thời
Đáp án: C
Giải thích: Tình trạng yếu có thể do nhiều yếu tố. Khối u ở thùy trán phải có thể chèn ép trực tiếp vào vỏ não vận động chi phối tay trái, gây ra yếu nền. Ngoài ra, một cơn động kinh khởi phát từ vùng này có thể gây ra liệt Todd chồng lên tình trạng yếu nền đó. Do đó, cả hai yếu tố đều có thể đóng góp.
Tại sao các lựa chọn khác lại sai: Chỉ giải thích bằng một yếu tố có thể không đầy đủ. Đột quỵ đồng thời ít có khả năng hơn so với các nguyên nhân trực tiếp liên quan đến u và cơn co giật.

TÌNH HUỐNG LÂM SÀNG 30
Một phụ nữ 32 tuổi có tiền sử động kinh thùy thái dương kháng thuốc. Sau một cụm 3 cơn cục bộ phức tạp trong một ngày, cô ấy trở nên ổn định về mặt co giật nhưng bắt đầu có những hành vi bất thường. Cô trở nên hoang tưởng, tin rằng gia đình đang âm mưu chống lại mình, và có ảo giác nghe thấy những giọng nói bình phẩm về hành động của cô. Tình trạng này kéo dài trong 3 ngày.
Câu 1: Tình trạng tâm thần của bệnh nhân được mô tả tốt nhất là gì?
A. Trạng thái động kinh không co giật
B. Lú lẫn sau cơn kéo dài
C. Loạn thần sau cơn 
D. Tác dụng phụ của thuốc chống động kinh
Đáp án: C
Giải thích: Loạn thần sau cơn (PIP) là một biến chứng hiếm gặp của động kinh, được đặc trưng bởi sự xuất hiện của các triệu chứng loạn thần (hoang tưởng, ảo giác) sau một khoảng thời gian tỉnh táo (lucid interval) sau khi các cơn co giật đã kết thúc. Khoảng thời gian tỉnh táo này, thường kéo dài từ vài giờ đến vài ngày, giúp phân biệt PIP với lú lẫn sau cơn đơn thuần.
Tại sao các lựa chọn khác lại sai: NCSE sẽ có bất thường EEG liên tục. Lú lẫn sau cơn đơn thuần không có các triệu chứng loạn thần có tổ chức (hoang tưởng, ảo giác). Mặc dù một số ASM có thể gây loạn thần, sự xuất hiện sau một cụm cơn và có khoảng thời gian tỉnh táo làm cho PIP là chẩn đoán có khả năng nhất.
Câu 2: Yếu tố nguy cơ nào sau đây có liên quan mạnh nhất đến việc phát triển loạn thần sau cơn?
A. Động kinh vắng ý thức
B. Tiền sử gia đình bị tâm thần phân liệt
C. Động kinh cục bộ hai bên thùy thái dương
D. Sử dụng Levetiracetam
Đáp án: C
Giải thích: Các yếu tố nguy cơ của PIP bao gồm có ổ động kinh ở thùy thái dương, đặc biệt là hai bên, có tiền sử bệnh tâm thần, và có một cụm các cơn co giật toàn thể hoặc cục bộ phức tạp trước đó. Sự liên quan đến các cấu trúc của hệ viền (limbic system) ở thùy thái dương được cho là đóng một vai trò quan trọng.
Tại sao các lựa chọn khác lại sai: Động kinh vắng ý thức không phải là một yếu tố nguy cơ. Tiền sử gia đình bị tâm thần phân liệt có thể là một yếu tố, nhưng ổ động kinh thùy thái dương là một yếu tố nguy cơ mạnh hơn và trực tiếp hơn. Levetiracetam có thể gây ra các triệu chứng tâm thần, nhưng đó là tác dụng phụ trực tiếp của thuốc, không phải là PIP.
Câu 3: Hướng xử trí ban đầu phù hợp nhất cho bệnh nhân này là gì?
A. Ngừng ngay lập tức tất cả các thuốc chống động kinh.
B. Nhập viện để đảm bảo an toàn, chăm sóc hỗ trợ, và bắt đầu một đợt điều trị ngắn hạn bằng thuốc chống loạn thần.
C. Bắt đầu ngay lập tức liệu pháp sốc điện (ECT).
D. Cho bệnh nhân về nhà với một liều benzodiazepine và theo dõi ngoại trú.
Đáp án: B
Giải thích: Loạn thần sau cơn có thể khiến bệnh nhân có nguy cơ gây hại cho bản thân hoặc người khác. Do đó, việc nhập viện để đảm bảo an toàn là cần thiết. Điều trị bao gồm chăm sóc hỗ trợ và thường sử dụng một đợt điều trị ngắn hạn bằng thuốc chống loạn thần không điển hình (ví dụ: Olanzapine, Risperidone) cho đến khi các triệu chứng thuyên giảm.
Tại sao các lựa chọn khác lại sai: Ngừng ASM sẽ gây nguy cơ tái phát cơn. ECT là một liệu pháp điều trị hàng sau. Cho bệnh nhân về nhà trong tình trạng loạn thần là không an toàn.
Câu 4: Tiên lượng của một đợt loạn thần sau cơn điển hình là gì?
A. Thường tiến triển thành tâm thần phân liệt mạn tính
B. Các triệu chứng thường tự giới hạn và thuyên giảm trong vòng vài ngày đến vài tuần
C. Đòi hỏi phải điều trị bằng thuốc chống loạn thần suốt đời
D. Luôn để lại di chứng nhận thức nghiêm trọng
Đáp án: B
Giải thích: Loạn thần sau cơn thường là một tình trạng tự giới hạn. Với điều trị hỗ trợ và thuốc chống loạn thần ngắn hạn, các triệu chứng thường thuyên giảm hoàn toàn trong vòng vài ngày đến vài tuần. Tuy nhiên, bệnh nhân có nguy cơ tái phát sau các cụm cơn trong tương lai.
Tại sao các lựa chọn khác lại sai: Nó không thường tiến triển thành tâm thần phân liệt, không đòi hỏi điều trị suốt đời, và thường không để lại di chứng nhận thức mới sau khi hồi phục.

TÌNH HUỐNG LÂM SÀNG 31
Một lập trình viên 29 tuổi được đưa đến cấp cứu sau khi bị một cơn co cứng-co giật toàn thể tại nơi làm việc. Đây là cơn co giật đầu tiên của anh. Anh không có tiền sử bệnh lý đáng chú ý. Khám lâm sàng và thần kinh sau cơn hoàn toàn bình thường. Chụp CT sọ não tại cấp cứu không phát hiện bất thường. Anh được cho ra viện và hẹn khám lại tại phòng khám thần kinh. EEG được thực hiện sau đó cho thấy có các phóng điện gai nhọn ở vùng trán trái.
Câu 1: Dựa trên các thông tin hiện có, nguy cơ tái phát cơn co giật trong 10 năm tới của bệnh nhân này là bao nhiêu?
A. Dưới 20%
B. Khoảng 20-40%
C. Khoảng 40-60%
D. Lớn hơn 60%
Đáp án: D
Giải thích: Theo hướng dẫn của Học viện Thần kinh học Hoa Kỳ (AAN) và Hiệp hội Động kinh Hoa Kỳ (AES), một bệnh nhân sau cơn co giật không do kích thích đầu tiên có nguy cơ tái phát chung khoảng 21-45% trong 2 năm. Tuy nhiên, sự hiện diện của một tổn thương não cấu trúc hoặc các phóng điện dạng động kinh trên EEG làm tăng đáng kể nguy cơ này lên trên 60%. Bệnh nhân này có bất thường EEG, do đó nguy cơ tái phát của anh ấy là cao. 
Tại sao các lựa chọn khác lại sai: Nguy cơ của anh ấy cao hơn mức cơ bản do có bất thường trên EEG.
Câu 2: Theo định nghĩa thực hành của ILAE 2014, tình trạng của bệnh nhân này có thể được chẩn đoán là bệnh động kinh không?
A. Không, vì anh ấy mới chỉ có một cơn co giật.
B. Có, vì nguy cơ tái phát của anh ấy tương đương với người đã có hai cơn.
C. Chỉ khi anh ấy có cơn co giật thứ hai.
D. Chỉ khi MRI sọ não cũng cho thấy bất thường.
Đáp án: B
Giải thích: Định nghĩa của ILAE cho phép chẩn đoán bệnh động kinh sau một cơn co giật duy nhất nếu có yếu tố làm cho nguy cơ tái phát cơn trong 10 năm tới là ≥60%. Vì bệnh nhân có bất thường dạng động kinh trên EEG, nguy cơ tái phát của anh ấy vượt qua ngưỡng này, do đó có thể chẩn đoán là bệnh động kinh và cân nhắc điều trị. 
Tại sao các lựa chọn khác lại sai: Định nghĩa truyền thống yêu cầu hai cơn, nhưng định nghĩa mới linh hoạt hơn. MRI bất thường là một tiêu chí, nhưng EEG bất thường cũng đủ để đáp ứng ngưỡng nguy cơ.
Câu 3: Nếu quyết định điều trị, lựa chọn thuốc hàng đầu cho một cơn động kinh khởi phát cục bộ (từ thùy trán trái) ở một nam giới trẻ tuổi là gì?
A. Ethosuximide
B. Levetiracetam
C. Zonisamide
D. Phenobarbital
Đáp án: B
Giải thích: Levetiracetam là một lựa chọn hàng đầu cho động kinh cục bộ do hiệu quả tốt, dung nạp tốt, và ít tương tác thuốc. Nó phù hợp cho nhiều nhóm bệnh nhân.
Tại sao các lựa chọn khác lại sai: Ethosuximide chỉ dùng cho cơn vắng. Zonisamide và Phenobarbital là các lựa chọn hàng sau do có nhiều tác dụng phụ hơn (suy giảm nhận thức, sỏi thận, an thần, lệ thuộc).
Câu 4: Bệnh nhân lo lắng về việc dùng thuốc và hỏi liệu có cách nào khác để giảm nguy cơ co giật không. Lời khuyên nào sau đây là quan trọng nhất?
A. "Tránh chơi video game và xem TV."
B. "Thực hiện một chế độ ăn không chứa gluten."
C. "Đảm bảo ngủ đủ giấc và tránh uống nhiều rượu."
D. "Uống bổ sung vitamin B6 hàng ngày."
Đáp án: C
Giải thích: Các yếu tố lối sống như thiếu ngủ và sử dụng rượu là những yếu tố khởi phát cơn co giật phổ biến ở những người có ngưỡng co giật thấp. Việc duy trì vệ sinh giấc ngủ tốt và tránh lạm dụng rượu là những biện pháp không dùng thuốc quan trọng nhất có thể giúp giảm nguy cơ tái phát cơn.
Tại sao các lựa chọn khác lại sai: Tránh video game chỉ cần thiết ở những người bị động kinh nhạy cảm ánh sáng, không phải là lời khuyên chung. Chế độ ăn không gluten và vitamin B6 không có vai trò trong việc phòng ngừa co giật ở bệnh nhân này.

TÌNH HUỐNG LÂM SÀNG 32
Một cô gái 17 tuổi mắc hội chứng động kinh giật cơ tuổi vị thành niên (JME) được điều trị bằng Valproate. Sau 1 năm điều trị, các cơn co giật của cô được kiểm soát tốt, nhưng cô đã tăng 10 kg và bắt đầu bị rụng tóc. Cô cũng lo lắng về chu kỳ kinh nguyệt không đều.
Câu 1: Các tác dụng phụ mà bệnh nhân đang gặp phải rất có thể liên quan đến thuốc nào?
A. Tác dụng phụ chuyển hóa của Valproate
B. Một bệnh lý nội tiết mới mắc phải không liên quan
C. Không tuân thủ chế độ ăn uống
D. Tác dụng phụ của một loại thuốc khác mà cô không khai báo
Đáp án: A
Giải thích: Tăng cân, rụng tóc (alopecia), và rối loạn kinh nguyệt là những tác dụng phụ chuyển hóa và nội tiết đã được biết rõ của Valproate. Ở phụ nữ trẻ, Valproate có thể liên quan đến sự phát triển của các đặc điểm giống hội chứng buồng trứng đa nang (PCOS). 
Tại sao các lựa chọn khác lại sai: Mặc dù các nguyên nhân khác có thể xảy ra, sự xuất hiện của bộ ba triệu chứng này ở một bệnh nhân đang dùng Valproate làm cho tác dụng phụ của thuốc là nguyên nhân có khả năng nhất.
Câu 2: Ngoài các tác dụng phụ này, tác dụng phụ nghiêm trọng, đe dọa tính mạng nào là một nguy cơ hiếm gặp của Valproate?
A. Suy tủy
B. Viêm tụy cấp và suy gan cấp
C. Hội chứng Stevens-Johnson
D. Suy thận cấp
Đáp án: B
Giải thích: Viêm tụy cấp gây tử vong và suy gan cấp (đặc biệt ở trẻ em dưới 2 tuổi dùng đa trị liệu) là những phản ứng đặc ứng hiếm gặp nhưng rất nghiêm trọng của Valproate. Bệnh nhân cần được cảnh báo về các triệu chứng như đau bụng, buồn nôn, nôn, hoặc vàng da và phải báo cáo ngay lập tức. 5
Tại sao các lựa chọn khác lại sai: Suy tủy và SJS thường liên quan đến Carbamazepine và Lamotrigine hơn. Valproate không gây suy thận cấp.
Câu 3: Do các tác dụng phụ và mối lo ngại về khả năng mang thai trong tương lai, bác sĩ quyết định chuyển sang một ASM khác. Lựa chọn nào là phù hợp nhất cho JME ở một phụ nữ trẻ?
A. Carbamazepine
B. Levetiracetam
C. Phenytoin
D. Tiagabine
Đáp án: B
Giải thích: Levetiracetam là một lựa chọn thay thế tuyệt vời cho Valproate ở phụ nữ trong độ tuổi sinh đẻ mắc JME. Nó là một thuốc phổ rộng hiệu quả cho các cơn giật cơ và co cứng-co giật, trung tính về cân nặng, không gây rụng tóc, và có nguy cơ gây quái thai thấp hơn đáng kể so với Valproate.
Tại sao các lựa chọn khác lại sai: Carbamazepine, Phenytoin, và Tiagabine là các thuốc phổ hẹp có thể làm nặng thêm cơn giật cơ trong JME.
Câu 4: Nếu bệnh nhân có thai trong khi đang dùng Valproate, việc bổ sung liều cao acid folic có loại bỏ hoàn toàn nguy cơ dị tật ống thần kinh không?
A. Có, nó làm giảm nguy cơ về mức cơ bản của dân số chung.
B. Không, nó chỉ làm giảm một phần nguy cơ và nguy cơ vẫn còn cao hơn so với dân số chung.
C. Có, nhưng chỉ khi bắt đầu dùng trước khi thụ thai.
D. Không, acid folic không có tác dụng đối với dị tật do Valproate gây ra.
Đáp án: B
Giải thích: Mặc dù việc bổ sung liều cao acid folic (thường là 4-5 mg/ngày) được khuyến cáo cho tất cả phụ nữ dùng ASM trong độ tuổi sinh đẻ, nó không loại bỏ hoàn toàn nguy cơ dị tật ống thần kinh liên quan đến Valproate. Nó có thể làm giảm nguy cơ, nhưng mức nguy cơ cơ bản do thuốc gây ra vẫn còn cao đáng kể. Cơ chế gây quái thai của Valproate có thể không chỉ liên quan đến chuyển hóa folate.

TÌNH HUỐNG LÂM SÀNG 33
Một kế toán viên 42 tuổi, bị động kinh cục bộ được kiểm soát hoàn toàn bằng Lamotrigine trong 3 năm qua. Anh ấy đến khám và hỏi liệu anh có thể bắt đầu lái xe trở lại được không. Anh ấy làm việc tại nhà và không cần lái xe đi làm.
Câu 1: Lời khuyên nào về việc lái xe là phù hợp nhất?
A. "Vì các cơn co giật của anh đã được kiểm soát, anh có thể lái xe ngay lập tức."
B. "Anh sẽ không bao giờ được phép lái xe nữa vì anh có chẩn đoán động kinh."
C. "Anh cần phải ngừng thuốc chống động kinh trong 6 tháng trước khi có thể lái xe."
D. "Hầu hết các nơi đều yêu cầu một khoảng thời gian không có cơn co giật nhất định (ví dụ 6-12 tháng) trong khi đang điều trị; anh nên kiểm tra quy định cụ thể của địa phương."
Đáp án: D
Giải thích: Các quy định về lái xe cho người bị động kinh khác nhau tùy theo quốc gia và khu vực, nhưng nguyên tắc chung là yêu cầu một khoảng thời gian tối thiểu không có cơn co giật (thường từ 3 tháng đến 1 năm) trước khi được phép lái xe. Bác sĩ có vai trò cung cấp thông tin y tế và tư vấn cho bệnh nhân tuân thủ luật pháp địa phương.
Tại sao các lựa chọn khác lại sai: Việc cho phép lái xe ngay lập tức là không an toàn và trái luật. Lệnh cấm lái xe vĩnh viễn là không đúng; nhiều bệnh nhân có cơn được kiểm soát tốt có thể lái xe hợp pháp. Ngừng thuốc sẽ làm tăng nguy cơ tái phát cơn và mất giấy phép lái xe.
Câu 2: Bệnh nhân hỏi về các hoạt động khác. Lời khuyên nào sau đây là hợp lý?
A. Anh ấy nên tránh bơi lội hoàn toàn.
B. Anh ấy có thể leo núi một mình nếu cảm thấy khỏe.
C. Anh ấy có thể tắm bồn thay vì tắm vòi sen.
D. Anh ấy nên luôn bơi cùng một người bạn và thông báo cho nhân viên cứu hộ.
Đáp án: D
Giải thích: An toàn là chìa khóa. Bệnh nhân động kinh, ngay cả khi cơn được kiểm soát, nên thực hiện các biện pháp phòng ngừa hợp lý. Bơi lội một mình rất nguy hiểm vì một cơn co giật đột phá có thể dẫn đến đuối nước. Bơi cùng người giám sát là một biện pháp an toàn quan trọng.
Tại sao các lựa chọn khác lại sai: Bơi lội không cần phải tránh hoàn toàn nếu có biện pháp phòng ngừa. Các hoạt động có nguy cơ cao như leo núi một mình hoặc tắm bồn (nguy cơ đuối nước) nên được tránh. Tắm vòi sen an toàn hơn tắm bồn.
Câu 3: Bệnh nhân lo lắng về việc tiết lộ tình trạng động kinh của mình cho người sử dụng lao động. Về mặt y đức và pháp lý, bác sĩ nên tư vấn như thế nào?
A. Khuyên bệnh nhân che giấu tình trạng của mình bằng mọi giá.
B. Báo cáo trực tiếp tình trạng của bệnh nhân cho người sử dụng lao động.
C. Thảo luận với bệnh nhân về các quy định bảo vệ người khuyết tật và các điều chỉnh hợp lý tại nơi làm việc, chỉ tiết lộ khi cần thiết cho sự an toàn.
D. Từ chối thảo luận về vấn đề này vì nó không liên quan đến y tế.
Đáp án: C
Giải thích: Bác sĩ nên đóng vai trò là người bênh vực bệnh nhân. Điều này bao gồm việc thông báo cho bệnh nhân về quyền lợi của họ theo luật pháp (ví dụ: luật về người khuyết tật) và thảo luận về cách và thời điểm tiết lộ thông tin. Việc tiết lộ thường chỉ cần thiết nếu tình trạng bệnh ảnh hưởng đến khả năng thực hiện các nhiệm vụ thiết yếu của công việc hoặc gây ra rủi ro an toàn trực tiếp.
Tại sao các lựa chọn khác lại sai: Che giấu có thể nguy hiểm. Báo cáo trực tiếp vi phạm quyền riêng tư của bệnh nhân. Đây là một vấn đề rất liên quan đến y tế vì nó ảnh hưởng đến chất lượng cuộc sống và sự tuân thủ điều trị.
Câu 4: Nếu bệnh nhân này bị một cơn co giật đột phá sau 3 năm, khoảng thời gian không được phép lái xe sẽ được tính như thế nào?
A. Sẽ được tính lại từ đầu kể từ ngày có cơn co giật cuối cùng.
B. Sẽ được rút ngắn một nửa vì anh ấy đã có một thời gian dài ổn định.
C. Sẽ bị cấm lái xe vĩnh viễn.
D. Sẽ không thay đổi vì đây chỉ là một cơn đơn lẻ.
Đáp án: A
Giải thích: Hầu hết các cơ quan quản lý sẽ yêu cầu "đặt lại đồng hồ". Khoảng thời gian không có cơn bắt buộc sẽ bắt đầu lại từ ngày xảy ra cơn co giật gần nhất. Điều này nhấn mạnh tầm quan trọng của việc duy trì sự kiểm soát cơn liên tục đối với những bệnh nhân muốn giữ giấy phép lái xe.
Tại sao các lựa chọn khác lại sai: Không có sự "ân xá" cho một cơn đột phá; quy tắc an toàn được áp dụng lại từ đầu. Lệnh cấm vĩnh viễn là không phổ biến. Bất kỳ cơn nào gây suy giảm ý thức đều sẽ ảnh hưởng đến giấy phép lái xe.

TÌNH HUỐNG LÂM SÀNG 34
Một thiếu niên 16 tuổi được đưa đến khám sau khi bị một cơn co cứng-co giật toàn thể trong khi đang chơi một trò chơi điện tử có nhiều ánh sáng nhấp nháy. Đây là cơn đầu tiên của cậu. Cậu cũng thừa nhận rằng đôi khi cậu cảm thấy "giật mình" hoặc "rung nhẹ" ở tay khi xem TV trong phòng tối.
Câu 1: Tình trạng của bệnh nhân rất có thể là một dạng của hội chứng nào?
A. Động kinh phản xạ 
B. Rối loạn chuyển đổi
C. Động kinh thùy chẩm
D. Hội chứng cai
Đáp án: A
Giải thích: Động kinh phản xạ là các cơn co giật được kích hoạt một cách nhất quán bởi một kích thích cụ thể. Trong trường hợp này, kích thích là ánh sáng nhấp nháy (kích thích thị giác), được gọi là động kinh nhạy cảm ánh sáng (photosensitive epilepsy). Đây là dạng động kinh phản xạ phổ biến nhất.
Tại sao các lựa chọn khác lại sai: Rối loạn chuyển đổi không có yếu tố kích hoạt sinh lý nhất quán như vậy. Động kinh thùy chẩm có thể được kích hoạt bởi ánh sáng nhưng thuật ngữ "động kinh phản xạ" mô tả chính xác hơn hiện tượng này. Không có bằng chứng về hội chứng cai.
Câu 2: Ngoài các trò chơi điện tử, yếu tố nào sau đây cũng có thể là một tác nhân gây co giật phổ biến ở những người nhạy cảm với ánh sáng?
A. Đọc sách trong điều kiện ánh sáng yếu
B. Ánh sáng mặt trời chiếu qua hàng cây khi đi xe
C. Nhìn vào một màu sắc cụ thể (ví dụ: màu đỏ)
D. Nghe nhạc có nhịp độ nhanh
Đáp án: B
Giải thích: Các tác nhân gây co giật nhạy cảm ánh sáng phổ biến bao gồm các mẫu hình có độ tương phản cao và nhấp nháy ở một tần số nhất định (thường là 15-25 Hz). Ánh sáng mặt trời nhấp nháy khi đi qua hàng cây, đèn strobe trong các câu lạc bộ, màn hình TV bị lỗi, và các mẫu hình hình học nhất định đều có thể là tác nhân.
Tại sao các lựa chọn khác lại sai: Các lựa chọn khác không phải là tác nhân kích thích thị giác nhấp nháy điển hình.
Câu 3: Lời khuyên nào là biện pháp phòng ngừa không dùng thuốc quan trọng nhất cho bệnh nhân này?
A. Đeo kính râm mọi lúc, kể cả trong nhà.
B. Che một mắt khi tiếp xúc với các kích thích ánh sáng tiềm tàng.
C. Tránh hoàn toàn việc xem TV và sử dụng máy tính.
D. Chỉ chơi các trò chơi điện tử đen trắng.
Đáp án: B
Giải thích: Việc che một mắt (loại bỏ tầm nhìn hai mắt) có thể làm giảm đáng kể hoặc loại bỏ phản ứng nhạy cảm ánh sáng ở nhiều bệnh nhân. Đây là một biện pháp sơ cứu đơn giản và hiệu quả. Các biện pháp khác bao gồm ngồi xa màn hình, sử dụng màn hình có tần số quét cao (>100 Hz), và đảm bảo phòng được chiếu sáng tốt.
Tại sao các lựa chọn khác lại sai: Đeo kính râm liên tục là không thực tế. Tránh hoàn toàn công nghệ là khó khăn và không cần thiết nếu có các biện pháp phòng ngừa. Trò chơi đen trắng vẫn có thể có các mẫu hình nhấp nháy.
Câu 4: Nếu cần điều trị bằng thuốc, ASM nào sau đây được biết là có hiệu quả đặc biệt đối với động kinh nhạy cảm ánh sáng?
A. Phenytoin
B. Valproate
C. Gabapentin
D. Tiagabine
Đáp án: B
Giải thích: Valproate là một trong những thuốc hiệu quả nhất trong việc ngăn chặn phản ứng nhạy cảm ánh sáng và các cơn co giật liên quan. Levetiracetam và Lamotrigine cũng có hiệu quả. Bệnh cảnh của bệnh nhân (giật cơ, GTCS, nhạy cảm ánh sáng) cũng rất gợi ý đến JME, mà Valproate là thuốc điều trị hàng đầu.
Tại sao các lựa chọn khác lại sai: Các thuốc phổ hẹp như Phenytoin và Tiagabine không phải là lựa chọn tốt nhất. Gabapentin không hiệu quả.

TÌNH HUỐNG LÂM SÀNG 35
Một người đàn ông 65 tuổi, có các yếu tố nguy cơ mạch máu, mô tả hai đợt triệu chứng thần kinh trong tháng qua. Mỗi đợt, ông đột ngột cảm thấy tê hoàn toàn ở môi và các ngón tay bên phải, kéo dài khoảng 60 giây rồi tự hết hoàn toàn. Ông không bị yếu liệt, không có vấn đề về ngôn ngữ hay thị giác.
Câu 1: Hai chẩn đoán phân biệt hàng đầu cho các đợt này là gì?
A. Cơn động kinh cục bộ cảm giác và cơn thiếu máu não thoáng qua (TIA)
B. Cơn hoảng sợ và hạ đường huyết
C. Migraine có aura và đa xơ cứng (MS)
D. Co thắt cơ và chèn ép dây thần kinh
Đáp án: A
Giải thích: Các triệu chứng thần kinh khu trú, đột ngột, thoáng qua và định hình ở một bệnh nhân có yếu tố nguy cơ mạch máu luôn đặt ra hai chẩn đoán phân biệt chính: TIA (nguyên nhân mạch máu) và cơn động kinh cục bộ (nguyên nhân điện sinh lý). Việc phân biệt giữa hai tình trạng này có thể khó khăn.
Tại sao các lựa chọn khác lại sai: Các lựa chọn khác ít có khả năng gây ra các triệu chứng cảm giác khu trú, định hình và ngắn như vậy.
Câu 2: Đặc điểm nào của các triệu chứng làm cho cơn động kinh cục bộ cảm giác có khả năng xảy ra hơn TIA?
A. Thời gian rất ngắn (60 giây)
B. Sự hiện diện của các triệu chứng "dương tính" (tê bì, ngứa ran)
C. Sự hồi phục hoàn toàn giữa các đợt
D. Tuổi của bệnh nhân
Đáp án: B
Giải thích: Một quy tắc chung hữu ích là các cơn động kinh thường tạo ra các triệu chứng "dương tính" (ví dụ: giật cơ, chớp sáng, cảm giác ngứa ran), trong khi các biến cố mạch máu (TIA/đột quỵ) thường tạo ra các triệu chứng "âm tính" (ví dụ: yếu liệt, mất cảm giác, mất thị lực). Cảm giác tê bì/ngứa ran là một triệu chứng dương tính, do đó nghiêng về chẩn đoán động kinh.
Tại sao các lựa chọn khác lại sai: Mặc dù các cơn động kinh thường ngắn hơn TIA, TIA cũng có thể rất ngắn. Hồi phục hoàn toàn là đặc điểm của cả hai. Tuổi tác là yếu tố nguy cơ cho cả hai.
Câu 3: Xét nghiệm nào sau đây có khả năng cao nhất để xác định chẩn đoán nếu đây là động kinh?
A. Siêu âm tim
B. Điện não đồ (EEG)
C. Holter ECG 24 giờ
D. Chụp CT mạch máu (CTA)
Đáp án: B
Giải thích: EEG là xét nghiệm duy nhất có thể phát hiện các bằng chứng trực tiếp của tính kích thích vỏ não, chẳng hạn như các phóng điện dạng động kinh giữa cơn (interictal epileptiform discharges) khu trú ở vùng vỏ não cảm giác bên trái, điều này sẽ xác nhận chẩn đoán động kinh.
Tại sao các lựa chọn khác lại sai: Các xét nghiệm còn lại (siêu âm tim, Holter ECG, CTA) được sử dụng để đánh giá các nguyên nhân mạch máu hoặc tim mạch của TIA.
Câu 4: Nếu các xét nghiệm ban đầu (bao gồm EEG và MRI) đều bình thường, và bệnh nhân có thêm một đợt nữa với các triệu chứng tương tự, hướng xử trí tiếp theo là gì?
A. Chẩn đoán là TIA và bắt đầu dùng Aspirin và Statin.
B. Chẩn đoán là động kinh và bắt đầu dùng một ASM phổ hẹp như Oxcarbazepine.
C. Coi đây là các đợt không đặc hiệu và chỉ theo dõi.
D. Cân nhắc điều trị thử bằng một ASM và đánh giá đáp ứng lâm sàng.
Đáp án: D
Giải thích: Trong những trường hợp khó phân biệt, khi các cơn tái phát và các xét nghiệm không kết luận được, một thử nghiệm điều trị (therapeutic trial) có thể hữu ích. Việc bắt đầu dùng một ASM phù hợp cho động kinh cục bộ (ví dụ: Lamotrigine, Levetiracetam, Oxcarbazepine) và quan sát xem các đợt có ngừng lại hay không có thể giúp xác nhận chẩn đoán một cách thực tế.
Tại sao các lựa chọn khác lại sai: Chẩn đoán TIA và bắt đầu điều trị kháng tiểu cầu mà không có bằng chứng rõ ràng có thể không phù hợp và có nguy cơ riêng. Chỉ theo dõi có thể khiến bệnh nhân tiếp tục chịu đựng các cơn.

TÌNH HUỐNG LÂM SÀNG 36
Một người đàn ông 40 tuổi, gốc Á, được bắt đầu điều trị bằng Carbamazepine cho động kinh cục bộ mới chẩn đoán. Hai tuần sau, anh ta cảm thấy mệt mỏi và có vẻ kiểm soát cơn kém hơn so với tuần đầu tiên. Bốn tuần sau khi bắt đầu, anh ta đến phòng khám với tình trạng sốt cao, đau họng và loét miệng.
Câu 1: Tình trạng sốt, đau họng và loét miệng ở tuần thứ tư là dấu hiệu đáng lo ngại nhất của tác dụng phụ nào?
A. Thiếu máu bất sản 
B. Viêm gan do thuốc
C. Hội chứng Stevens-Johnson (SJS)
D. Mất bạch cầu hạt 
Đáp án: D
Giải thích: Mất bạch cầu hạt là một tác dụng phụ hiếm gặp nhưng đe dọa tính mạng của Carbamazepine, đặc trưng bởi sự suy giảm nghiêm trọng của bạch cầu trung tính. Các biểu hiện ban đầu thường là sốt, khó chịu, đau họng và loét niêm mạc, phản ánh sự suy giảm khả năng chống nhiễm trùng của cơ thể. Bất kỳ bệnh nhân nào dùng Carbamazepine có các triệu chứng này cần được kiểm tra công thức máu ngay lập tức.
Tại sao các lựa chọn khác lại sai: Thiếu máu bất sản ảnh hưởng đến cả ba dòng tế bào máu. Viêm gan sẽ có triệu chứng vàng da và tăng men gan. SJS chủ yếu biểu hiện bằng phát ban và tổn thương niêm mạc lan rộng.
Câu 2: Việc kiểm soát cơn kém đi sau tuần đầu tiên có thể được giải thích bằng hiện tượng dược lý nào của Carbamazepine?
A. Tự cảm ứng men gan 
B. Ức chế men gan 
C. Dược động học bậc không
D. Tích lũy chất chuyển hóa có hoạt tính
Đáp án: A
Giải thích: Carbamazepine nổi tiếng với khả năng tự cảm ứng sự chuyển hóa của chính nó. Trong vài tuần đầu điều trị, nó làm tăng hoạt động của các enzyme gan (đặc biệt là CYP3A4) chuyển hóa nó, dẫn đến nồng độ thuốc trong máu giảm dần mặc dù vẫn dùng cùng một liều. Điều này có thể dẫn đến mất hiệu quả điều trị ban đầu và đòi hỏi phải tăng liều.
Tại sao các lựa chọn khác lại sai: Carbamazepine là chất cảm ứng, không phải ức chế. Dược động học bậc không là đặc điểm của Phenytoin. Tích lũy chất chuyển hóa không giải thích được sự giảm hiệu quả.
Câu 3: Bệnh nhân này có nguy cơ cao hơn đối với một tác dụng phụ da liễu nghiêm trọng khác của Carbamazepine do yếu tố nào?
A. Tuổi tác
B. Giới tính nam
C. Nguồn gốc châu Á
D. Sử dụng đồng thời với thuốc hạ sốt
Đáp án: C
Giải thích: Có một mối liên quan mạnh mẽ giữa sự hiện diện của allele HLA-B1502 và nguy cơ phát triển SJS/TEN khi dùng Carbamazepine. Allele này hầu như chỉ xuất hiện ở những người có nguồn gốc châu Á. Do đó, FDA khuyến cáo nên sàng lọc HLA-B1502 ở những bệnh nhân này trước khi bắt đầu dùng Carbamazepine.
Tại sao các lựa chọn khác lại sai: Các yếu tố khác không phải là yếu tố nguy cơ đã được xác định cho phản ứng đặc ứng này.
Câu 4: Sau khi hồi phục, nếu cần một ASM chẹn kênh natri thay thế có cấu trúc tương tự nhưng có thể dung nạp tốt hơn, lựa chọn nào là phù hợp?
A. Phenytoin
B. Lamotrigine
C. Oxcarbazepine
D. Valproate
Đáp án: C
Giải thích: Oxcarbazepine là một dẫn xuất của Carbamazepine. Nó có hiệu quả tương tự đối với các cơn động kinh cục bộ nhưng thường được dung nạp tốt hơn và ít gây ra các tác dụng phụ toàn thân và dị ứng hơn so với Carbamazepine. Nó cũng ít gây tự cảm ứng men gan hơn. Tuy nhiên, nguy cơ phản ứng chéo về dị ứng da vẫn tồn tại.
Tại sao các lựa chọn khác lại sai: Phenytoin và Lamotrigine có các hồ sơ tác dụng phụ khác biệt. Valproate có cơ chế tác dụng khác (không phải là chất chẹn kênh natri chính) và phổ tác dụng rộng hơn.

TÌNH HUỐNG LÂM SÀNG 37
Một nhạc sĩ 25 tuổi đến khám vì các đợt "biến dạng âm thanh" tái phát. Anh mô tả rằng thỉnh thoảng, các âm thanh xung quanh đột nhiên trở nên lớn hơn, méo mó, và anh nghe thấy một tiếng chuông vo ve ở tai phải, kéo dài khoảng 30 giây. Trong cơn, anh cảm thấy hơi choáng váng nhưng hoàn toàn tỉnh táo. Không có triệu chứng nào khác. Khám tai mũi họng và thính lực đồ hoàn toàn bình thường.
Câu 1: Dựa trên các triệu chứng, đây rất có thể là một dạng aura động kinh nào?
A. Aura thính giác
B. Aura tiền đình
C. Aura cảm giác cơ thể
D. Aura tâm thần
Đáp án: A
Giải thích: Các ảo giác thính giác, bao gồm các âm thanh đơn giản (vo ve, tiếng chuông) hoặc các âm thanh phức tạp hơn (giọng nói, âm nhạc), hoặc sự biến dạng của âm thanh thực, được định nghĩa là aura thính giác. Chúng gợi ý một cơn động kinh khởi phát từ vỏ não thính giác.
Tại sao các lựa chọn khác lại sai: Aura tiền đình gây ra cảm giác chóng mặt hoặc quay cuồng. Aura cảm giác cơ thể là cảm giác tê bì/ngứa ran trên da. Aura tâm thần là các trải nghiệm phức tạp như déjà vu.
Câu 2: Ổ động kinh có khả năng nhất nằm ở đâu?
A. Thùy chẩm phải
B. Vỏ não vận động phụ trái
C. Thùy thái dương trên bên phải (Hồi Heschl)
D. Hạnh nhân bên trái
Đáp án: C
Giải thích: Vỏ não thính giác sơ cấp nằm ở hồi Heschl, thuộc thùy thái dương trên. Aura thính giác đơn giản thường bắt nguồn từ khu vực này. Mặc dù việc định bên dựa trên aura thính giác không phải lúc nào cũng đáng tin cậy, việc nghe thấy âm thanh ở tai phải có thể gợi ý ổ động kinh ở bán cầu não đối diện (bên trái), nhưng các cơn ở vỏ não liên hợp cùng bên (phải) cũng có thể gây ra triệu chứng này. Lựa chọn C là phù hợp nhất về mặt giải phẫu.
Tại sao các lựa chọn khác lại sai: Các vùng não khác không liên quan đến việc xử lý thông tin thính giác sơ cấp.
Câu 3: Nếu các aura thính giác này sau đó tiến triển thành mất ý thức và các động tác tự động, chẩn đoán sẽ là gì?
A. Cơn động kinh cục bộ đơn giản
B. Cơn động kinh cục bộ phức tạp
C. Cơn vắng ý thức không điển hình
D. Trạng thái động kinh
Đáp án: B
Giải thích: Cơn bắt đầu bằng một aura (một dạng cơn cục bộ đơn giản) và sau đó tiến triển đến mất ý thức được định nghĩa là một cơn động kinh cục bộ phức tạp (hay cơn cục bộ suy giảm ý thức).
Tại sao các lựa chọn khác lại sai: Cơn cục bộ đơn giản không có mất ý thức. Cơn vắng là cơn toàn thể. Trạng thái động kinh là cơn kéo dài hoặc liên tục.
Câu 4: Xét nghiệm nào sau đây là quan trọng nhất để khảo sát nguyên nhân cấu trúc của loại động kinh này?
A. Điện não đồ 
B. Chọc dịch não tủy
C. Chụp cộng hưởng từ sọ não, protocol động kinh
D. Chụp PET sọ não
Đáp án: C
Giải thích: Ở một bệnh nhân có động kinh cục bộ mới khởi phát, việc tìm kiếm một tổn thương cấu trúc tiềm ẩn là bắt buộc. MRI sọ não với các chuỗi xung chuyên biệt cho động kinh (lát mỏng, vuông góc với trục của hồi hải mã) là phương pháp nhạy nhất để phát hiện các nguyên nhân phổ biến như loạn sản vỏ, khối u cấp thấp, hoặc xơ hóa hồi hải mã.
Tại sao các lựa chọn khác lại sai: EEG xác nhận hoạt động động kinh nhưng không cho thấy cấu trúc não. Chọc dịch não tủy dùng khi nghi ngờ nhiễm trùng/viêm. PET là một xét nghiệm chức năng, thường được sử dụng trong đánh giá trước phẫu thuật khi MRI âm tính.

TÌNH HUỐNG LÂM SÀNG 38
Một sinh viên đại học 19 tuổi, trước đây khỏe mạnh, được đưa vào cấp cứu vì sốt cao, đau đầu dữ dội, và sợ ánh sáng trong 24 giờ qua. Tại phòng cấp cứu, anh ta bị một cơn co cứng-co giật toàn thể. Khám thấy có dấu hiệu cứng gáy.
Câu 1: Bước chẩn đoán ngay lập tức và quan trọng nhất sau khi ổn định bệnh nhân và kiểm soát cơn co giật là gì?
A. Chụp MRI sọ não
B. Chọc dịch não tủy
C. Điện não đồ (EEG)
D. Cấy máu
Đáp án: B
Giải thích: Bệnh cảnh sốt, đau đầu, sợ ánh sáng, và cứng gáy là rất gợi ý của viêm màng não. Một cơn co giật trong bối cảnh này là một cơn động kinh triệu chứng cấp tính do nhiễm trùng hệ thần kinh trung ương. Chọc dịch não tủy là xét nghiệm "tiêu chuẩn vàng" để chẩn đoán xác định viêm màng não. Tuy nhiên, nếu bệnh nhân có dấu hiệu thần kinh khu trú, phù gai thị, hoặc suy giảm ý thức nặng, cần chụp CT sọ não trước để loại trừ hiệu ứng khối có thể gây nguy cơ tụt não.
Tại sao các lựa chọn khác lại sai: MRI và EEG có thể cần thiết nhưng không cấp bách bằng việc chẩn đoán viêm màng não. Cấy máu quan trọng nhưng chọc dịch não tủy cho kết quả trực tiếp và nhanh hơn.
Câu 2: Việc điều trị bằng kháng sinh theo kinh nghiệm nên được bắt đầu khi nào?
A. Sau khi có kết quả chọc dịch não tủy
B. Sau khi có kết quả cấy máu
C. Ngay lập tức sau khi lấy mẫu máu để cấy, không trì hoãn vì các thủ thuật chẩn đoán
D. Chỉ khi bệnh nhân có cơn co giật thứ hai
Đáp án: C
Giải thích: Viêm màng não do vi khuẩn là một cấp cứu y khoa. Việc trì hoãn điều trị kháng sinh làm tăng đáng kể tỷ lệ tử vong và di chứng. Do đó, kháng sinh theo kinh nghiệm (ví dụ: Ceftriaxone + Vancomycin +/- Ampicillin) nên được bắt đầu ngay lập tức khi có nghi ngờ lâm sàng, lý tưởng là ngay sau khi đã lấy máu để cấy. Không nên trì hoãn kháng sinh để chờ kết quả CT hoặc chọc dịch não tủy.
Tại sao các lựa chọn khác lại sai: Chờ đợi kết quả sẽ làm chậm trễ việc điều trị và gây hại cho bệnh nhân.
Câu 3: Loại co giật này được phân loại là gì?
A. Cơn động kinh không do kích thích 
B. Cơn động kinh triệu chứng cấp tính 
C. Cơn động kinh phản xạ
D. Cơn động kinh căn nguyên ẩn
Đáp án: B
Giải thích: Cơn co giật này xảy ra trực tiếp do một tình trạng bệnh lý cấp tính của hệ thần kinh trung ương (viêm màng não). Do đó, nó được phân loại là một cơn động kinh triệu chứng cấp tính hoặc "provoked seizure".
Tại sao các lựa chọn khác lại sai: Các loại khác định nghĩa các cơn co giật xảy ra mà không có một yếu tố thúc đẩy cấp tính rõ ràng.
Câu 4: Sau khi hồi phục, bệnh nhân này có nguy cơ phát triển bệnh động kinh (tức là có các cơn co giật không do kích thích trong tương lai) hay không?
A. Không, nguy cơ của anh ấy tương đương với dân số chung.
B. Có, tiền sử nhiễm trùng hệ thần kinh trung ương là một yếu tố nguy cơ đã được xác định cho bệnh động kinh sau này.
C. Chỉ khi anh ấy bị co giật trong hơn 30 phút.
D. Chỉ khi anh ấy có đột biến gen liên quan đến động kinh.
Đáp án: B
Giải thích: Nhiễm trùng hệ thần kinh trung ương trước đó (viêm màng não, viêm não) có thể để lại sẹo hoặc tổn thương não, tạo ra một ổ động kinh. Đây là một trong những nguyên nhân phổ biến nhất của động kinh triệu chứng mắc phải. Do đó, bệnh nhân này sẽ có nguy cơ phát triển động kinh mạn tính cao hơn so với dân số chung.

TÌNH HUỐNG LÂM SÀNG 39
Một phụ nữ 33 tuổi mô tả các cơn mà cô đột ngột cảm thấy sợ hãi tột độ, tim đập nhanh, sau đó cô mất nhận thức. Chồng cô quan sát thấy cô bắt đầu nhìn chằm chằm, sau đó có các động tác tự động phức tạp như đứng dậy, đi vòng quanh phòng, và cố gắng sắp xếp lại các đồ vật trên bàn một cách vô thức. Cơn kéo dài khoảng 3 phút, sau đó cô rất mệt và không nhớ gì.
Câu 1: Các động tác tự động có mục đích dường như phức tạp (đi lại, sắp xếp đồ vật) gợi ý ổ động kinh khởi phát ở đâu?
A. Thùy chẩm
B. Thùy thái dương
C. Thùy trán
D. Tiểu não
Đáp án: C
Giải thích: Các động tác tự động vận động phức tạp, đặc biệt là liên quan đến các cử động của chân (đi lại) và các hành vi có vẻ như có mục đích nhưng không phù hợp với ngữ cảnh, thường gợi ý đến động kinh thùy trán, đặc biệt là từ các vùng tiền vận động. Động kinh thùy thái dương thường có các động tác tự động đơn giản hơn, ở vùng miệng-bàn tay.
Tại sao các lựa chọn khác lại sai: Các vùng khác không liên quan đến việc tạo ra các hành vi vận động phức tạp như vậy.
Câu 2: Cảm giác sợ hãi tột độ (aura cảm xúc) thường liên quan đến cấu trúc nào trong não?
A. Vỏ não thị giác
B. Hồi trước trung tâm
C. Hạch hạnh nhân 
D. Đồi thị
Đáp án: C
Giải thích: Hạch hạnh nhân, một phần của hệ viền nằm sâu trong thùy thái dương, đóng vai trò trung tâm trong việc xử lý cảm xúc, đặc biệt là sự sợ hãi. Sự kích hoạt của hạch hạnh nhân do hoạt động động kinh thường gây ra một cảm giác sợ hãi mãnh liệt, không có nguyên nhân (ictal fear).
Tại sao các lựa chọn khác lại sai: Các cấu trúc khác liên quan đến thị giác, vận động, và chuyển tiếp cảm giác, không phải là trung tâm xử lý cảm xúc sợ hãi.
Câu 3: Sự kết hợp của aura sợ hãi (gợi ý thùy thái dương/hệ viền) và các động tác tự động phức tạp (gợi ý thùy trán) cho thấy điều gì?
A. Bệnh nhân có hai ổ động kinh riêng biệt.
B. Chẩn đoán có khả năng là PNES.
C. Cơn động kinh có thể bắt đầu từ một vùng (ví dụ, hệ viền) và lan nhanh đến vùng khác (thùy trán).
D. Các triệu chứng không có giá trị định khu.
Đáp án: C
Giải thích: Thùy trán và thùy thái dương có các kết nối mạng lưới rộng rãi. Một cơn động kinh có thể khởi phát ở một khu vực (ví dụ, hạch hạnh nhân, gây ra aura sợ hãi) và sau đó lan truyền nhanh chóng đến các vùng khác (ví dụ, vỏ não trán trước), gây ra các triệu chứng đặc trưng của vùng thứ hai. Phân tích trình tự thời gian của các triệu chứng là chìa khóa để xác định vùng khởi phát và đường lan truyền.
Tại sao các lựa chọn khác lại sai: Mạng lưới động kinh lan rộng là lời giải thích hợp lý hơn là hai ổ riêng biệt. Các triệu chứng này vẫn có giá trị định khu cao khi được phân tích theo trình tự.
Câu 4: Trong cơn động kinh cục bộ phức tạp, bệnh nhân được cho là bị "suy giảm ý thức". Điều này có nghĩa là gì?
A. Bệnh nhân bị hôn mê hoàn toàn.
B. Bệnh nhân không thể nói.
C. Bệnh nhân không nhận thức được bản thân hoặc môi trường xung quanh và không thể tương tác một cách bình thường.
D. Bệnh nhân bị mất trí nhớ về các sự kiện trước cơn.
Đáp án: C
Giải thích: "Suy giảm ý thức" (impaired awareness) trong ngữ cảnh động kinh không nhất thiết có nghĩa là bất tỉnh. Nó có nghĩa là khả năng nhận thức về bản thân và môi trường, và khả năng phản ứng một cách có ý nghĩa với các kích thích bên ngoài bị suy giảm. Bệnh nhân có thể vẫn mở mắt và thực hiện các hành vi phức tạp (động tác tự động) nhưng không thực sự "có mặt" về mặt nhận thức.
Tại sao các lựa chọn khác lại sai: Hôn mê là một mức độ suy giảm ý thức sâu hơn. Không nói được (aphasia) có thể là một phần của cơn nhưng không phải là định nghĩa của suy giảm ý thức. Mất trí nhớ là một hậu quả, không phải là bản thân trạng thái suy giảm ý thức.

TÌNH HUỐNG LÂM SÀNG 40
Một bệnh nhân 30 tuổi được đưa đến cấp cứu sau một cơn co cứng-co giật toàn thể được chứng kiến. Sau khi hồi phục, bệnh nhân hoàn toàn không nhớ gì về sự kiện. Các xét nghiệm ban đầu, bao gồm CT sọ não và điện giải đồ, đều bình thường. Bác sĩ muốn xác nhận xem đây có phải là một cơn động kinh thực thể hay không.
Câu 1: Xét nghiệm máu nào, nếu được lấy trong vòng 10-20 phút sau cơn, có thể giúp hỗ trợ chẩn đoán cơn co cứng-co giật toàn thể?
A. Nồng độ Lactate
B. Nồng độ Creatine Kinase (CK)
C. Nồng độ Prolactin
D. Nồng độ Troponin
Đáp án: C
Giải thích: Nồng độ prolactin huyết thanh thường tăng lên đáng kể sau các cơn động kinh co cứng-co giật toàn thể và cục bộ phức tạp. Mức prolactin tăng cao (thường >2-3 lần so với mức cơ bản) khi được đo trong vòng 10-20 phút sau sự kiện và so sánh với mẫu cơ bản (lấy ít nhất 6 giờ sau) có thể giúp phân biệt động kinh thực thể với ngất hoặc PNES.
Tại sao các lựa chọn khác lại sai: Lactate cũng tăng sau GTCS do co cơ kỵ khí, nhưng nó ít đặc hiệu hơn và cũng có thể tăng trong các tình trạng khác gây giảm tưới máu. CK sẽ tăng sau đó vài giờ do tiêu cơ vân, không phải là một dấu hiệu cấp tính. Troponin dùng để đánh giá tổn thương cơ tim.
Câu 2: Sự gia tăng prolactin sau cơn được cho là do đâu?
A. Sự phá hủy tế bào cơ giải phóng prolactin
B. Hoạt động động kinh lan đến vùng dưới đồi, làm gián đoạn sự ức chế dopamine
C. Đáp ứng căng thẳng của tuyến thượng thận
D. Sự giải phóng từ tuyến yên sau do kích thích thần kinh
Đáp án: B
Giải thích: Sự tiết prolactin từ thùy trước tuyến yên được điều hòa chủ yếu bởi sự ức chế của dopamine từ vùng dưới đồi. Người ta cho rằng hoạt động động kinh lan rộng, đặc biệt là đến các cấu trúc của hệ viền và thùy thái dương, làm gián đoạn tạm thời con đường ức chế này, dẫn đến sự giải phóng prolactin ồ ạt.
Tại sao các lựa chọn khác lại sai: Prolactin được sản xuất ở tuyến yên, không phải cơ. Nó được tiết ra từ thùy trước, không phải thùy sau. Đáp ứng căng thẳng không phải là cơ chế chính.
Câu 3: Trong tình huống nào sau đây, xét nghiệm prolactin sau cơn có khả năng ÂM TÍNH GIẢ (tức là không tăng mặc dù đã có cơn động kinh thực thể)?
A. Cơn co cứng-co giật toàn thể
B. Trạng thái động kinh
C. Cơn động kinh cục bộ đơn giản 
D. Cơn cục bộ phức tạp
Đáp án: C
Giải thích: Mức độ tăng prolactin phụ thuộc vào mức độ lan tỏa của hoạt động động kinh. Các cơn co giật không làm thay đổi ý thức và chỉ giới hạn ở một vùng vỏ não nhỏ, chẳng hạn như cơn cục bộ đơn giản, thường không gây ra sự gia tăng prolactin. Do đó, một kết quả prolactin bình thường không loại trừ hoàn toàn động kinh.
Tại sao các lựa chọn khác lại sai: GTCS, trạng thái động kinh và cơn cục bộ phức tạp đều có khả năng cao gây tăng prolactin.
Câu 4: Ngoài prolactin, dấu hiệu lâm sàng nào sau đây có độ đặc hiệu cao nhất để phân biệt một cơn co giật được chứng kiến với ngất?
A. Tiểu không tự chủ
B. Mắt mở trong cơn
C. Chấn thương do ngã
D. Lú lẫn sau cơn kéo dài hơn 5 phút
Đáp án: D
Giải thích: Tình trạng lú lẫn, mất định hướng, hoặc mệt mỏi sau cơn (post-ictal state) là một đặc điểm rất đặc trưng của các cơn động kinh gây suy giảm ý thức. Sự phục hồi sau ngất thường rất nhanh và hoàn toàn, trong khi giai đoạn sau cơn động kinh có thể kéo dài từ vài phút đến hàng giờ.
Tại sao các lựa chọn khác lại sai: Tiểu không tự chủ có thể xảy ra trong cả hai tình trạng. Mắt thường mở trong động kinh nhưng cũng có thể không nhắm trong ngất. Chấn thương có thể xảy ra do ngã trong cả hai trường hợp.

TÌNH HUỐNG LÂM SÀNG 41
Một cậu bé 9 tuổi bị động kinh cục bộ được kiểm soát cơn tốt bằng Levetiracetam. Tuy nhiên, trong 3 tháng qua, bố mẹ và giáo viên báo cáo rằng cậu bé trở nên rất dễ nổi cáu, hung hăng, và thường xuyên có những cơn giận dữ bộc phát ở trường. Trước khi bắt đầu điều trị, cậu bé là một đứa trẻ điềm tĩnh.
Câu 1: Sự thay đổi hành vi của cậu bé rất có thể là do đâu?
A. Sự tiến triển tự nhiên của bệnh động kinh
B. Tác dụng phụ về hành vi của Levetiracetam
C. Rối loạn chống đối thách thức mới khởi phát
D. Cơn động kinh cục bộ không vận động biểu hiện bằng sự tức giận
Đáp án: B
Giải thích: Các tác dụng phụ về hành vi và tâm thần, bao gồm cáu gắt, hung hăng, kích động và thay đổi tâm trạng, là những tác dụng phụ đã được biết rõ của Levetiracetam. Chúng có thể xảy ra ở mọi lứa tuổi nhưng đặc biệt được chú ý ở trẻ em và thanh thiếu niên.
Tại sao các lựa chọn khác lại sai: Mặc dù trẻ em bị động kinh có nguy cơ cao hơn về các vấn đề hành vi, sự thay đổi đột ngột và rõ rệt sau khi bắt đầu dùng một loại thuốc cụ thể làm cho tác dụng phụ của thuốc là nguyên nhân có khả năng nhất. Rối loạn chống đối thách thức thường có một mô hình hành vi kéo dài hơn. Cơn động kinh biểu hiện bằng sự tức giận (ictal anger) là rất hiếm.
Câu 2: Bước xử trí phù hợp nhất tiếp theo là gì?
A. Tăng liều Levetiracetam để cải thiện việc kiểm soát cơn vi thể.
B. Thêm vào một thuốc chống loạn thần như Risperidone.
C. Bổ sung Pyridoxine (Vitamin B6) và đánh giá lại.
D. Ngừng ngay lập tức Levetiracetam và không điều trị gì thêm.
Đáp án: C
Giải thích: Có một số bằng chứng cho thấy việc bổ sung Pyridoxine (Vitamin B6) có thể giúp làm giảm các tác dụng phụ về hành vi của Levetiracetam ở một số bệnh nhân. Đây là một can thiệp đơn giản, an toàn và đáng để thử trước khi quyết định chuyển sang một ASM khác. Nếu không thành công, việc chuyển thuốc sẽ là bước tiếp theo.
Tại sao các lựa chọn khác lại sai: Tăng liều Levetiracetam có thể làm các tác dụng phụ tồi tệ hơn. Thêm thuốc chống loạn thần sẽ làm tăng gánh nặng tác dụng phụ và không giải quyết được nguyên nhân gốc rễ. Ngừng thuốc đột ngột có thể gây tái phát cơn.
Câu 3: Levetiracetam và Brivaracetam có cùng cơ chế tác dụng chính là gì?
A. Chẹn kênh natri
B. Tăng cường hoạt động GABA
C. Gắn kết với protein túi synap 2A (SV2A)
D. Ức chế kênh canxi loại T
Đáp án: C
Giải thích: Cơ chế tác dụng chính và duy nhất của Levetiracetam và dẫn xuất của nó, Brivaracetam, là gắn kết với protein túi synap 2A (SV2A). Protein này có vai trò trong việc điều hòa sự giải phóng chất dẫn truyền thần kinh. Brivaracetam có ái lực cao hơn với SV2A so với Levetiracetam.
Tại sao các lựa chọn khác lại sai: Các lựa chọn khác mô tả cơ chế tác dụng của các nhóm ASM khác.
Câu 4: So với Levetiracetam, Brivaracetam được cho là có ưu điểm gì?
A. Hiệu quả hơn đáng kể trong việc kiểm soát mọi loại cơn
B. Ít có khả năng gây ra các tác dụng phụ về hành vi và tâm thần hơn
C. Có thể dùng một lần mỗi tuần
D. Không cần điều chỉnh liều ở bệnh nhân suy thận
Đáp án: B
Giải thích: Mặc dù hiệu quả lâm sàng của Brivaracetam tương đương với Levetiracetam, một số nghiên cứu và dữ liệu lâm sàng cho thấy Brivaracetam có thể có tỷ lệ gây ra các tác dụng phụ về hành vi (cáu gắt, kích động) thấp hơn so với Levetiracetam, làm cho nó trở thành một lựa chọn thay thế tiềm năng ở những bệnh nhân không dung nạp Levetiracetam vì lý do này.
Tại sao các lựa chọn khác lại sai: Hiệu quả của chúng là tương đương. Cả hai đều được dùng hai lần mỗi ngày và cần điều chỉnh liều ở bệnh nhân suy thận.

TÌNH HUỐNG LÂM SÀNG 42
Một phụ nữ 26 tuổi đến khám vì "các vấn đề về thị giác" tái phát. Cô mô tả một "đường zic-zắc lấp lánh" bắt đầu ở trung tâm tầm nhìn và lan rộng ra ngoài trong khoảng 20 phút, sau đó cô bị đau đầu dữ dội một bên kèm theo buồn nôn và sợ ánh sáng. Gần đây, cô có một đợt chỉ thấy các chấm sáng nhiều màu kéo dài khoảng 1 phút mà không có đau đầu sau đó, điều này làm cô lo lắng về động kinh.
Câu 1: Dựa trên mô tả, "đường zic-zắc lấp lánh" kéo dài 20 phút rất có thể là gì?
A. Aura thị giác của động kinh thùy chẩm
B. Aura thị giác của Migraine
C. Bong võng mạc
D. Ảo giác do thuốc
Đáp án: B
Giải thích: Aura thị giác của Migraine có những đặc điểm rất điển hình: nó phát triển dần dần trong vài phút, kéo dài từ 5 đến 60 phút, thường có cả các yếu tố dương tính (đường lấp lánh, fortification spectra) và âm tính (scotoma - điểm mù), và thường theo sau là đau đầu. Điều này khác biệt rõ rệt với aura động kinh.
Tại sao các lựa chọn khác lại sai: Aura động kinh thùy chẩm thường rất ngắn (dưới 2 phút), có các hình ảnh đơn giản (chấm màu, hình tròn) và không có sự tiến triển tuần tự như vậy. Bong võng mạc và ảo giác do thuốc có các đặc điểm khác.
Câu 2: Đợt chỉ có các chấm sáng kéo dài 1 phút mà không đau đầu có khả năng nhất là gì?
A. Một cơn động kinh thùy chẩm
B. Một cơn Migraine không có đau đầu 
C. Cả hai đều có thể xảy ra và cần đánh giá thêm
D. Một cơn thiếu máu não thoáng qua (TIA)
Đáp án: C
Giải thích: Mặc dù thời gian ngắn và các triệu chứng đơn giản (chấm sáng) gợi ý nhiều hơn đến aura động kinh, Migraine không có đau đầu cũng có thể xảy ra với aura thị giác đơn độc. Do bệnh nhân có cả hai loại hiện tượng, việc phân biệt trở nên khó khăn và cần đánh giá thêm, bao gồm cả EEG để tìm kiếm bằng chứng của động kinh.
Tại sao các lựa chọn khác lại sai: Việc kết luận vội vàng là một trong hai có thể bỏ sót chẩn đoán. TIA thường gây ra các triệu chứng âm tính (mất thị lực).
Câu 3: Yếu tố nào sau đây, nếu có, sẽ nghiêng mạnh về chẩn đoán động kinh?
A. Bệnh nhân cảm thấy buồn nôn trong cơn
B. Triệu chứng lan sang các cảm giác khác như tê bì một bên mặt
C. Bệnh nhân có tiền sử say tàu xe
D. Bệnh nhân cảm thấy mệt mỏi sau cơn
Đáp án: B
Giải thích: Sự lan truyền của các triệu chứng từ một phương thức cảm giác (thị giác) sang một phương thức khác (cảm giác cơ thể) theo một trình tự giải phẫu hợp lý (hành trình Jackson) là một dấu hiệu rất mạnh mẽ của sự lan truyền hoạt động động kinh trên vỏ não (ví dụ từ thùy chẩm sang thùy đỉnh).
Tại sao các lựa chọn khác lại sai: Buồn nôn, tiền sử say tàu xe, và mệt mỏi sau cơn đều có thể gặp trong cả Migraine và động kinh.
Câu 4: Bệnh nhân lo lắng về việc bị động kinh. Bước tiếp theo tốt nhất là gì?
A. Trấn an cô ấy rằng đây chỉ là Migraine và không cần làm gì thêm.
B. Bắt đầu ngay lập tức một thuốc chống động kinh như Levetiracetam.
C. Chỉ định một điện não đồ, có thể bao gồm cả việc kích thích ánh sáng.
D. Giới thiệu cô ấy đến bác sĩ mắt.
Đáp án: C
Giải thích: Do có sự không chắc chắn về chẩn đoán và khả năng một số đợt là động kinh, EEG là một bước chẩn đoán hợp lý. Ghi EEG trong lúc thức và ngủ, cùng với các biện pháp hoạt hóa như tăng thông khí và kích thích ánh sáng ngắt quãng, có thể phát hiện các phóng điện dạng động kinh giúp xác nhận chẩn đoán.
Tại sao các lựa chọn khác lại sai: Việc trấn an mà không điều tra thêm có thể bỏ sót chẩn đoán. Bắt đầu điều trị ASM mà không có chẩn đoán chắc chắn là không phù hợp. Khám mắt là cần thiết để loại trừ bệnh lý tại mắt, nhưng các triệu chứng của cô ấy gợi ý nhiều hơn đến nguyên nhân thần kinh trung ương.

TÌNH HUỐNG LÂM SÀNG 43
Một phụ nữ 29 tuổi bị động kinh cục bộ phức tạp từ năm 15 tuổi. Cô đã thất bại trong việc kiểm soát cơn với 4 loại thuốc chống động kinh khác nhau, bao gồm 2 phác đồ phối hợp. MRI sọ não của cô cho thấy xơ hóa hồi hải mã bên phải. Cô được giới thiệu đến một trung tâm động kinh để xem xét phẫu thuật.
Câu 1: Giai đoạn đánh giá chuyên sâu nào là cần thiết nhất để xác định xem cô ấy có phải là ứng cử viên phẫu thuật hay không?
A. Theo dõi bằng điện não đồ video dài ngày
B. Lặp lại MRI sọ não với độ phân giải cao hơn
C. Test tâm lý thần kinh 
D. Tất cả các phương pháp trên
Đáp án: D
Giải thích: Đánh giá trước phẫu thuật động kinh là một quá trình toàn diện. Theo dõi bằng Video-EEG là cần thiết để ghi lại các cơn co giật và xác nhận rằng chúng thực sự bắt nguồn từ vùng bị tổn thương trên MRI (đồng nhất giữa điện và hình ảnh). MRI độ phân giải cao xác nhận chi tiết tổn thương. Test tâm lý thần kinh đánh giá chức năng nhận thức nền (trí nhớ, ngôn ngữ) để dự đoán và theo dõi các di chứng tiềm tàng sau phẫu thuật.
Tại sao các lựa chọn khác lại sai: Mỗi xét nghiệm cung cấp một phần thông tin quan trọng; không có xét nghiệm nào đơn lẻ là đủ.
Câu 2: Mục tiêu chính của việc theo dõi bằng Video-EEG là gì?
A. Xác định loại thuốc chống động kinh tốt nhất cho bệnh nhân
B. Ghi lại các cơn co giật điển hình của bệnh nhân để xác định vùng não khởi phát cơn 
C. Đánh giá tác dụng phụ của các loại thuốc hiện tại
D. Xác định xem bệnh nhân có bị cơn giả động kinh hay không
Đáp án: B
Giải thích: Mục tiêu chính của VEEG là ghi lại đồng thời cả biểu hiện lâm sàng (video) và hoạt động điện não (EEG) của các cơn co giật tự phát của bệnh nhân. Điều này cho phép các nhà động kinh học xác định chính xác vùng não nơi cơn co giật bắt đầu, là thông tin quan trọng nhất để lập kế hoạch phẫu thuật.
Tại sao các lựa chọn khác lại sai: Mặc dù VEEG có thể giúp xác định PNES, nhưng mục tiêu chính trong bối cảnh này là định khu. Nó không dùng để lựa chọn thuốc hay đánh giá tác dụng phụ.
Câu 3: Test tâm lý thần kinh cho thấy bệnh nhân có trí nhớ lời nói tốt nhưng trí nhớ thị giác-không gian bị suy giảm. Điều này có ý nghĩa gì đối với việc lập kế hoạch phẫu thuật?
A. Nó xác nhận rằng ổ động kinh nằm ở bán cầu não trái (ưu thế về ngôn ngữ).
B. Nó gợi ý rằng phẫu thuật cắt bỏ thùy thái dương phải có nguy cơ thấp làm suy giảm thêm chức năng nhận thức.
C. Nó cho thấy bệnh nhân không phải là ứng cử viên phẫu thuật.
D. Nó không có ý nghĩa gì đối với việc lập kế hoạch phẫu thuật.
Đáp án: B
Giải thích: Bán cầu não phải thường ưu thế về các chức năng thị giác-không gian và trí nhớ phi lời nói. Việc bệnh nhân đã có suy giảm chức năng này gợi ý rằng thùy thái dương phải của cô ấy đã bị rối loạn chức năng (do xơ hóa hồi hải mã). Phẫu thuật cắt bỏ một cấu trúc đã bị tổn thương và không còn hoạt động tốt có nguy cơ gây ra di chứng mới thấp hơn so với việc cắt bỏ một cấu trúc vẫn còn hoạt động bình thường. Trí nhớ lời nói (chức năng của bán cầu trái) được bảo tồn là một dấu hiệu tốt.
Tại sao các lựa chọn khác lại sai: Nó gợi ý rối loạn chức năng ở bán cầu phải, không phải trái. Đây là một phát hiện thuận lợi, không phải là chống chỉ định. Nó có ý nghĩa rất lớn trong việc tư vấn cho bệnh nhân về những rủi ro và lợi ích.
Câu 4: Trong một số trường hợp, nếu dữ liệu từ EEG da đầu và MRI không hoàn toàn đồng nhất, bước tiếp theo có thể là gì?
A. Hủy bỏ kế hoạch phẫu thuật
B. Bắt đầu kích thích dây thần kinh phế vị (VNS)
C. Theo dõi bằng điện não đồ nội sọ 
D. Thử một loại thuốc chống động kinh mới
Đáp án: C
Giải thích: Khi các đánh giá không xâm lấn không đủ để xác định chính xác vùng sinh động kinh, bước tiếp theo có thể là theo dõi bằng điện não đồ nội sọ. Điều này liên quan đến việc phẫu thuật đặt các điện cực (dải, lưới, hoặc điện cực sâu) trực tiếp lên hoặc vào trong não để ghi lại hoạt động động kinh với độ chính xác cao hơn nhiều, cho phép định khu chính xác vùng cần cắt bỏ.
Tại sao các lựa chọn khác lại sai: Các lựa chọn khác có thể được xem xét, nhưng EEG nội sọ là bước chẩn đoán tiếp theo để làm rõ vùng sinh động kinh trước khi quyết định phẫu thuật cắt bỏ.

TÌNH HUỐNG LÂM SÀNG 44
Một người đàn ông 60 tuổi, bị động kinh kháng thuốc, đã được điều trị bổ trợ bằng Clobazam (một loại benzodiazepine) trong 2 năm qua. Ban đầu, thuốc có hiệu quả tốt, nhưng trong 6 tháng gần đây, các cơn co giật của ông đã quay trở lại tần suất như trước khi điều trị, mặc dù ông vẫn tuân thủ dùng thuốc.
Câu 1: Hiện tượng giảm hiệu quả của thuốc theo thời gian mặc dù vẫn tiếp tục sử dụng được gọi là gì?
A. Phản ứng đặc ứng 
B. Lờn thuốc
C. Phụ thuộc thuốc 
D. Tác dụng nghịch lý 
Đáp án: B
Giải thích: Lờn thuốc là một hiện tượng dược lý trong đó hiệu quả của một loại thuốc giảm dần theo thời gian khi sử dụng lặp đi lặp lại. Điều này đặc biệt phổ biến với các loại thuốc benzodiazepine trong điều trị động kinh, dẫn đến mất tác dụng chống co giật ban đầu.
Tại sao các lựa chọn khác lại sai: Phản ứng đặc ứng là một phản ứng không thể đoán trước, không liên quan đến liều lượng. Phụ thuộc thuốc là trạng thái mà cơ thể cần thuốc để hoạt động bình thường và sẽ có triệu chứng cai khi ngừng thuốc. Tác dụng nghịch lý là khi thuốc gây ra tác dụng ngược lại với mong đợi (ví dụ: gây kích động thay vì an thần).
Câu 2: Nếu quyết định ngừng Clobazam, tại sao phải giảm liều một cách từ từ?
A. Để tránh nguy cơ suy gan cấp
B. Để ngăn ngừa các triệu chứng cai thuốc, bao gồm cả co giật tái phát
C. Để cho phép nồng độ của các ASM khác tăng lên
D. Để tránh nguy cơ hạ natri máu
Đáp án: B
Giải thích: Việc sử dụng benzodiazepine lâu dài gây ra sự phụ thuộc về thể chất. Ngừng thuốc đột ngột có thể gây ra một hội chứng cai nghiêm trọng, bao gồm lo âu, mất ngủ, run, và quan trọng nhất là co giật do ngưng thuốc (withdrawal seizures), có thể nặng hơn cả các cơn co giật ban đầu.
Tại sao các lựa chọn khác lại sai: Ngừng Clobazam không gây suy gan hoặc hạ natri máu. Nó không ảnh hưởng trực tiếp đến nồng độ của các ASM khác.
Câu 3: Tác dụng phụ phổ biến nhất của Clobazam và các benzodiazepine khác là gì?
A. Tăng cân
B. Buồn ngủ và an thần
C. Sỏi thận
D. Rụng tóc
Đáp án: B
Giải thích: Buồn ngủ (somnolence), an thần (sedation), và chóng mặt là những tác dụng phụ phổ biến nhất của nhóm thuốc benzodiazepine do tác dụng ức chế hệ thần kinh trung ương của chúng.
Tại sao các lựa chọn khác lại sai: Các tác dụng phụ khác không phải là đặc trưng của benzodiazepine.
Câu 4: Benzodiazepine phát huy tác dụng chống co giật bằng cách nào?
A. Chẹn kênh natri phụ thuộc điện thế
B. Tăng cường tác dụng của chất dẫn truyền thần kinh ức chế GABA tại thụ thể GABA-A
C. Ức chế thụ thể glutamate NMDA
D. Gắn kết với protein SV2A
Đáp án: B
Giải thích: Benzodiazepine là các chất điều hòa dị lập thể dương tính (positive allosteric modulators) của thụ thể GABA-A. Chúng gắn vào một vị trí riêng biệt trên phức hợp thụ thể, làm tăng tần suất mở của kênh Clorua khi GABA gắn vào, dẫn đến tăng dòng ion Cl- vào trong tế bào, gây ưu phân cực và ức chế tế bào thần kinh.
Tại sao các lựa chọn khác lại sai: Các lựa chọn khác mô tả cơ chế của các nhóm ASM khác.

TÌNH HUỐNG LÂM SÀNG 45
Một cụ bà 85 tuổi sống một mình được con gái đưa đi khám vì bà đã bị ngã 3 lần trong 2 tháng qua mà không có lý do rõ ràng. Bà không nhớ gì về các cú ngã. Con gái bà lo lắng về ngất do tim. Khám tim mạch và ECG bình thường. Holter 24 giờ không phát hiện rối loạn nhịp. Khám thần kinh không có dấu hiệu khu trú.
Câu 1: Ngoài các nguyên nhân tim mạch và ngã thông thường, chẩn đoán thần kinh nào cần được xem xét ở một bệnh nhân lớn tuổi có các cơn ngã không giải thích được?
A. Bệnh Parkinson
B. Đa xơ cứng (MS)
C. Cơn động kinh không được nhận biết
D. Bệnh thần kinh ngoại biên
Đáp án: C
