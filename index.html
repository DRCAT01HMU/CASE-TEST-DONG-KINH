<script type="text/template" id="quizData">
TÌNH HUỐNG LÂM SÀNG ĐỘNG KINH
TEAMDRCAT
Tài liệu được biên soạn dựa trên kiến thức chuẩn Y Hà Nội và các Hướng dẫn Y Khoa cập nhật
Nghiêm cấm sao chép dưới mọi hình thức !!

TÌNH HUỐNG LÂM SÀNG 1
Một nam sinh viên 22 tuổi được đưa đến khoa cấp cứu sau khi bạn cùng phòng chứng kiến anh ta đột ngột mất ý thức, co cứng toàn thân, sau đó co giật nhịp nhàng cả tay và chân trong khoảng 90 giây. Bệnh nhân không có tiền sử bệnh lý, không chấn thương đầu, không sử dụng chất cấm gần đây. Khám lúc vào viện, bệnh nhân lơ mơ nhưng có thể đánh thức, chỉ định hướng được bản thân. Khám thần kinh không có dấu hiệu khu trú.
Câu 1: Xét nghiệm hình ảnh học nào nên được chỉ định đầu tiên tại khoa cấp cứu?
A. Chụp cộng hưởng từ sọ não có tiêm thuốc đối quang từ
B. Chụp cắt lớp vi tính sọ não không tiêm thuốc cản quang
C. Siêu âm Doppler xuyên sọ
D. Chọc dịch não tủy
Đáp án: B
Giải thích: Trong bối cảnh cấp cứu một cơn co giật lần đầu, ưu tiên hàng đầu là loại trừ các nguyên nhân cấu trúc cấp tính, đe dọa tính mạng như xuất huyết nội sọ, khối u lớn hoặc chấn thương. CT sọ não không cản quang là phương pháp nhanh, sẵn có và hiệu quả để phát hiện các tình trạng này.
Tại sao các lựa chọn khác lại sai: MRI có độ nhạy cao hơn đối với các tổn thương nhỏ hoặc xơ hóa hồi hải mã nhưng không phải là lựa chọn đầu tay trong cấp cứu vì thời gian thực hiện lâu hơn và không sẵn có bằng CT. Siêu âm Doppler xuyên sọ dùng để đánh giá mạch máu, không phù hợp để khảo sát nhu mô não. Chọc dịch não tủy chỉ được chỉ định khi nghi ngờ nhiễm trùng hệ thần kinh trung ương (viêm màng não, viêm não).
Câu 2: Phát hiện nào sau đây cho phép chẩn đoán xác định bệnh động kinh ngay sau cơn co giật đầu tiên này, theo định nghĩa của ILAE 2014?
A. Điện não đồ (EEG) trong cơn ghi nhận hoạt động kịch phát
B. Tiền sử gia đình có người mắc bệnh động kinh
C. MRI sọ não phát hiện một dị dạng cavernoma nhỏ
D. Bệnh nhân có tình trạng lú lẫn sau cơn kéo dài
Đáp án: C
Giải thích: Theo định nghĩa thực hành của Liên đoàn Chống Động kinh Quốc tế (ILAE), bệnh động kinh có thể được chẩn đoán sau một cơn co giật không do kích thích duy nhất nếu có một tình trạng não bộ làm tăng nguy cơ tái phát cơn trong 10 năm tới lên trên 60%. Một tổn thương cấu trúc như dị dạng cavernoma là một yếu tố nguy cơ như vậy.
Tại sao các lựa chọn khác lại sai: EEG trong cơn xác nhận bản chất động kinh của cơn co giật nhưng không tự động chẩn đoán bệnh động kinh mạn tính. Tiền sử gia đình làm tăng nghi ngờ nhưng không đủ để chẩn đoán. Lú lẫn sau cơn là đặc điểm của cơn co giật, không phải là tiêu chí chẩn đoán bệnh.
Câu 3: Nếu quyết định bắt đầu điều trị bằng thuốc chống động kinh (ASM), lựa chọn nào là phù hợp nhất cho một cơn co cứng - co giật khởi phát toàn thể?
A. Carbamazepine
B. Ethosuximide
C. Levetiracetam
D. Vigabatrin
Đáp án: C
Giải thích: Levetiracetam là một ASM phổ rộng, hiệu quả cho cả động kinh cục bộ và toàn thể, bao gồm cả cơn co cứng - co giật. Nó có ít tương tác thuốc và dung nạp tốt, là lựa chọn hàng đầu cho nhiều loại cơn.
Tại sao các lựa chọn khác lại sai: Carbamazepine là thuốc phổ hẹp, chủ yếu dùng cho động kinh cục bộ và có thể làm nặng thêm một số hội chứng động kinh toàn thể. Ethosuximide chỉ có hiệu quả đối với cơn vắng ý thức. Vigabatrin được chỉ định trong các trường hợp đặc biệt như co thắt ở trẻ sơ sinh và có thể gây thu hẹp thị trường không hồi phục.
Câu 4: Điểm tư vấn quan trọng nhất cần cung cấp cho bệnh nhân này trước khi xuất viện là gì?
A. Bệnh nhân phải bắt đầu chế độ ăn ketogenic ngay lập tức.
B. Bệnh nhân phải tạm ngưng lái xe và cần được tư vấn về luật pháp địa phương.
C. Bệnh nhân cần tránh hoàn toàn việc tiêu thụ caffeine.
D. Bệnh nhân nên dùng thuốc an thần mỗi tối để đảm bảo giấc ngủ.
Đáp án: B
Giải thích: An toàn của bệnh nhân và cộng đồng là ưu tiên hàng đầu. Sau một cơn co giật gây mất ý thức, bệnh nhân có nguy cơ tái phát và gây tai nạn. Hầu hết các quốc gia đều có quy định pháp lý yêu cầu bệnh nhân phải ngưng lái xe trong một khoảng thời gian nhất định (thường là 6 tháng đến 1 năm) và cho đến khi cơn co giật được kiểm soát tốt.
Tại sao các lựa chọn khác lại sai: Chế độ ăn ketogenic là một phương pháp điều trị chuyên biệt, không phải là lựa chọn đầu tay. Tránh caffeine và đảm bảo giấc ngủ là lời khuyên hữu ích, nhưng không cấp bách và quan trọng bằng việc ngưng lái xe. Thuốc an thần không phải là điều trị chuẩn cho động kinh và có thể gây tác dụng phụ.

TÌNH HUỐNG LÂM SÀNG 2
Một bé gái 7 tuổi được bố mẹ đưa đến khám vì cô bé thường xuyên có những giai đoạn "mơ màng" ngắn. Giáo viên cho biết trong lớp, cô bé đột ngột ngừng viết, mắt nhìn chằm chằm vô định trong khoảng 10 giây rồi tiếp tục hoạt động như chưa có gì xảy ra. Cô bé không nhớ gì về những khoảnh khắc này. Khám lâm sàng và thần kinh hoàn toàn bình thường. EEG cho thấy các phức hợp gai-sóng chậm 3 Hz lan tỏa, đối xứng khi cho bệnh nhân tăng thông khí.
Câu 1: Chẩn đoán phù hợp nhất cho bệnh nhân này là gì?
A. Động kinh cục bộ phức tạp 
B. Động kinh vắng ý thức ở trẻ em 
C. Cơn giả động kinh do nguyên nhân tâm lý (PNES)
D. Rối loạn tăng động giảm chú ý (ADHD)
Đáp án: B
Giải thích: Bệnh cảnh lâm sàng với các cơn ngưng hoạt động đột ngột, ngắn (khoảng 10 giây), mất ý thức thoáng qua và phục hồi ngay lập tức, cùng với phát hiện EEG điển hình là phức hợp gai-sóng chậm 3 Hz lan tỏa khi tăng thông khí, là những đặc điểm kinh điển của động kinh vắng ý thức ở trẻ em.
Tại sao các lựa chọn khác lại sai: Động kinh cục bộ phức tạp thường kéo dài hơn, có thể có các động tác tự động và giai đoạn lú lẫn sau cơn. PNES không có bất thường EEG đặc hiệu trong cơn. ADHD biểu hiện bằng sự mất tập trung kéo dài, không phải là các cơn rời rạc, đột ngột.
Câu 2: Thuốc nào sau đây là lựa chọn điều trị hàng đầu cho tình trạng của bệnh nhân?
A. Phenytoin
B. Carbamazepine
C. Ethosuximide
D. Gabapentin
Đáp án: C
Giải thích: Ethosuximide là thuốc được lựa chọn hàng đầu (first-line) cho động kinh vắng ý thức ở trẻ em không biến chứng. Nó có hiệu quả cao và ít tác dụng phụ lên nhận thức so với các lựa chọn khác như Valproate.
Tại sao các lựa chọn khác lại sai: Phenytoin và Carbamazepine là các thuốc phổ hẹp có thể làm nặng thêm cơn vắng ý thức. Gabapentin không được chỉ định để điều trị cơn vắng ý thức.
Câu 3: Tiên lượng lâu dài của hội chứng này là gì?
A. Hầu hết trẻ sẽ tiếp tục bị co giật đến tuổi trưởng thành.
B. Khoảng 50% sẽ phát triển thành hội chứng Lennox-Gastaut.
C. Hầu hết trẻ sẽ hết cơn khi đến tuổi vị thành niên.
D. Thường dẫn đến suy giảm nhận thức nghiêm trọng và vĩnh viễn.
Đáp án: C
Giải thích: Động kinh vắng ý thức ở trẻ em (CAE) là một hội chứng động kinh lành tính. Với điều trị thích hợp, khoảng 60-70% trẻ em sẽ hết cơn (remission) khi đến tuổi vị thành niên và có thể ngưng thuốc thành công.
Tại sao các lựa chọn khác lại sai: Chỉ một tỷ lệ nhỏ tiếp tục bị co giật, thường là các cơn co cứng-co giật toàn thể. Chuyển thành Lennox-Gastaut là rất hiếm. Suy giảm nhận thức nghiêm trọng không phải là đặc điểm của CAE điển hình.
Câu 4: Nếu bệnh nhân cũng có các cơn co cứng-co giật toàn thể kèm theo, thuốc nào sau đây sẽ là lựa chọn phù hợp hơn?
A. Ethosuximide
B. Valproate
C. Tiagabine
D. Oxcarbazepine
Đáp án: B
Giải thích: Valproate là một ASM phổ rộng, có hiệu quả đối với cả cơn vắng ý thức và cơn co cứng-co giật toàn thể. Khi một bệnh nhân có cả hai loại cơn này, Valproate là lựa chọn hàng đầu để kiểm soát toàn bộ phổ co giật.
Tại sao các lựa chọn khác lại sai: Ethosuximide chỉ có tác dụng với cơn vắng. Tiagabine và Oxcarbazepine là các thuốc phổ hẹp có thể làm nặng thêm cả hai loại cơn động kinh toàn thể này.

TÌNH HUỐNG LÂM SÀNG 3
Một phụ nữ 30 tuổi, mang thai 10 tuần, có tiền sử động kinh được kiểm soát tốt bằng Valproate 500mg hai lần mỗi ngày. Cô đến khám thai định kỳ và bày tỏ lo ngại về sự an toàn của thuốc đối với thai nhi. Cô đã không có cơn co giật nào trong 3 năm qua. Khám lâm sàng không ghi nhận bất thường.
Câu 1: Nguy cơ chính liên quan đến việc sử dụng Valproate trong thai kỳ là gì?
A. Dị tật ống thần kinh 
B. Bệnh tim bẩm sinh
C. Hẹp môn vị phì đại
D. Bất sản thận hai bên
Đáp án: A
Giải thích: Valproate có nguy cơ gây quái thai cao nhất trong số các ASM, đặc biệt là dị tật ống thần kinh (như tật nứt đốt sống), với nguy cơ phụ thuộc vào liều lượng. Nguy cơ này cao hơn đáng kể so với các ASM khác và dân số chung.
Tại sao các lựa chọn khác lại sai: Mặc dù các ASM khác có thể liên quan đến bệnh tim bẩm sinh, dị tật ống thần kinh là nguy cơ đặc trưng và nổi bật nhất của Valproate. Hẹp môn vị và bất sản thận không phải là dị tật điển hình liên quan đến Valproate.
Câu 2: Hướng xử trí phù hợp nhất cho bệnh nhân này là gì?
A. Ngừng ngay lập tức Valproate vì nguy cơ cho thai nhi.
B. Tiếp tục Valproate với liều hiện tại và bổ sung liều cao acid folic.
C. Chuyển sang Levetiracetam hoặc Lamotrigine càng sớm càng tốt.
D. Tăng liều Valproate để phòng ngừa cơn co giật do thay đổi chuyển hóa trong thai kỳ.
Đáp án: C
Giải thích: Do nguy cơ quái thai cao của Valproate, đặc biệt trong tam cá nguyệt thứ nhất khi các cơ quan đang hình thành, việc chuyển sang một ASM an toàn hơn như Levetiracetam hoặc Lamotrigine là chiến lược được khuyến cáo. Việc chuyển đổi nên được thực hiện cẩn thận dưới sự giám sát của bác sĩ chuyên khoa thần kinh để tránh mất kiểm soát cơn.
Tại sao các lựa chọn khác lại sai: Ngừng thuốc đột ngột có thể gây ra cơn co giật, đe dọa cả mẹ và thai. Tiếp tục Valproate vẫn duy trì nguy cơ cao. Tăng liều sẽ làm tăng nguy cơ hơn nữa.
Câu 3: Lời khuyên nào sau đây là cần thiết cho TẤT CẢ phụ nữ mang thai bị động kinh?
A. Nên sinh mổ để tránh co giật trong lúc chuyển dạ.
B. Cần bổ sung Vitamin K trong tháng cuối của thai kỳ.
C. Nên ngừng cho con bú nếu vẫn đang dùng ASM.
D. Phải đo nồng độ thuốc trong máu hàng tuần.
Đáp án: B
Giải thích: Một số ASM thế hệ cũ (phenobarbital, phenytoin, carbamazepine) là chất cảm ứng men gan, có thể làm tăng chuyển hóa vitamin K ở cả mẹ và trẻ sơ sinh, dẫn đến nguy cơ xuất huyết ở trẻ sơ sinh do thiếu vitamin K. Do đó, việc bổ sung vitamin K dự phòng cho mẹ trong tháng cuối thai kỳ được khuyến cáo. Mặc dù không phải tất cả ASM đều gây ra điều này, đây là một thực hành an toàn phổ biến.
Tại sao các lựa chọn khác lại sai: Sinh thường vẫn an toàn với kiểm soát đau tốt. Hầu hết ASM được xem là an toàn khi cho con bú, lợi ích vượt trội nguy cơ. Việc theo dõi nồng độ thuốc phụ thuộc vào loại thuốc và tình trạng lâm sàng, không nhất thiết phải hàng tuần.
Câu 4: Nếu bệnh nhân quyết định tiếp tục dùng Valproate sau khi đã được tư vấn đầy đủ, xét nghiệm sàng lọc nào là quan trọng nhất trong tam cá nguyệt thứ hai?
A. Đo chiều dài cổ tử cung
B. Siêu âm hình thái chi tiết và đo nồng độ alpha-fetoprotein (AFP) trong huyết thanh mẹ
C. Nghiệm pháp dung nạp glucose đường uống
D. Nuôi cấy dịch âm đạo tìm liên cầu khuẩn nhóm B
Đáp án: B
Giải thích: Do nguy cơ cao của dị tật ống thần kinh liên quan đến Valproate, việc sàng lọc bằng siêu âm hình thái chi tiết (level II ultrasound) và đo AFP huyết thanh mẹ vào khoảng 16-18 tuần là cực kỳ quan trọng để phát hiện sớm các bất thường này.
Tại sao các lựa chọn khác lại sai: Các xét nghiệm khác là một phần của chăm sóc tiền sản thường quy nhưng không đặc hiệu để sàng lọc dị tật do Valproate gây ra.

TÌNH HUỐNG LÂM SÀNG 4
Một người đàn ông 65 tuổi được đưa đến cấp cứu trong tình trạng co giật liên tục. Bệnh nhân có tiền sử nghiện rượu và đã ngừng uống đột ngột 2 ngày trước. Tại phòng cấp cứu, ông ta vẫn đang co cứng-co giật toàn thể. Nhịp tim 130 lần/phút, huyết áp 160/95 mmHg, SpO2 88% dù đang thở oxy qua mặt nạ. Cơn co giật đã kéo dài 8 phút kể từ khi nhân viên y tế đến nơi.
Câu 1: Bước xử trí ngay lập tức và quan trọng nhất là gì?
A. Đặt nội khí quản
B. Tiêm tĩnh mạch Lorazepam
C. Truyền tĩnh mạch Levetiracetam
D. Chụp CT sọ não cấp cứu
Đáp án: B
Giải thích: Theo phác đồ điều trị trạng thái động kinh (Status Epilepticus - SE), bước đầu tiên sau khi ổn định đường thở, hô hấp, tuần hoàn (ABC) là chấm dứt cơn co giật bằng một loại benzodiazepine tác dụng nhanh. Lorazepam (hoặc Diazepam) tiêm tĩnh mạch là lựa chọn hàng đầu. Cơn co giật kéo dài > 5 phút được định nghĩa là SE.
Tại sao các lựa chọn khác lại sai: Đặt nội khí quản có thể cần thiết nếu bệnh nhân suy hô hấp hoặc không bảo vệ được đường thở, nhưng ưu tiên đầu tiên là cố gắng chấm dứt cơn co giật bằng thuốc. Levetiracetam là thuốc điều trị bước thứ hai (second-line), được dùng sau khi benzodiazepine thất bại hoặc để phòng ngừa tái phát. CT sọ não cần được thực hiện nhưng chỉ sau khi cơn co giật đã được kiểm soát.
Câu 2: Nếu cơn co giật vẫn tiếp diễn 5 phút sau hai liều Lorazepam, bước tiếp theo phù hợp nhất là gì?
A. Tiêm tĩnh mạch thêm một liều Diazepam
B. Truyền tải (loading dose) Fosphenytoin tĩnh mạch
C. Bắt đầu truyền liên tục Midazolam
D. Chuẩn bị gây mê bằng Propofol
Đáp án: B
Giải thích: Nếu liệu pháp benzodiazepine bước đầu thất bại, phác đồ điều trị SE khuyến cáo sử dụng một liều tải của một ASM tác dụng kéo dài hơn. Các lựa chọn hàng đầu bao gồm Fosphenytoin, Valproate, hoặc Levetiracetam. Fosphenytoin là một lựa chọn kinh điển và hiệu quả.
Tại sao các lựa chọn khác lại sai: Dùng thêm benzodiazepine sau khi đã thất bại với liều đủ làm tăng nguy cơ suy hô hấp mà ít có khả năng chấm dứt cơn. Truyền Midazolam hoặc Propofol là các biện pháp điều trị cho trạng thái động kinh kháng trị (refractory SE), được sử dụng sau khi liệu pháp bước hai thất bại.
Câu 3: Nguyên nhân có khả năng nhất gây ra trạng thái động kinh ở bệnh nhân này là gì?
A. U não
B. Hội chứng cai rượu
C. Viêm màng não do vi khuẩn
D. Hạ natri máu
Đáp án: B
Giải thích: Bệnh nhân có tiền sử nghiện rượu và ngừng uống đột ngột 2 ngày trước, đây là một bối cảnh kinh điển cho hội chứng cai rượu, một nguyên nhân phổ biến gây ra co giật và trạng thái động kinh.
Tại sao các lựa chọn khác lại sai: Mặc dù các nguyên nhân khác cũng có thể gây SE, tiền sử của bệnh nhân làm cho hội chứng cai rượu trở thành nguyên nhân có khả năng nhất. Các nguyên nhân này cần được loại trừ trong quá trình thăm khám và xét nghiệm sau khi kiểm soát cơn.
Câu 4: Biến chứng toàn thân nào sau đây là mối lo ngại lớn nhất trong trạng thái động kinh co giật kéo dài?
A. Tăng thân nhiệt và tiêu cơ vân 
B. Hạ huyết áp và nhịp tim chậm
C. Kiềm hô hấp
D. Hạ đường huyết
Đáp án: A
Giải thích: Hoạt động cơ dữ dội và liên tục trong SE co giật gây ra sự sản sinh nhiệt lớn, dẫn đến tăng thân nhiệt. Đồng thời, nó gây phá hủy cơ vân, giải phóng myoglobin vào máu (tiêu cơ vân), có thể dẫn đến tổn thương thận cấp. Đây là những biến chứng nghiêm trọng và đe dọa tính mạng.
Tại sao các lựa chọn khác lại sai: SE thường gây tăng huyết áp và nhịp tim nhanh do đáp ứng giao cảm. Nó gây ra toan chuyển hóa (do lactic) và toan hô hấp (do suy hô hấp), không phải kiềm hô hấp. Nhu cầu chuyển hóa của não tăng cao, có thể gây hạ đường huyết, nhưng tiêu cơ vân và tăng thân nhiệt là những biến chứng trực tiếp và nguy hiểm hơn.

TÌNH HUỐNG LÂM SÀNG 5
Một thanh niên 19 tuổi được đưa đến phòng khám thần kinh. Trong 2 năm qua, anh ta thường xuyên bị giật đột ngột ở cả hai cánh tay vào buổi sáng, ngay sau khi thức dậy, đặc biệt là khi thiếu ngủ. Những cơn giật này đôi khi khiến anh ta làm rơi bàn chải đánh răng hoặc cốc cà phê. Anh ta cũng có 2 lần bị co cứng-co giật toàn thể sau những đêm thức khuya học thi. Khám thần kinh hoàn toàn bình thường.
Câu 1: Chẩn đoán có khả năng nhất là gì?
A. Động kinh thùy trán
B. Động kinh giật cơ tuổi vị thành niên (JME)
C. Hội chứng Lennox-Gastaut
D. Cơn co giật do sốt
Đáp án: B
Giải thích: Bệnh cảnh lâm sàng với khởi phát ở tuổi vị thành niên, các cơn giật cơ (myoclonic jerks) ở chi trên vào buổi sáng, được kích hoạt bởi thiếu ngủ, và có các cơn co cứng-co giật toàn thể (GTCS) là bộ ba triệu chứng kinh điển của JME.
Tại sao các lựa chọn khác lại sai: Động kinh thùy trán thường có các động tác tự động kỳ lạ và xảy ra trong giấc ngủ. Hội chứng Lennox-Gastaut là một bệnh não động kinh nặng ở trẻ nhỏ với nhiều loại cơn và chậm phát triển. Cơn co giật do sốt xảy ra ở trẻ nhỏ và liên quan đến sốt.
Câu 2: Thuốc nào sau đây nên được TRÁNH sử dụng cho bệnh nhân này?
A. Valproate
B. Levetiracetam
C. Lamotrigine
D. Carbamazepine
Đáp án: D
Giải thích: Carbamazepine là một thuốc chống động kinh phổ hẹp, có hiệu quả với cơn cục bộ nhưng có thể làm nặng thêm các cơn giật cơ và cơn vắng ý thức, là những loại cơn có thể gặp trong JME. Việc sử dụng nó có thể dẫn đến mất kiểm soát cơn.
Tại sao các lựa chọn khác lại sai: Valproate được coi là thuốc hiệu quả nhất cho JME vì nó kiểm soát được cả ba loại cơn (giật cơ, vắng ý thức, GTCS). Levetiracetam và Lamotrigine cũng là các lựa chọn phổ rộng hiệu quả và thường được sử dụng, đặc biệt ở phụ nữ trong độ tuổi sinh đẻ để tránh Valproate.
Câu 3: Bệnh nhân nên được tư vấn như thế nào về việc điều trị lâu dài?
A. Bệnh có thể tự khỏi sau vài năm và có thể ngừng thuốc.
B. Điều trị thường là cần thiết suốt đời để ngăn ngừa tái phát cơn.
C. Phẫu thuật cắt bỏ ổ động kinh là phương pháp điều trị triệt để.
D. Chế độ ăn ketogenic thường được yêu cầu để kiểm soát cơn.
Đáp án: B
Giải thích: JME là một hội chứng động kinh di truyền và thường cần điều trị suốt đời. Nguy cơ tái phát cơn khi ngừng thuốc là rất cao (>80-90%), ngay cả sau nhiều năm không có cơn.
Tại sao các lựa chọn khác lại sai: JME không tự khỏi. Đây là một dạng động kinh toàn thể di truyền, không có ổ khu trú để phẫu thuật. Chế độ ăn ketogenic không phải là điều trị tiêu chuẩn cho JME ở người lớn.
Câu 4: Yếu tố lối sống nào là quan trọng nhất cần nhấn mạnh để tránh khởi phát cơn?
A. Tránh các hoạt động thể chất gắng sức
B. Tránh ánh sáng nhấp nháy và đảm bảo ngủ đủ giấc
C. Hạn chế lượng protein trong chế độ ăn
D. Tránh sử dụng màn hình máy tính
Đáp án: B
Giải thích: Các yếu tố khởi phát cơn (seizure triggers) kinh điển trong JME bao gồm thiếu ngủ, mệt mỏi, stress, uống rượu và nhạy cảm với ánh sáng (photosensitivity). Tư vấn cho bệnh nhân tránh các yếu tố này, đặc biệt là đảm bảo vệ sinh giấc ngủ tốt, là một phần quan trọng của việc quản lý bệnh.
Tại sao các lựa chọn khác lại sai: Hoạt động thể chất không phải là yếu tố khởi phát điển hình. Chế độ ăn và sử dụng máy tính không phải là các yếu tố chính, mặc dù một số bệnh nhân có thể nhạy cảm với ánh sáng từ màn hình.

TÌNH HUỐNG LÂM SÀNG 6
Một phụ nữ 28 tuổi được chẩn đoán động kinh cục bộ 3 tuần trước và được bắt đầu điều trị bằng Lamotrigine, tăng liều dần. Hôm nay, cô đến phòng khám với tình trạng sốt, đau họng, và phát ban đỏ lan tỏa khắp cơ thể, bao gồm cả lòng bàn tay và lòng bàn chân. Khám thấy có tổn thương niêm mạc miệng và kết mạc mắt.
Câu 1: Chẩn đoán có khả năng nhất là gì?
A. Phản ứng dị ứng thuốc thông thường
B. Hội chứng Stevens-Johnson (SJS)
C. Bệnh sởi
D. Lupus ban đỏ hệ thống do thuốc
Đáp án: B
Giải thích: Bệnh cảnh phát ban lan tỏa, sốt, và tổn thương niêm mạc (miệng, mắt) ở một bệnh nhân mới bắt đầu dùng Lamotrigine là dấu hiệu báo động đỏ cho Hội chứng Stevens-Johnson (SJS), một phản ứng da liễu nghiêm trọng, đe dọa tính mạng. Lamotrigine là một trong những thuốc có nguy cơ cao gây ra SJS, đặc biệt khi tăng liều quá nhanh.
Tại sao các lựa chọn khác lại sai: Phản ứng dị ứng thuốc thông thường thường chỉ là phát ban dạng sẩn, ít khi có tổn thương niêm mạc hoặc triệu chứng toàn thân nặng. Bệnh sởi thường có các đốm Koplik và diễn tiến khác. Lupus do thuốc hiếm khi gây tổn thương niêm mạc cấp tính và nặng nề như vậy.
Câu 2: Bước xử trí ngay lập tức và quan trọng nhất là gì?
A. Giảm liều Lamotrigine xuống một nửa
B. Thêm một thuốc kháng histamine đường uống
C. Ngừng ngay lập tức Lamotrigine và nhập viện
D. Bắt đầu một đợt điều trị corticosteroid tại nhà
Đáp án: C
Giải thích: Khi nghi ngờ SJS, bước xử trí quan trọng nhất là ngừng ngay lập tức thuốc nghi ngờ gây ra phản ứng. Bệnh nhân cần được nhập viện để theo dõi sát, chăm sóc hỗ trợ (bù dịch, dinh dưỡng, chăm sóc vết thương) và có thể cần điều trị chuyên sâu tại đơn vị bỏng hoặc hồi sức tích cực.
Tại sao các lựa chọn khác lại sai: Giảm liều là không đủ và nguy hiểm. Thuốc kháng histamine không có tác dụng trong SJS. Điều trị corticosteroid có thể cần thiết nhưng phải được thực hiện trong bệnh viện sau khi đã chẩn đoán và ngừng thuốc gây bệnh.
Câu 3: Yếu tố nào làm tăng nguy cơ phát triển SJS khi sử dụng Lamotrigine?
A. Tăng liều thuốc quá nhanh
B. Sử dụng đồng thời với Levetiracetam
C. Bệnh nhân có tiền sử dị ứng với penicillin
D. Nồng độ albumin máu thấp
Đáp án: A
Giải thích: Nguy cơ phát triển phát ban nghiêm trọng, bao gồm SJS, với Lamotrigine tăng lên đáng kể khi liều khởi đầu quá cao hoặc khi liều được tăng nhanh hơn so với khuyến cáo. Sử dụng đồng thời với Valproate (làm tăng nồng độ Lamotrigine) cũng là một yếu tố nguy cơ.
Tại sao các lựa chọn khác lại sai: Levetiracetam không có tương tác đáng kể làm tăng nguy cơ SJS với Lamotrigine. Dị ứng penicillin không phải là yếu tố nguy cơ chéo. Nồng độ albumin không liên quan trực tiếp đến nguy cơ này.
Câu 4: Sau khi hồi phục, nếu bệnh nhân cần một ASM khác để điều trị động kinh cục bộ, lựa chọn nào sau đây là hợp lý nhất?
A. Carbamazepine
B. Phenytoin
C. Levetiracetam
D. Oxcarbazepine
Đáp án: C
Giải thích: Sau một phản ứng quá mẫn nghiêm trọng như SJS với một ASM, nên tránh các ASM khác có cấu trúc hóa học tương tự (đặc biệt là các hợp chất thơm như Carbamazepine, Phenytoin, Oxcarbazepine) do nguy cơ phản ứng chéo. Levetiracetam có cấu trúc hóa học hoàn toàn khác và nguy cơ gây SJS rất thấp, làm cho nó trở thành một lựa chọn thay thế an toàn.
Tại sao các lựa chọn khác lại sai: Carbamazepine, Phenytoin, và Oxcarbazepine đều là các ASM thơm và có nguy cơ phản ứng chéo với Lamotrigine, làm tăng khả năng tái phát phản ứng da nghiêm trọng.

TÌNH HUỐNG LÂM SÀNG 7
Một người đàn ông 70 tuổi, có tiền sử tăng huyết áp và đái tháo đường type 2, bị ngã trong khi đang đứng xếp hàng ở ngân hàng. Nhân chứng cho biết ông ta đột ngột ngã quỵ xuống đất và bất tỉnh trong khoảng 20 giây. Sau khi tỉnh lại, ông ta cảm thấy hơi choáng váng nhưng hoàn toàn tỉnh táo và định hướng được ngay lập tức. Ông không nhớ gì về sự kiện. Khám lâm sàng không có dấu hiệu thần kinh khu trú, không có vết cắn lưỡi, không tiểu dầm.
Câu 1: Chẩn đoán có khả năng nhất giải thích cho sự kiện này là gì?
A. Cơn động kinh co cứng-co giật
B. Cơn ngất do tim 
C. Cơn thiếu máu não thoáng qua (TIA)
D. Cơn động kinh mất trương lực 
Đáp án: B
Giải thích: Sự kiện xảy ra đột ngột khi đang đứng, mất ý thức thoáng qua (< 1 phút), và phục hồi nhanh chóng, hoàn toàn mà không có giai đoạn lú lẫn sau cơn là những đặc điểm rất gợi ý của ngất (syncope). Ở một bệnh nhân lớn tuổi có các yếu tố nguy cơ tim mạch, ngất do tim (ví dụ do rối loạn nhịp) phải được xem xét hàng đầu2.
Tại sao các lựa chọn khác lại sai: Cơn co cứng-co giật thường có giai đoạn co cứng và co giật rõ ràng, và quan trọng là có một giai đoạn lú lẫn sau cơn (post-ictal confusion). TIA hiếm khi gây mất ý thức hoàn toàn trừ khi ảnh hưởng đến hệ thống lưới hoạt hóa ở thân não. Cơn động kinh mất trương lực cũng gây ngã đột ngột nhưng thường rất ngắn (vài giây) và có thể không mất ý thức hoàn toàn, và cũng thường có lú lẫn sau cơn.
Câu 2: Xét nghiệm cận lâm sàng nào có giá trị nhất để đánh giá ban đầu cho bệnh nhân này?
A. Điện não đồ 
B. Chụp MRI sọ não
C. Điện tâm đồ 12 chuyển đạo
D. Siêu âm động mạch cảnh
Đáp án: C
Giải thích: Vì ngất do tim là chẩn đoán nghi ngờ hàng đầu, một ECG 12 chuyển đạo là xét nghiệm quan trọng nhất để tìm kiếm các bằng chứng của rối loạn nhịp tim (ví dụ: block nhĩ thất, nhịp nhanh thất), thiếu máu cơ tim, hoặc các bất thường cấu trúc (ví dụ: phì đại thất trái, hội chứng Brugada, QT kéo dài) có thể gây ra ngất.
Tại sao các lựa chọn khác lại sai: EEG và MRI sọ não được chỉ định khi nghi ngờ động kinh hoặc tổn thương cấu trúc não, nhưng các đặc điểm lâm sàng ở đây ít gợi ý động kinh hơn. Siêu âm động mạch cảnh được chỉ định để đánh giá TIA hoặc đột quỵ, không phải là nguyên nhân thường gặp của ngất.
Câu 3: Dấu hiệu nào sau đây, nếu có, sẽ làm tăng khả năng đây là một cơn động kinh thay vì ngất?
A. Da nhợt nhạt và vã mồ hôi trước khi ngã
B. Cắn vào đầu lưỡi
C. Cảm giác choáng váng khi tỉnh lại
D. Co giật nhẹ vài giây sau khi ngã 
Đáp án: B
Giải thích: Cắn vào mặt bên của lưỡi (lateral tongue biting) là một dấu hiệu có độ đặc hiệu cao cho cơn động kinh co cứng-co giật. Cắn vào đầu lưỡi có thể xảy ra trong cả ngất và động kinh, nhưng cắn vào mặt bên thì rất hiếm khi xảy ra trong ngất3.
Tại sao các lựa chọn khác lại sai: Da nhợt nhạt và vã mồ hôi là các triệu chứng tiền triệu điển hình của ngất do phế vị. Cảm giác choáng váng khi tỉnh lại là phổ biến sau cả hai tình trạng. Co giật nhẹ (myoclonic jerks) có thể xảy ra trong ngất do thiếu máu não thoáng qua và được gọi là ngất co giật (convulsive syncope), dễ gây nhầm lẫn nhưng không phải là động kinh.
Câu 4: Bệnh nhân kể rằng ông có cảm giác "tim đập thình thịch" ngay trước khi mất ý thức. Thông tin này gợi ý nguyên nhân nào nhất?
A. Hạ huyết áp tư thế
B. Ngất do phế vị 
C. Rối loạn nhịp tim nhanh 
D. Tắc động mạch phổi
Đáp án: C
Giải thích: Cảm giác hồi hộp, đánh trống ngực ngay trước khi ngất là một dấu hiệu báo động đỏ, gợi ý mạnh mẽ rằng nguyên nhân là do rối loạn nhịp tim, đặc biệt là nhịp nhanh thất hoặc nhịp nhanh trên thất, gây giảm cung lượng tim và tưới máu não.
Tại sao các lựa chọn khác lại sai: Hạ huyết áp tư thế xảy ra khi thay đổi tư thế. Ngất do phế vị thường có các tiền triệu như buồn nôn, vã mồ hôi, nhìn mờ. Tắc động mạch phổi có thể gây ngất nhưng thường kèm theo khó thở hoặc đau ngực dữ dội.

TÌNH HUỐNG LÂM SÀNG 8
Một cụ bà 82 tuổi, sống trong viện dưỡng lão, được đưa đến khám vì có sự thay đổi hành vi trong 3 tháng qua. Các nhân viên chăm sóc báo cáo rằng bà có những giai đoạn nhìn chằm chằm vô hồn, không đáp ứng, kéo dài 1-2 phút, trong đó bà thường có các động tác tự động như chép miệng và mân mê quần áo. Sau đó, bà trở nên lú lẫn trong khoảng 10-15 phút. Bà có tiền sử bệnh Alzheimer giai đoạn sớm và tăng huyết áp.
Câu 1: Loại cơn động kinh nào có khả năng nhất ở bệnh nhân này?
A. Cơn vắng ý thức không điển hình
B. Động kinh cục bộ phức tạp 
C. Cơn co cứng-co giật toàn thể
D. Cơn giật cơ
Đáp án: B
Giải thích: Các cơn co giật ở người lớn tuổi thường là động kinh cục bộ. Bệnh cảnh với giai đoạn ngưng hành vi, mất đáp ứng, kèm theo các động tác tự động (chép miệng, mân mê quần áo) và theo sau là tình trạng lú lẫn sau cơn là điển hình cho một cơn động kinh cục bộ phức tạp, rất có thể bắt nguồn từ thùy thái dương.
Tại sao các lựa chọn khác lại sai: Cơn vắng ý thức không điển hình thường gặp ở trẻ em có bệnh não nặng và không có động tác tự động phức tạp như vậy. Cơn co cứng-co giật toàn thể có các biểu hiện vận động rõ ràng. Cơn giật cơ là các cơn giật ngắn, đột ngột.
Câu 2: Nguyên nhân gây động kinh mới khởi phát nào là phổ biến nhất ở nhóm tuổi này?
A. Bệnh mạch máu não 
B. Di truyền
C. U não nguyên phát
D. Nhiễm trùng hệ thần kinh trung ương
Đáp án: A
Giải thích: Ở người cao tuổi, các nguyên nhân cấu trúc-chuyển hóa là phổ biến nhất. Bệnh mạch máu não, bao gồm đột quỵ não (cả nhồi máu và xuất huyết) và các tổn thương chất trắng do thiếu máu cục bộ mạn tính, là nguyên nhân hàng đầu gây động kinh mới khởi phát ở nhóm tuổi này5. Bệnh thoái hóa thần kinh như Alzheimer cũng là một yếu tố nguy cơ.
Tại sao các lựa chọn khác lại sai: Động kinh do di truyền thường khởi phát ở lứa tuổi trẻ hơn. U não và nhiễm trùng cũng có thể xảy ra nhưng ít phổ biến hơn bệnh mạch máu não.
Câu 3: Khi lựa chọn thuốc chống động kinh cho bệnh nhân này, yếu tố nào là quan trọng nhất cần cân nhắc?
A. Hiệu quả cao nhất bất kể tác dụng phụ
B. Khả năng gây tăng cân
C. Ít tương tác thuốc và ít tác dụng phụ lên nhận thức
D. Yêu cầu phải dùng thuốc 3 lần mỗi ngày
Đáp án: C
Giải thích: Bệnh nhân cao tuổi thường có nhiều bệnh đồng mắc và đang sử dụng nhiều loại thuốc (polypharmacy), do đó nguy cơ tương tác thuốc rất cao. Họ cũng nhạy cảm hơn với các tác dụng phụ lên hệ thần kinh trung ương như buồn ngủ, chóng mặt, và suy giảm nhận thức. Do đó, việc lựa chọn một ASM có ít tương tác và ít ảnh hưởng đến nhận thức (ví dụ: Levetiracetam, Lamotrigine, Gabapentin) là cực kỳ quan trọng.
Tại sao các lựa chọn khác lại sai: Hiệu quả phải được cân bằng với dung nạp. Tăng cân có thể là một vấn đề nhưng không quan trọng bằng tương tác thuốc và tác dụng phụ lên nhận thức. Lịch dùng thuốc phức tạp làm giảm tuân thủ điều trị, nên ưu tiên các thuốc dùng 1-2 lần/ngày.
Câu 4: Bệnh nhân được bắt đầu điều trị bằng Levetiracetam. Hai tuần sau, các nhân viên chăm sóc báo cáo rằng bà trở nên rất dễ cáu gắt, kích động và lo âu. Đây có thể là biểu hiện của tác dụng phụ nào của thuốc?
A. Rối loạn huyết học
B. Tác dụng phụ lên hành vi và tâm thần
C. Suy gan cấp
D. Hội chứng Stevens-Johnson
Đáp án: B
Giải thích: Các tác dụng phụ lên hành vi và tâm thần, bao gồm cáu gắt, kích động, lo âu, trầm cảm, và hiếm hơn là loạn thần, là những tác dụng phụ đã được ghi nhận rõ của Levetiracetam. Những tác dụng này có thể đặc biệt rõ rệt ở những bệnh nhân có tiền sử bệnh tâm thần hoặc sa sút trí tuệ.
Tại sao các lựa chọn khác lại sai: Rối loạn huyết học, suy gan, và SJS là những tác dụng phụ rất hiếm gặp của Levetiracetam. Các biểu hiện hành vi là tác dụng phụ phổ biến và đặc trưng hơn.

TÌNH HUỐNG LÂM SÀNG 9
Một người đàn ông 45 tuổi đến khám vì các cơn "kỳ lạ" tái phát trong 5 năm. Cơn thường bắt đầu bằng một cảm giác khó chịu dâng lên từ dạ dày, sau đó là cảm giác quen thuộc mãnh liệt (déjà vu), và đôi khi có mùi cao su cháy. Trong cơn, anh ta mất nhận thức, nhìn chằm chằm và có các động tác tự động như nhai và chép miệng trong khoảng 2 phút. Sau cơn, anh ta cảm thấy mệt mỏi và lú lẫn trong gần 30 phút. MRI sọ não cho thấy teo và tăng tín hiệu trên T2 ở hồi hải mã bên phải.
Câu 1: Dựa trên các triệu chứng học, ổ động kinh có khả năng nhất nằm ở đâu?
A. Thùy trán, vùng vận động phụ
B. Thùy đỉnh, vùng cảm giác
C. Thùy chẩm, vỏ não thị giác
D. Thùy thái dương, cấu trúc giữa
Đáp án: D
Giải thích: Tổ hợp các triệu chứng bao gồm aura cảm giác nội tạng (cảm giác dâng lên từ thượng vị), aura tâm thần (déjà vu), và aura khứu giác (ảo giác mùi), theo sau là mất ý thức với các động tác tự động vùng miệng, là những đặc điểm kinh điển của động kinh khởi phát từ thùy thái dương giữa, đặc biệt là liên quan đến phức hợp hồi hải mã-hạnh nhân. Phát hiện xơ hóa hồi hải mã trên MRI càng củng cố chẩn đoán này.
Tại sao các lựa chọn khác lại sai: Động kinh thùy trán thường có các triệu chứng vận động nổi bật và kỳ lạ, xảy ra về đêm và ngắn. Động kinh thùy đỉnh thường có aura cảm giác cơ thể. Động kinh thùy chẩm có aura thị giác đơn giản.
Câu 2: Bệnh nhân đã thất bại với hai loại thuốc chống động kinh (Carbamazepine và Levetiracetam) được dùng đủ liều. Tình trạng này được định nghĩa là gì?
A. Động kinh giả 
B. Trạng thái động kinh không co giật
C. Động kinh kháng thuốc 
D. Động kinh nhạy cảm với thuốc
Đáp án: C
Giải thích: Theo định nghĩa của ILAE, động kinh kháng thuốc (DRE) là tình trạng không kiểm soát được cơn co giật sau khi đã thử điều trị với hai loại thuốc chống động kinh phù hợp, được lựa chọn đúng và dung nạp tốt, dùng đơn trị liệu hoặc phối hợp. Bệnh nhân này đã thất bại với hai loại thuốc, do đó phù hợp với định nghĩa DRE.
Tại sao các lựa chọn khác lại sai: Các triệu chứng và phát hiện MRI của bệnh nhân phù hợp với động kinh thực thể, không phải động kinh giả. Trạng thái động kinh là tình trạng cơn kéo dài hoặc các cơn liên tiếp không hồi phục ý thức.
Câu 3: Với chẩn đoán động kinh thùy thái dương giữa kháng thuốc do xơ hóa hồi hải mã, phương pháp điều trị nào có khả năng mang lại hiệu quả chữa khỏi cao nhất?
A. Thêm vào một thuốc chống động kinh thứ ba
B. Kích thích dây thần kinh phế vị (VNS)
C. Phẫu thuật cắt bỏ thùy thái dương trước và hạnh nhân-hồi hải mã 
D. Chế độ ăn ketogenic
Đáp án: C
Giải thích: Ở những bệnh nhân bị động kinh thùy thái dương giữa kháng thuốc có tổn thương khu trú rõ ràng như xơ hóa hồi hải mã, phẫu thuật cắt bỏ vùng sinh động kinh mang lại tỷ lệ hết cơn cao nhất, có thể lên tới 60-80%. Đây được coi là phương pháp điều trị triệt để cho nhóm bệnh nhân này.
Tại sao các lựa chọn khác lại sai: Thêm thuốc thứ ba có tỷ lệ thành công rất thấp (<5%) ở bệnh nhân DRE. VNS và chế độ ăn ketogenic là các phương pháp điều trị giảm nhẹ (palliative), giúp giảm tần suất cơn nhưng hiếm khi chữa khỏi hoàn toàn.
Câu 4: Biến chứng nhận thức lâu dài nào thường gặp nhất ở bệnh nhân bị động kinh thùy thái dương bên trái?
A. Mất khả năng nhận diện khuôn mặt 
B. Suy giảm trí nhớ lời nói 
C. Mất định hướng không gian
D. Mất khả năng tính toán 
Đáp án: B
Giải thích: Thùy thái dương giữa, đặc biệt là hồi hải mã, đóng vai trò quan trọng trong việc hình thành trí nhớ. Ở hầu hết những người thuận tay phải, bán cầu não trái là bán cầu ưu thế về ngôn ngữ. Do đó, tổn thương hoặc phẫu thuật ở thùy thái dương giữa bên trái thường liên quan đến suy giảm trí nhớ lời nói (ghi nhớ danh sách từ, câu chuyện).
Tại sao các lựa chọn khác lại sai: Mất khả năng nhận diện khuôn mặt và các vấn đề về không gian thường liên quan đến bán cầu não phải (không ưu thế). Mất khả năng tính toán thường liên quan đến tổn thương thùy đỉnh.

TÌNH HUỐNG LÂM SÀNG 10
Một bé trai 15 tuổi có các cơn co giật về đêm. Gia đình mô tả cậu bé đột ngột thức dậy, la hét, và có các động tác rất kỳ lạ như đạp chân kiểu xe đạp, hoặc vung tay chân mạnh. Cơn chỉ kéo dài khoảng 30-45 giây, sau đó cậu bé tỉnh táo ngay lập tức và có thể kể lại một phần sự kiện. Cậu bé có thể có 3-4 cơn trong một đêm. Khám thần kinh và MRI sọ não hoàn toàn bình thường.
Câu 1: Dựa trên các triệu chứng học, ổ động kinh có khả năng nhất nằm ở đâu?
A. Thùy thái dương
B. Thùy chẩm
C. Thùy trán
D. Thùy đảo
Đáp án: C
Giải thích: Các đặc điểm của cơn, bao gồm: xảy ra về đêm (nocturnal), thời gian rất ngắn, khởi phát và kết thúc đột ngột, các động tác tự động vận động phức tạp, kỳ lạ, và có tính chất tăng động (hyperkinetic), ít hoặc không có lú lẫn sau cơn, là những dấu hiệu rất điển hình của động kinh thùy trán.
Tại sao các lựa chọn khác lại sai: Động kinh thùy thái dương thường kéo dài hơn, có aura rõ, và có giai đoạn lú lẫn sau cơn kéo dài. Động kinh thùy chẩm và thùy đảo thường có các triệu chứng thị giác hoặc cảm giác nội tạng tương ứng.
Câu 2: Do các đặc điểm kỳ lạ của cơn, chẩn đoán phân biệt quan trọng nhất cần loại trừ là gì?
A. Chứng ngủ rũ 
B. Rối loạn hành vi giấc ngủ REM 
C. Cơn hoảng sợ về đêm hoặc các rối loạn của giấc ngủ không REM 
D. Hội chứng chân không yên 
Đáp án: C
Giải thích: Các động tác vận động dữ dội, la hét, và xảy ra khi ngủ của động kinh thùy trán rất dễ bị nhầm lẫn với các rối loạn của giấc ngủ không REM (parasomnias), chẳng hạn như cơn hoảng sợ về đêm hoặc chứng miên hành (mộng du). Việc phân biệt đòi hỏi phải hỏi bệnh sử kỹ và thường cần đến điện não đồ video (video-EEG).
Tại sao các lựa chọn khác lại sai: Narcolepsy đặc trưng bởi buồn ngủ ban ngày quá mức và cơn cataplexy. Rối loạn hành vi giấc ngủ REM xảy ra trong giấc ngủ REM, thường ở người lớn tuổi, và bệnh nhân "thực hiện" giấc mơ của họ. Hội chứng chân không yên là cảm giác khó chịu ở chân khi nghỉ ngơi.
Câu 3: Điện não đồ da đầu (scalp EEG) trong cơn ở bệnh nhân động kinh thùy trán thường có đặc điểm gì?
A. Luôn cho thấy các phóng điện gai nhọn khu trú rõ ở thùy trán
B. Thường bị che lấp bởi nhiễu cơ và có thể trông bình thường
C. Cho thấy các phức hợp gai-sóng chậm 3 Hz lan tỏa
D. Luôn có hoạt động delta nhịp nhàng ở vùng trán
Đáp án: B
Giải thích: Do các cơn động kinh thùy trán thường có các hoạt động vận động rất mạnh và nguồn gốc ổ động kinh có thể nằm ở các vùng sâu (như mặt trong hoặc vùng trán-ổ mắt), EEG da đầu trong cơn thường bị che lấp hoàn toàn bởi nhiễu vận động (muscle artifact). Trong nhiều trường hợp, EEG có thể không ghi nhận được hoạt động kịch phát rõ ràng, làm cho việc chẩn đoán trở nên khó khăn12.
Tại sao các lựa chọn khác lại sai: Hoạt động kịch phát khu trú rõ ràng không phải lúc nào cũng thấy được. Phức hợp gai-sóng 3 Hz là đặc trưng của cơn vắng ý thức. Hoạt động delta nhịp nhàng có thể thấy nhưng không phải là đặc điểm phổ biến nhất.
Câu 4: Lựa chọn thuốc nào sau đây thường có hiệu quả trong điều trị động kinh thùy trán?
A. Ethosuximide
B. Carbamazepine
C. Tiagabine
D. Clonazepam
Đáp án: B
Giải thích: Động kinh thùy trán là một dạng động kinh cục bộ. Carbamazepine là một thuốc chẹn kênh natri phổ hẹp, là lựa chọn hàng đầu và có hiệu quả trong điều trị các cơn động kinh cục bộ, bao gồm cả động kinh thùy trán13. Các lựa chọn khác bao gồm Oxcarbazepine, Lamotrigine, Levetiracetam.
Tại sao các lựa chọn khác lại sai: Ethosuximide chỉ dùng cho cơn vắng. Tiagabine và Clonazepam không phải là lựa chọn hàng đầu cho động kinh cục bộ.

TÌNH HUỐNG LÂM SÀNG 11
Một người đàn ông 75 tuổi có tiền sử đột quỵ não được tìm thấy trong tình trạng lú lẫn cấp tính và không đáp ứng phù hợp. Ông không có bất kỳ cử động co giật nào. Khám lâm sàng, ông mở mắt nhưng nhìn chằm chằm vô định, thỉnh thoảng giật nhẹ mi mắt và không tuân theo mệnh lệnh. Tình trạng này đã kéo dài không đổi trong hơn 1 giờ. Điện não đồ tại giường cho thấy hoạt động gai nhọn liên tục ở bán cầu não trái.
Câu 1: Chẩn đoán phù hợp nhất là gì?
A. Trạng thái động kinh không co giật (NCSE)
B. Mê sảng do nhiễm trùng tiết niệu
C. Đột quỵ não tái phát
D. Rối loạn chuyển hóa do suy thận
Đáp án: A
Giải thích: Trạng thái động kinh không co giật (NCSE) được đặc trưng bởi sự thay đổi ý thức kéo dài và/hoặc thay đổi hành vi liên quan đến hoạt động động kinh liên tục trên EEG, mà không có các biểu hiện co giật vận động rõ ràng. Bệnh cảnh lú lẫn cấp, không đáp ứng, kèm theo giật nhẹ mi mắt và EEG kịch phát liên tục là điển hình cho NCSE, đặc biệt ở bệnh nhân lớn tuổi có tổn thương não nền.
Tại sao các lựa chọn khác lại sai: Mê sảng, đột quỵ tái phát, và rối loạn chuyển hóa đều có thể gây lú lẫn, nhưng chúng không giải thích được hoạt động động kinh liên tục trên EEG, vốn là tiêu chuẩn vàng để chẩn đoán NCSE.
Câu 2: Bước xử trí đầu tiên sau khi chẩn đoán xác định là gì?
A. Chụp MRI sọ não khẩn
B. Bắt đầu truyền tĩnh mạch Levetiracetam liều tải
C. Tiêm tĩnh mạch Lorazepam
D. Chọc dịch não tủy
Đáp án: C
Giải thích: Việc điều trị NCSE tuân theo các nguyên tắc tương tự như trạng thái động kinh co giật. Liệu pháp ban đầu là sử dụng một loại benzodiazepine tác dụng nhanh như Lorazepam để cố gắng phá vỡ hoạt động động kinh liên tục trên EEG và cải thiện tình trạng lâm sàng của bệnh nhân.
Tại sao các lựa chọn khác lại sai: MRI và chọc dịch não tủy là các xét nghiệm để tìm nguyên nhân, được thực hiện sau khi tình trạng động kinh đã được kiểm soát. Levetiracetam là liệu pháp bước hai, được sử dụng nếu benzodiazepine không hiệu quả hoặc để duy trì kiểm soát cơn sau đó.
Câu 3: Yếu tố nào sau đây là chỉ báo tiên lượng tốt cho việc đáp ứng với điều trị trong NCSE?
A. Bệnh nhân lớn tuổi
B. Có tổn thương não cấu trúc cấp tính
C. Không có tiền sử động kinh trước đó
D. Cải thiện lâm sàng và điện não đồ sau khi tiêm benzodiazepine
Đáp án: D
Giải thích: Một trong những phương pháp để xác nhận chẩn đoán NCSE và cũng là một dấu hiệu tiên lượng tốt là sự cải thiện cả về lâm sàng (ý thức, hành vi) và điện não đồ (giảm hoặc mất hoạt động kịch phát) ngay sau khi tiêm một liều thử benzodiazepine. Điều này cho thấy hoạt động động kinh là nguyên nhân gây ra các triệu chứng.
Tại sao các lựa chọn khác lại sai: Tuổi cao và tổn thương não cấp tính thường là những yếu tố tiên lượng xấu hơn. Không có tiền sử động kinh không phải là một yếu tố tiên lượng rõ ràng.
Câu 4: Mục tiêu chính của việc điều trị tích cực NCSE là gì?
A. Ngăn ngừa sự tiến triển thành trạng thái động kinh co giật
B. Giảm nguy cơ tổn thương tế bào thần kinh không hồi phục do hoạt động động kinh kéo dài
C. Cải thiện điểm Glasgow Coma Scale
D. Bình thường hóa các chỉ số sinh tồn
Đáp án: B
Giải thích: Tương tự như SE co giật, hoạt động động kinh liên tục trong NCSE được cho là có thể gây độc cho tế bào thần kinh (excitotoxicity), dẫn đến chết tế bào thần kinh và tổn thương não vĩnh viễn nếu không được điều trị kịp thời. Mục tiêu chính là chấm dứt hoạt động điện não bất thường để bảo vệ não.
Tại sao các lựa chọn khác lại sai: Mặc dù NCSE có thể tiến triển thành SE co giật và việc điều trị sẽ cải thiện điểm GCS và ổn định các chỉ số sinh tồn, nhưng lý do cơ bản và cấp bách nhất để điều trị là ngăn ngừa tổn thương não không hồi phục.

TÌNH HUỐNG LÂM SÀNG 12
Một phụ nữ 25 tuổi được đưa đến phòng khám động kinh để đánh giá các "cơn co giật" tái phát. Bạn trai cô mô tả các cơn thường xảy ra sau khi cãi nhau. Trong cơn, cô nhắm chặt mắt, đầu lắc lư từ bên này sang bên kia, và có các cử động giật không đồng bộ ở cả tay và chân, đôi khi có cả động tác đẩy vùng chậu. Cơn kéo dài từ 5 đến 10 phút. Sau cơn, cô thường khóc nhưng hoàn toàn tỉnh táo và nhớ lại một phần sự kiện.
Câu 1: Dựa trên các đặc điểm lâm sàng, chẩn đoán nào là phù hợp nhất?
A. Động kinh thùy trán
B. Trạng thái động kinh giật cơ
C. Cơn giả động kinh do nguyên nhân tâm lý (PNES)
D. Động kinh cục bộ toàn thể hóa thứ phát
Đáp án: C
Giải thích: Các đặc điểm được mô tả rất gợi ý đến PNES: mắt nhắm chặt (trong động kinh thực thể mắt thường mở), cử động không đồng bộ, không định hình, lắc đầu qua lại, động tác đẩy vùng chậu, thời gian kéo dài, và được khởi phát bởi yếu tố tâm lý (cãi nhau). Việc bệnh nhân tỉnh táo và có trí nhớ về cơn cũng là một dấu hiệu quan trọng. Động kinh thùy trán có thể có biểu hiện kỳ lạ nhưng thường ngắn hơn và có tính định hình hơn.
Tại sao các lựa chọn khác lại sai: Động kinh thùy trán thường có các động tác định hình và ngắn hơn. Trạng thái động kinh giật cơ là các cơn giật cơ liên tục. Động kinh cục bộ toàn thể hóa thứ phát sẽ có một giai đoạn co cứng-co giật điển hình và lú lẫn sau cơn.
Câu 2: Phương pháp "tiêu chuẩn vàng" để phân biệt PNES và động kinh thực thể là gì?
A. Đo nồng độ prolactin huyết thanh sau cơn
B. Chụp MRI sọ não chức năng (fMRI)
C. Điện não đồ video theo dõi kéo dài
D. Test tâm lý
Đáp án: C
Giải thích: Tiêu chuẩn vàng để chẩn đoán là ghi lại được một cơn điển hình của bệnh nhân trên video đồng thời với ghi điện não đồ. Trong PNES, video sẽ cho thấy các cử động lâm sàng trong khi EEG không ghi nhận bất kỳ hoạt động động kinh nào tương ứng. Điều này cho phép chẩn đoán xác định.
Tại sao các lựa chọn khác lại sai: Prolactin có thể tăng sau cơn động kinh toàn thể nhưng không nhạy và đặc hiệu. fMRI là một công cụ nghiên cứu. Test tâm lý giúp xác định các vấn đề tâm lý nền tảng nhưng không thể chẩn đoán xác định loại cơn.
Câu 3: Bước xử trí tiếp theo phù hợp nhất sau khi có chẩn đoán xác định PNES là gì?
A. Bắt đầu điều trị bằng một thuốc chống động kinh phổ rộng như Levetiracetam
B. Giới thiệu bệnh nhân đến bác sĩ tâm thần để điều trị tâm lý
C. Thông báo với bệnh nhân rằng các cơn của cô ấy là "không có thật" và sẽ tự hết
D. Thêm vào một thuốc giải lo âu như Diazepam để dùng khi cần
Đáp án: B
Giải thích: PNES là một biểu hiện của rối loạn tâm lý (thường là rối loạn chuyển đổi hoặc rối loạn liên quan đến sang chấn). Điều trị hiệu quả nhất là các liệu pháp tâm lý, chẳng hạn như liệu pháp nhận thức hành vi (CBT), được thực hiện bởi bác sĩ tâm thần hoặc nhà tâm lý học. Thuốc chống động kinh không có hiệu quả và nên được giảm liều và ngưng nếu đang sử dụng.
Tại sao các lựa chọn khác lại sai: Thuốc chống động kinh không hiệu quả và có thể gây tác dụng phụ. Thông báo rằng cơn là "không có thật" là một cách tiếp cận thiếu đồng cảm và không hiệu quả; các cơn là có thật đối với bệnh nhân, nhưng nguyên nhân không phải là động kinh. Diazepam có thể gây lệ thuộc và không giải quyết được vấn đề gốc rễ.
Câu 4: Khi giải thích chẩn đoán PNES cho bệnh nhân, cách tiếp cận nào là tốt nhất?
A. Nhấn mạnh rằng không có gì sai với não của cô ấy về mặt điện học và các cơn này là cách cơ thể phản ứng với căng thẳng.
B. Tập trung vào việc cô ấy không cần dùng thuốc chống động kinh nữa.
C. Nói với cô ấy rằng đây là một chẩn đoán loại trừ và không chắc chắn.
D. So sánh tình trạng của cô ấy với những bệnh nhân động kinh nặng hơn để cô ấy cảm thấy may mắn.
Đáp án: A
Giải thích: Giao tiếp chẩn đoán PNES đòi hỏi sự khéo léo và đồng cảm. Một cách tiếp cận hiệu quả là xác nhận các triệu chứng của bệnh nhân là có thật, sau đó giải thích rằng nguyên nhân không phải do phóng điện bất thường trong não (như động kinh), mà là do cách não bộ và cơ thể xử lý căng thẳng hoặc cảm xúc. Điều này xác thực trải nghiệm của bệnh nhân trong khi giới thiệu một mô hình bệnh sinh khác.
Tại sao các lựa chọn khác lại sai: Các cách tiếp cận khác có thể khiến bệnh nhân cảm thấy bị bác bỏ, bị coi thường hoặc không chắc chắn, làm cản trở việc chấp nhận chẩn đoán và tham gia điều trị tâm lý.

TÌNH HUỐNG LÂM SÀNG 13
Một người đàn ông 48 tuổi, bị động kinh cục bộ sau chấn thương sọ não từ 15 năm trước, đang được điều trị lâu dài bằng Phenytoin. Anh đến khám định kỳ và than phiền về việc đi lại không vững và run tay ngày càng tăng. Khám lâm sàng thấy phì đại lợi rõ, da mặt hơi thô, và thất điều dáng đi cũng như thất điều khi thực hiện các nghiệm pháp ngón tay-chỉ mũi. Nồng độ Phenytoin trong máu ở mức cao trong giới hạn điều trị.
Câu 1: Các triệu chứng thần kinh của bệnh nhân (thất điều) rất có thể là do đâu?
A. Tiến triển của tổn thương não sau chấn thương
B. Một cơn đột quỵ não mới
C. Độc tính mạn tính của Phenytoin
D. Bệnh Parkinson mới khởi phát
Đáp án: C
Giải thích: Thất điều (ataxia) ở tiểu não, bao gồm thất điều dáng đi và thất điều chi, là một tác dụng phụ thần kinh đã được biết rõ của việc sử dụng Phenytoin lâu dài, ngay cả khi nồng độ thuốc trong máu nằm trong giới hạn điều trị. Độc tính mạn tính có thể dẫn đến teo tiểu não không hồi phục.
Tại sao các lựa chọn khác lại sai: Mặc dù tổn thương não có thể tiến triển, sự xuất hiện của thất điều tiểu não đối xứng mà không có các dấu hiệu khu trú khác làm cho độc tính của thuốc là nguyên nhân hàng đầu. Đột quỵ thường gây ra các triệu chứng đột ngột và khu trú. Bệnh Parkinson có các đặc điểm khác như cứng đờ, chậm vận động và run khi nghỉ.
Câu 2: Phát hiện nào sau đây cũng là một tác dụng phụ kinh điển của việc sử dụng Phenytoin lâu dài?
A. Giảm cân
B. Rụng tóc
C. Phì đại lợi 
D. Sỏi thận
Đáp án: C
Giải thích: Phì đại lợi là một tác dụng phụ rất phổ biến và đặc trưng của Phenytoin, xảy ra ở khoảng 50% bệnh nhân sử dụng lâu dài. Các tác dụng phụ khác bao gồm rậm lông (hirsutism), thô mặt (facial coarsening), và loãng xương.
Tại sao các lựa chọn khác lại sai: Tăng cân có thể gặp nhưng không điển hình. Rụng tóc là tác dụng phụ của Valproate. Sỏi thận là tác dụng phụ của Topiramate và Zonisamide6.
Câu 3: Nếu quyết định chuyển sang một ASM khác cho bệnh nhân này, lựa chọn nào sau đây là hợp lý để tránh các tác dụng phụ tương tự và có hiệu quả cho động kinh cục bộ?
A. Valproate
B. Lamotrigine
C. Phenobarbital
D. Ethosuximide
Đáp án: B
Giải thích: Lamotrigine là một thuốc phổ rộng hiệu quả cho động kinh cục bộ. Nó không gây ra thất điều, phì đại lợi hoặc các tác dụng phụ về ngoại hình như Phenytoin. Nó thường được dung nạp tốt ở người lớn.
Tại sao các lựa chọn khác lại sai: Valproate có thể gây run và tăng cân. Phenobarbital cũng có thể gây buồn ngủ và các vấn đề về nhận thức, và có cơ chế tương tự Phenytoin. Ethosuximide không hiệu quả cho động kinh cục bộ.
Câu 4: Dược động học của Phenytoin có đặc điểm gì quan trọng mà bác sĩ lâm sàng phải luôn ghi nhớ khi điều chỉnh liều?
A. Được thải trừ hoàn toàn qua thận dưới dạng không đổi
B. Có thời gian bán hủy rất ngắn, đòi hỏi phải dùng nhiều lần trong ngày
C. Tuân theo dược động học bậc không ở liều điều trị
D. Không gắn kết với protein huyết tương
Đáp án: C
Giải thích: Phenytoin có dược động học phi tuyến tính hay bão hòa (bậc không) ở nồng độ điều trị. Điều này có nghĩa là các enzyme gan chuyển hóa thuốc bị bão hòa, và một sự tăng nhỏ về liều lượng có thể dẫn đến sự gia tăng lớn và không thể đoán trước được trong nồng độ thuốc trong máu, làm tăng nguy cơ ngộ độc.
Tại sao các lựa chọn khác lại sai: Phenytoin được chuyển hóa chủ yếu ở gan. Nó có thời gian bán hủy dài. Nó gắn kết mạnh với protein huyết tương (>90%), điều này rất quan trọng về mặt lâm sàng ở những bệnh nhân có albumin máu thấp.

TÌNH HUỐNG LÂM SÀNG 14
Một phụ nữ 24 tuổi, bị động kinh toàn thể co cứng-co giật được kiểm soát tốt bằng Carbamazepine, đến phòng khám để tư vấn về các biện pháp tránh thai. Cô ấy muốn bắt đầu sử dụng thuốc tránh thai kết hợp đường uống (chứa estrogen và progestin).
Câu 1: Lời khuyên nào là phù hợp nhất liên quan đến việc sử dụng thuốc tránh thai đường uống và Carbamazepine?
A. Carbamazepine không ảnh hưởng đến hiệu quả của thuốc tránh thai.
B. Carbamazepine có thể làm giảm hiệu quả của thuốc tránh thai, dẫn đến nguy cơ mang thai ngoài ý muốn.
C. Thuốc tránh thai có thể làm tăng nồng độ Carbamazepine, gây ngộ độc.
D. Nên tránh hoàn toàn thuốc tránh thai và chỉ sử dụng các biện pháp rào cản.
Đáp án: B
Giải thích: Carbamazepine là một chất cảm ứng men gan mạnh (đặc biệt là CYP3A4). Nó làm tăng tốc độ chuyển hóa của estrogen và progestin trong thuốc tránh thai, làm giảm nồng độ và hiệu quả của chúng, dẫn đến tăng nguy cơ thất bại của biện pháp tránh thai.
Tại sao các lựa chọn khác lại sai: Carbamazepine có tương tác đáng kể. Thuốc tránh thai không làm tăng nồng độ Carbamazepine. Mặc dù các biện pháp rào cản là một lựa chọn, nhưng có các lựa chọn tránh thai hiệu quả khác không bị ảnh hưởng (ví dụ: dụng cụ tử cung, tiêm medroxyprogesterone).
Câu 2: Biện pháp tránh thai nào sau đây sẽ KHÔNG bị ảnh hưởng bởi Carbamazepine?
A. Thuốc tránh thai kết hợp đường uống
B. Miếng dán tránh thai 
C. Dụng cụ tử cung chứa đồng 
D. Vòng âm đạo 
Đáp án: C
Giải thích: Dụng cụ tử cung chứa đồng (Copper IUD) hoạt động bằng cách tạo ra một môi trường viêm tại chỗ, gây độc cho tinh trùng và ngăn cản sự làm tổ; nó không chứa hormone và hiệu quả của nó hoàn toàn không bị ảnh hưởng bởi các thuốc cảm ứng men gan. Dụng cụ tử cung chứa Levonorgestrel (hormonal IUD) cũng là một lựa chọn tốt vì tác dụng chủ yếu tại chỗ.
Tại sao các lựa chọn khác lại sai: Thuốc uống, miếng dán, và vòng âm đạo đều giải phóng hormone vào tuần hoàn hệ thống và hiệu quả của chúng sẽ bị giảm bởi các thuốc cảm ứng men gan như Carbamazepine.
Câu 3: Nếu bệnh nhân được chuyển từ Carbamazepine sang Valproate, tương tác với thuốc tránh thai sẽ thay đổi như thế nào?
A. Tương tác vẫn giữ nguyên vì Valproate cũng là chất cảm ứng men gan.
B. Valproate làm tăng hiệu quả của thuốc tránh thai.
C. Valproate là một chất ức chế men gan nhưng không có tương tác đáng kể với thuốc tránh thai.
D. Valproate làm giảm hiệu quả của thuốc tránh thai còn mạnh hơn Carbamazepine.
Đáp án: C
Giải thích: Ngược lại với Carbamazepine, Valproate là một chất ức chế men gan, không phải là chất cảm ứng. Nó không làm tăng chuyển hóa của hormone trong thuốc tránh thai và do đó không làm giảm hiệu quả của chúng. Vì vậy, thuốc tránh thai kết hợp đường uống có thể được sử dụng một cách an toàn với Valproate (mặc dù bản thân Valproate có nguy cơ quái thai cao và nên tránh ở phụ nữ trong độ tuổi sinh đẻ nếu có thể).
Tại sao các lựa chọn khác lại sai: Valproate là chất ức chế, không phải cảm ứng. Nó không có tương tác đáng kể với thuốc tránh thai.
Câu 4: Một phụ nữ khác bị động kinh đang dùng Lamotrigine và bắt đầu dùng thuốc tránh thai kết hợp đường uống. Điều gì có khả năng xảy ra?
A. Nồng độ Lamotrigine sẽ tăng, có nguy cơ ngộ độc.
B. Nồng độ Lamotrigine sẽ giảm, có nguy cơ mất kiểm soát cơn co giật.
C. Hiệu quả của thuốc tránh thai sẽ giảm.
D. Không có tương tác nào xảy ra.
Đáp án: B
Giải thích: Đây là một tương tác hai chiều quan trọng. Estrogen trong thuốc tránh thai cảm ứng enzyme UGT1A4, enzyme chính chuyển hóa Lamotrigine. Điều này có thể làm giảm nồng độ Lamotrigine trong huyết tương tới 50%, dẫn đến nguy cơ tái phát cơn co giật10. Bệnh nhân có thể cần tăng liều Lamotrigine khi bắt đầu dùng thuốc tránh thai và giảm liều trong tuần không dùng thuốc.
Tại sao các lựa chọn khác lại sai: Nồng độ Lamotrigine sẽ giảm, không tăng. Lamotrigine không phải là chất cảm ứng men gan đáng kể và không làm giảm hiệu quả của thuốc tránh thai.

TÌNH HUỐNG LÂM SÀNG 15
Một người đàn ông 35 tuổi, bị động kinh cục bộ sau một tai nạn xe máy 10 năm trước. Anh đã được điều trị bằng Levetiracetam và đã hoàn toàn không có cơn co giật trong 4 năm qua. Anh ấy muốn biết liệu anh có thể ngừng thuốc được không. EEG gần đây nhất của anh là bình thường. Khám thần kinh và MRI sọ não cho thấy một vùng gliosis nhỏ ở thùy trán phải.
Câu 1: Yếu tố nào sau đây là yếu tố tiên lượng tốt cho việc ngưng thuốc thành công?
A. Thời gian không có cơn kéo dài
B. Nguyên nhân động kinh là do tổn thương cấu trúc (động kinh triệu chứng)
C. Khởi phát động kinh ở tuổi trưởng thành
D. Loại cơn là động kinh cục bộ
Đáp án: A
Giải thích: Thời gian không có cơn kéo dài (thường từ 2 đến 5 năm) là yếu tố tiên lượng quan trọng nhất cho việc ngưng thuốc thành công. Bệnh nhân này đã không có cơn trong 4 năm, đây là một yếu tố tích cực.
Tại sao các lựa chọn khác lại sai: Động kinh triệu chứng (do tổn thương cấu trúc não như trong trường hợp này), khởi phát ở tuổi trưởng thành, và loại cơn cục bộ đều là những yếu tố làm tăng nguy cơ tái phát sau khi ngưng thuốc, so với động kinh vô căn khởi phát ở trẻ em.
Câu 2: Bác sĩ nên tư vấn cho bệnh nhân về nguy cơ tái phát sau khi ngưng thuốc như thế nào?
A. Nguy cơ tái phát là không đáng kể sau 4 năm không có cơn.
B. Nguy cơ tái phát là có tồn tại, cao nhất trong 2 năm đầu sau khi ngưng thuốc.
C. Bệnh nhân sẽ không bao giờ có thể lái xe trở lại nếu ngưng thuốc.
D. Ngưng thuốc sẽ gây ra các triệu chứng cai thuốc nghiêm trọng.
Đáp án: B
Giải thích: Ngay cả ở những ứng cử viên tốt nhất, vẫn có nguy cơ tái phát cơn sau khi ngưng ASM. Nguy cơ này cao nhất trong vòng 2 năm đầu tiên và có thể dao động từ 30-50% tùy thuộc vào các yếu tố nguy cơ của bệnh nhân. Việc tư vấn trung thực về nguy cơ này là rất quan trọng để bệnh nhân có thể đưa ra quyết định éclairée.
Tại sao các lựa chọn khác lại sai: Nguy cơ không phải là không đáng kể. Các quy định về lái xe sẽ được áp dụng lại nếu cơn tái phát, nhưng không phải là lệnh cấm vĩnh viễn. Levetiracetam không gây ra hội chứng cai thuốc nghiêm trọng như benzodiazepine hay barbiturate.
Câu 3: Nếu quyết định ngưng thuốc, kế hoạch phù hợp nhất là gì?
A. Ngừng thuốc đột ngột
B. Giảm liều dần dần trong vòng 2-3 ngày
C. Giảm liều từ từ trong khoảng thời gian ít nhất 2-3 tháng
D. Chuyển sang một ASM khác có liều thấp hơn
Đáp án: C
Giải thích: Việc ngừng ASM phải luôn được thực hiện từ từ (tapering) để giảm nguy cơ gây ra cơn co giật do ngưng thuốc đột ngột (withdrawal seizures) hoặc thậm chí là trạng thái động kinh. Thời gian giảm liều có thể kéo dài từ vài tuần đến vài tháng, tùy thuộc vào loại thuốc, liều lượng và thời gian sử dụng. Một khoảng thời gian 2-6 tháng là phổ biến.
Tại sao các lựa chọn khác lại sai: Ngừng đột ngột hoặc quá nhanh là nguy hiểm. Chuyển sang một ASM khác không phải là ngừng thuốc.
Câu 4: Sau khi thảo luận về những rủi ro và lợi ích, bệnh nhân quyết định tiếp tục dùng thuốc vì anh ta là một tài xế xe tải và không thể chấp nhận nguy cơ tái phát cơn. Thái độ của bác sĩ nên là gì?
A. Thuyết phục bệnh nhân rằng ngưng thuốc là lựa chọn tốt nhất.
B. Tôn trọng quyết định của bệnh nhân và tiếp tục kê đơn thuốc.
C. Từ chối tiếp tục điều trị vì bệnh nhân không tuân theo lời khuyên.
D. Yêu cầu bệnh nhân ký một văn bản từ chối trách nhiệm.
Đáp án: B
Giải thích: Quyết định ngưng thuốc là một quyết định chung giữa bác sĩ và bệnh nhân (shared decision-making). Bác sĩ có vai trò cung cấp thông tin và lời khuyên, nhưng phải tôn trọng quyền tự chủ và các giá trị của bệnh nhân. Trong trường hợp này, việc duy trì tình trạng không có cơn là quan trọng đối với nghề nghiệp và chất lượng cuộc sống của bệnh nhân, do đó việc tiếp tục điều trị là một quyết định hoàn toàn hợp lý.

TÌNH HUỐNG LÂM SÀNG 16
Một nữ luật sư 35 tuổi, bị chứng đau nửa đầu mạn tính, được bắt đầu điều trị dự phòng bằng Topiramate. Sau 4 tuần tăng liều lên 50mg hai lần mỗi ngày, cô quay lại phòng khám và than phiền về việc "đầu óc như có sương mù". Cô gặp khó khăn trong việc tìm từ khi nói và cảm thấy khả năng tập trung tại nơi làm việc bị suy giảm đáng kể. Cô cũng báo cáo đã giảm 2 kg mà không cố ý.
Câu 1: Các triệu chứng của bệnh nhân rất có thể là do đâu?
A. Tác dụng phụ của Topiramate
B. Một cơn động kinh cục bộ không vận động
C. Trầm cảm mới khởi phát
D. Sự tiến triển của bệnh đau nửa đầu
Đáp án: A
Giải thích: Suy giảm nhận thức, đặc biệt là khó khăn trong việc tìm từ, nói chậm, và "sương mù não" (cognitive slowing), là những tác dụng phụ đã được biết rõ và tương đối phổ biến của Topiramate. Giảm cân cũng là một tác dụng phụ thường gặp của thuốc này.
Tại sao các lựa chọn khác lại sai: Cơn động kinh cục bộ không vận động (ví dụ cơn vắng) thường ngắn hơn và rời rạc, không gây ra tình trạng suy giảm nhận thức kéo dài. Mặc dù trầm cảm có thể gây ra các triệu chứng nhận thức, sự khởi đầu trùng hợp với việc bắt đầu dùng Topiramate và các triệu chứng ngôn ngữ đặc hiệu làm cho tác dụng phụ của thuốc là nguyên nhân có khả năng nhất. Đau nửa đầu không thường gây ra các triệu chứng này.
Câu 2: Ngoài các tác dụng phụ về nhận thức, bệnh nhân dùng Topiramate lâu dài có nguy cơ phát triển bệnh lý nào sau đây?
A. Tăng huyết áp
B. Sỏi thận 
C. Tăng cân
D. Loãng xương
Đáp án: B
Giải thích: Topiramate là một chất ức chế carbonic anhydrase yếu. Cơ chế này có thể dẫn đến toan chuyển hóa và giảm bài tiết citrate trong nước tiểu, làm tăng nguy cơ hình thành sỏi thận chứa canxi3. Bệnh nhân cần được tư vấn uống nhiều nước để giảm nguy cơ này.
Tại sao các lựa chọn khác lại sai: Topiramate không gây tăng huyết áp. Nó gây giảm cân, không phải tăng cân. Loãng xương là một nguy cơ liên quan nhiều hơn đến các ASM cảm ứng men gan lâu dài (ví dụ: Phenytoin, Carbamazepine).
Câu 3: Nếu các triệu chứng nhận thức không thể dung nạp được, một lựa chọn thay thế để dự phòng đau nửa đầu cũng có tác dụng chống động kinh là gì?
A. Phenytoin
B. Valproate
C. Ethosuximide
D. Carbamazepine
Đáp án: B
Giải thích: Valproate là một loại thuốc được FDA chấp thuận cho cả điều trị động kinh và dự phòng đau nửa đầu. Nó là một lựa chọn thay thế hiệu quả cho Topiramate, mặc dù nó có hồ sơ tác dụng phụ riêng (tăng cân, rụng tóc, nguy cơ quái thai).
Tại sao các lựa chọn khác lại sai: Phenytoin và Carbamazepine không phải là lựa chọn hàng đầu cho dự phòng đau nửa đầu. Ethosuximide không có hiệu quả cho đau nửa đầu hoặc động kinh cục bộ/toàn thể co cứng-co giật.
Câu 4: Cơ chế tác dụng chính của Topiramate bao gồm những gì?
A. Chỉ ức chế kênh canxi loại T
B. Tăng cường hoạt động của thụ thể NMDA
C. Chẹn kênh natri và tăng cường hoạt động GABA
D. Chỉ gắn kết với protein SV2A
Đáp án: C
Giải thích: Topiramate có nhiều cơ chế tác dụng, làm cho nó trở thành một ASM phổ rộng. Các cơ chế chính bao gồm chẹn các kênh natri phụ thuộc điện thế, tăng cường hoạt động của chất dẫn truyền thần kinh ức chế GABA tại các thụ thể GABA-A, và đối kháng hoạt động của glutamate tại các thụ thể AMPA/kainate.
Tại sao các lựa chọn khác lại sai: Ức chế kênh canxi loại T là cơ chế của Ethosuximide. Tăng cường NMDA sẽ gây co giật, không phải chống co giật. Gắn kết với SV2A là cơ chế của Levetiracetam.

TÌNH HUỐNG LÂM SÀNG 17
Một bé trai 5 tuổi được đưa đến khám vì có nhiều loại co giật khác nhau và chậm phát triển tâm thần vận động. Mẹ bé báo cáo rằng bé có những cơn "gật đầu" ngắn (cơn co cứng), những cơn đột ngột mềm nhũn và ngã (cơn mất trương lực), và những giai đoạn nhìn chằm chằm (cơn vắng ý thức không điển hình). Bé cũng có những cơn co cứng-co giật về đêm. EEG cho thấy hoạt động nền chậm và các phức hợp gai-sóng chậm lan tỏa, tần số < 2.5 Hz.
Câu 1: Bệnh cảnh này phù hợp nhất với hội chứng động kinh nào?
A. Động kinh giật cơ tuổi vị thành niên (JME)
B. Động kinh vắng ý thức ở trẻ em (CAE)
C. Hội chứng Lennox-Gastaut (LGS)
D. Động kinh Rolando lành tính
Đáp án: C
Giải thích: Bộ ba kinh điển của hội chứng Lennox-Gastaut (LGS) bao gồm: (1) nhiều loại co giật, đặc biệt là cơn co cứng và mất trương lực; (2) suy giảm nhận thức hoặc chậm phát triển; và (3) một mẫu EEG đặc trưng với các phức hợp gai-sóng chậm lan tỏa (< 3 Hz)555. Bệnh cảnh của bệnh nhân này hoàn toàn phù hợp với bộ ba này. LGS là một bệnh não động kinh nặng và thường kháng thuốc.
Tại sao các lựa chọn khác lại sai: JME và CAE là các hội chứng động kinh toàn thể nguyên phát có tiên lượng tốt hơn nhiều và không có nhiều loại cơn như vậy. Động kinh Rolando lành tính là một hội chứng cục bộ với các cơn co giật mặt-họng và thường tự khỏi.
Câu 2: Thuốc nào sau đây thường được sử dụng trong phác đồ điều trị LGS?
A. Valproate
B. Ethosuximide
C. Oxcarbazepine
D. Pregabalin
Đáp án: A
Giải thích: Valproate là một ASM phổ rộng, có hiệu quả đối với nhiều loại cơn gặp trong LGS (co cứng, mất trương lực, vắng ý thức không điển hình) và thường là một phần của phác đồ điều trị ban đầu. Các loại thuốc khác được chấp thuận cho LGS bao gồm Clobazam, Lamotrigine, Topiramate, Rufinamide, và Cannabidiol.
Tại sao các lựa chọn khác lại sai: Ethosuximide chỉ có tác dụng với cơn vắng điển hình. Oxcarbazepine và Pregabalin là các thuốc phổ hẹp dùng cho động kinh cục bộ và có thể làm nặng thêm các cơn trong LGS.
Câu 3: Tiên lượng lâu dài cho trẻ em mắc hội chứng Lennox-Gastaut là gì?
A. Hầu hết sẽ hết cơn và phát triển bình thường khi đến tuổi trưởng thành.
B. Tỷ lệ tử vong cao và các cơn co giật thường kháng trị suốt đời.
C. Các cơn co giật thường được kiểm soát dễ dàng bằng đơn trị liệu.
D. Trí tuệ thường được bảo tồn nhưng các vấn đề về vận động rất phổ biến.
Đáp án: B
Giải thích: LGS có tiên lượng xấu. Các cơn co giật thường rất khó kiểm soát và kháng với nhiều loại thuốc (động kinh kháng thuốc)6. Hầu hết bệnh nhân tiếp tục bị co giật đến tuổi trưởng thành và có suy giảm nhận thức và các vấn đề hành vi nghiêm trọng. Tỷ lệ tử vong tăng lên do các tai nạn liên quan đến co giật và các bệnh đi kèm.
Tại sao các lựa chọn khác lại sai: Tiên lượng hoàn toàn ngược lại với các lựa chọn A và C. Suy giảm trí tuệ là một đặc điểm cốt lõi của hội chứng này, không chỉ có vấn đề vận động.
Câu 4: Một trong những loại cơn đặc trưng và gây nguy hiểm nhất trong LGS là cơn co cứng (tonic seizure), đặc biệt khi xảy ra về đêm. Biến chứng chính của những cơn này là gì?
A. Gây ra các ảo giác thị giác
B. Dẫn đến suy giảm trí nhớ lời nói
C. Gây ra các cơn ngã đột ngột và chấn thương
D. Kích hoạt các cơn đau nửa đầu
Đáp án: C
Giải thích: Các cơn co cứng và mất trương lực trong LGS gây ra mất trương lực tư thế đột ngột, dẫn đến các cơn ngã đột ngột ("drop attacks"). Những cú ngã này có thể gây ra chấn thương nghiêm trọng ở đầu và mặt, đó là lý do tại sao nhiều bệnh nhân LGS phải đội mũ bảo hiểm.
Tại sao các lựa chọn khác lại sai: Các lựa chọn khác không phải là biến chứng trực tiếp của cơn co cứng hoặc mất trương lực.

TÌNH HUỐNG LÂM SÀNG 18
Bố mẹ của một thanh niên 22 tuổi bị động kinh kháng thuốc đến gặp bác sĩ để thảo luận về những lo ngại của họ. Con trai họ bị động kinh toàn thể co cứng-co giật từ nhỏ, thường xảy ra về đêm và không được kiểm soát hoàn toàn mặc dù đã thử ba loại thuốc khác nhau. Họ đã đọc trên mạng về "SUDEP" và rất lo lắng.
Câu 1: SUDEP được định nghĩa là gì?
A. Trạng thái động kinh gây tử vong
B. Tử vong do tai nạn trong khi co giật (ví dụ: ngã, đuối nước)
C. Cái chết đột ngột, không giải thích được ở bệnh nhân động kinh, không phải do chấn thương hay đuối nước
D. Tự tử ở bệnh nhân động kinh bị trầm cảm
Đáp án: C
Giải thích: SUDEP (Sudden Unexpected Death in Epilepsy) được định nghĩa là cái chết đột ngột, bất ngờ, có hoặc không có nhân chứng, không do chấn thương hoặc đuối nước, ở một người bị động kinh, có hoặc không có bằng chứng về một cơn co giật gần đây, và khám nghiệm tử thi không tìm thấy nguyên nhân giải phẫu hoặc độc chất gây tử vong.
Tại sao các lựa chọn khác lại sai: Các lựa chọn khác là các nguyên nhân gây tử vong khác có thể xảy ra ở bệnh nhân động kinh nhưng không phù hợp với định nghĩa cụ thể của SUDEP.
Câu 2: Yếu tố nguy cơ lớn nhất và có thể thay đổi được đối với SUDEP là gì?
A. Tần suất của các cơn động kinh cục bộ phức tạp
B. Sự hiện diện của các phóng điện kịch phát giữa cơn trên EEG
C. Tần suất của các cơn co cứng-co giật toàn thể (GTCS) không được kiểm soát
D. Bệnh nhân là nam giới
Đáp án: C
Giải thích: Yếu tố nguy cơ mạnh nhất và nhất quán nhất đối với SUDEP là sự hiện diện và tần suất của các cơn co cứng-co giật toàn thể, đặc biệt là khi chúng không được kiểm soát. Mỗi cơn GTCS đều làm tăng nguy cơ. Do đó, mục tiêu chính trong việc phòng ngừa SUDEP là đạt được sự kiểm soát tốt nhất có thể đối với các cơn GTCS.
Tại sao các lựa chọn khác lại sai: Các loại cơn khác có nguy cơ thấp hơn nhiều. Bất thường trên EEG giữa cơn không phải là một yếu tố nguy cơ chính. Giới tính nam có thể là một yếu tố nguy cơ nhỏ, nhưng tần suất GTCS quan trọng hơn nhiều và là yếu tố có thể can thiệp được.
Câu 3: Lời khuyên nào sau đây là phù hợp nhất để giảm nguy cơ SUDEP cho bệnh nhân này?
A. Đảm bảo tuân thủ điều trị thuốc nghiêm ngặt để tối ưu hóa việc kiểm soát cơn.
B. Bệnh nhân nên ngủ ở tư thế nằm sấp.
C. Ngừng tất cả các loại thuốc chống động kinh để tránh tác dụng phụ lên tim.
D. Tránh hoàn toàn các hoạt động thể chất.
Đáp án: A
Giải thích: Vì các cơn GTCS không được kiểm soát là yếu tố nguy cơ chính, chiến lược quan trọng nhất để giảm nguy cơ SUDEP là tối ưu hóa việc kiểm soát cơn. Điều này bao gồm việc tuân thủ nghiêm ngặt lịch dùng thuốc, tránh các yếu tố khởi phát cơn (như thiếu ngủ), và xem xét các lựa chọn điều trị khác (ví dụ: phẫu thuật, VNS) nếu thuốc không hiệu quả.
Tại sao các lựa chọn khác lại sai: Ngủ ở tư thế nằm sấp có thể làm tăng nguy cơ SUDEP. Ngừng thuốc sẽ làm tăng tần suất cơn và nguy cơ SUDEP. Hoạt động thể chất thường không bị cấm và có thể có lợi cho sức khỏe tổng thể.
Câu 4: Cơ chế sinh lý bệnh được cho là có khả năng nhất gây ra SUDEP là gì?
A. Suy hô hấp và tim mạch sau cơn 
B. Tắc mạch phổi do huyết khối
C. Vỡ phình động mạch não
D. Rối loạn điện giải cấp tính
Đáp án: A
Giải thích: Mặc dù cơ chế chính xác chưa được hiểu đầy đủ, bằng chứng hiện tại cho thấy SUDEP rất có thể là kết quả của một chuỗi các sự kiện sau cơn GTCS, bao gồm ức chế hô hấp trung ương nghiêm trọng (ngừng thở sau cơn), rối loạn chức năng tim (rối loạn nhịp, vô tâm thu), và suy giảm chức năng hệ thần kinh tự chủ, dẫn đến ngừng tim-phổi không hồi phục.
Tại sao các lựa chọn khác lại sai: Các lựa chọn khác không phải là cơ chế được giả thuyết chính cho SUDEP, mặc dù chúng có thể là nguyên nhân tử vong ở bệnh nhân động kinh trong các bối cảnh khác.

TÌNH HUỐNG LÂM SÀNG 19
Một người đàn ông 30 tuổi, thuận tay phải, mô tả các cơn ngắn, lặp đi lặp lại bắt đầu bằng việc nhìn thấy "các chấm sáng nhiều màu sắc" ở phía bên trái của tầm nhìn. Các chấm sáng này kéo dài khoảng 20-30 giây, sau đó anh ta có thể bị co giật ở mặt và tay bên trái, và đôi khi mất ý thức. Anh không có tiền sử đau nửa đầu. MRI sọ não cho thấy một dị dạng động tĩnh mạch (AVM) nhỏ ở thùy chẩm phải.
Câu 1: Các triệu chứng thị giác ban đầu của bệnh nhân (aura thị giác) gợi ý ổ động kinh khởi phát ở đâu?
A. Thùy thái dương
B. Thùy trán
C. Thùy đỉnh
D. Thùy chẩm
Đáp án: D
Giải thích: Các ảo giác thị giác đơn giản, không có hình dạng (unformed visual hallucinations) như các chấm sáng, tia chớp, hoặc các hình dạng hình học nhiều màu sắc, là đặc trưng của các cơn động kinh khởi phát từ vỏ não thị giác sơ cấp ở thùy chẩm. Việc các triệu chứng xuất hiện ở thị trường bên trái chỉ ra rằng ổ động kinh nằm ở bán cầu não phải.
Tại sao các lựa chọn khác lại sai: Động kinh thùy thái dương có thể gây ảo giác thị giác phức tạp (ví dụ: khuôn mặt, cảnh vật). Động kinh thùy trán và thùy đỉnh thường có các triệu chứng vận động và cảm giác tương ứng.
Câu 2: Sự lan truyền của các triệu chứng (từ thị giác đến co giật vận động) cho thấy điều gì về sự lan truyền của hoạt động động kinh?
A. Lan truyền từ thùy chẩm ra phía sau đến tiểu não
B. Lan truyền từ thùy chẩm ra phía trước đến các vùng vận động của thùy trán và đỉnh
C. Lan truyền qua thể chai sang thùy chẩm đối diện
D. Vẫn khu trú hoàn toàn trong thùy chẩm
Đáp án: B
Giải thích: Triệu chứng học của một cơn động kinh tiến triển theo thời gian phản ánh sự lan truyền của hoạt động điện não qua các mạng lưới thần kinh. Cơn bắt đầu ở thùy chẩm (gây triệu chứng thị giác), sau đó lan ra phía trước đến vỏ não cảm giác-vận động ở thùy đỉnh và trán (gây co giật ở mặt và tay bên đối diện).
Tại sao các lựa chọn khác lại sai: Lan truyền đến tiểu não không gây ra co giật. Lan truyền sang bán cầu đối diện sẽ gây ra các triệu chứng ở cả hai bên. Nếu cơn khu trú ở thùy chẩm, sẽ không có các triệu chứng vận động.
Câu 3: Ngoài động kinh, chẩn đoán phân biệt quan trọng nhất cho các triệu chứng thị giác đơn giản là gì?
A. Migraine có aura
B. Bong võng mạc
C. Cơn thiếu máu não thoáng qua (TIA) ở vùng tuần hoàn sau
D. Tăng nhãn áp góc đóng cấp
Đáp án: A
Giải thích: Migraine có aura thị giác là chẩn đoán phân biệt quan trọng nhất. Tuy nhiên, aura thị giác của migraine thường phát triển chậm hơn (trong vài phút) và kéo dài lâu hơn (20-60 phút), thường có dạng "scintillating scotoma" (vùng mất thị lực có viền lấp lánh), và thường theo sau là đau đầu. Aura động kinh thường rất ngắn (vài giây đến <2 phút) và có xu hướng là các hình ảnh màu sắc, tròn.
Tại sao các lựa chọn khác lại sai: Bong võng mạc gây ra "màn che" thị lực. TIA thường gây ra các triệu chứng âm tính (mất thị lực) hơn là các triệu chứng dương tính (chớp sáng). Tăng nhãn áp gây đau mắt, nhìn mờ, và thấy quầng sáng.
Câu 4: Hướng xử trí tối ưu cho bệnh nhân này là gì?
A. Chỉ điều trị bằng thuốc chống động kinh
B. Chỉ xạ phẫu cho AVM
C. Xem xét điều trị AVM (phẫu thuật, xạ phẫu, hoặc nút mạch) và điều trị bằng thuốc chống động kinh
D. Theo dõi và chờ đợi vì AVM có thể tự thoái triển
Đáp án: C
Giải thích: Bệnh nhân này bị động kinh triệu chứng do một AVM. Việc xử trí bao gồm hai phần: kiểm soát các cơn co giật bằng thuốc chống động kinh (ASM) và xem xét điều trị tổn thương nền là AVM để giảm nguy cơ xuất huyết và có thể cải thiện việc kiểm soát cơn co giật. Quyết định điều trị AVM cần được đưa ra bởi một đội ngũ đa chuyên khoa (thần kinh, phẫu thuật thần kinh, can thiệp nội mạch).
Tại sao các lựa chọn khác lại sai: Chỉ điều trị ASM không giải quyết được nguy cơ xuất huyết từ AVM. Chỉ điều trị AVM có thể không kiểm soát được hoàn toàn các cơn co giật, đặc biệt là trong giai đoạn đầu. AVM không tự thoái triển và có nguy cơ xuất huyết đáng kể.

TÌNH HUỐNG LÂM SÀNG 20
Một bé gái 8 tuổi bị động kinh kháng thuốc đang được điều trị bằng Valproate. Do các cơn co giật vẫn chưa được kiểm soát, bác sĩ quyết định thêm Lamotrigine vào phác đồ điều trị. Bác sĩ hướng dẫn mẹ bé bắt đầu Lamotrigine với liều 25mg mỗi ngày.
Câu 1: Tại sao cần phải bắt đầu Lamotrigine với liều rất thấp và tăng liều rất chậm khi dùng chung với Valproate?
A. Valproate làm giảm nồng độ Lamotrigine, làm thuốc không hiệu quả.
B. Valproate ức chế sự chuyển hóa của Lamotrigine, làm tăng nồng độ và nguy cơ phát ban nghiêm trọng.
C. Lamotrigine làm tăng nồng độ Valproate, gây ngộ độc gan.
D. Cả hai thuốc đều cạnh tranh gắn kết với protein huyết tương, làm giảm hiệu quả.
Đáp án: B
Giải thích: Valproate là một chất ức chế men gan, đặc biệt là các enzyme UGT chịu trách nhiệm cho quá trình glucuronide hóa, con đường chuyển hóa chính của Lamotrigine. Bằng cách ức chế sự chuyển hóa này, Valproate có thể làm tăng gấp đôi nồng độ và thời gian bán hủy của Lamotrigine, làm tăng đáng kể nguy cơ phát ban đe dọa tính mạng như SJS/TEN.
Tại sao các lựa chọn khác lại sai: Valproate làm tăng, không phải giảm, nồng độ Lamotrigine. Lamotrigine không ảnh hưởng đáng kể đến nồng độ Valproate. Tương tác gắn kết protein không phải là cơ chế chính ở đây.
Câu 2: Khi dùng Lamotrigine phối hợp với Valproate, liều khởi đầu và kế hoạch tăng liều của Lamotrigine nên như thế nào so với khi dùng đơn trị liệu?
A. Giống hệt như đơn trị liệu
B. Cao hơn so với đơn trị liệu
C. Thấp hơn và chậm hơn đáng kể so với đơn trị liệu
D. Bắt đầu với liều cao và giảm dần
Đáp án: C
Giải thích: Do tương tác dược động học, khi phối hợp Lamotrigine với Valproate, liều khởi đầu của Lamotrigine phải được giảm đi một nửa (ví dụ: 12.5mg mỗi ngày hoặc cách ngày) và tốc độ tăng liều cũng phải chậm hơn nhiều so với phác đồ chuẩn để giảm thiểu nguy cơ phát ban.
Tại sao các lựa chọn khác lại sai: Sử dụng liều như đơn trị liệu hoặc cao hơn sẽ rất nguy hiểm. Bắt đầu liều cao và giảm dần không phải là nguyên tắc khi khởi trị ASM.
Câu 3: Giả sử một bệnh nhân khác đang dùng Lamotrigine và bác sĩ muốn thêm vào Carbamazepine. Tương tác dược động học dự kiến sẽ như thế nào?
A. Carbamazepine sẽ làm tăng nồng độ Lamotrigine.
B. Carbamazepine sẽ làm giảm nồng độ Lamotrigine.
C. Lamotrigine sẽ làm tăng nồng độ Carbamazepine.
D. Không có tương tác đáng kể.
Đáp án: B
Giải thích: Ngược lại với Valproate, Carbamazepine là một chất cảm ứng men gan. Nó sẽ làm tăng tốc độ chuyển hóa của Lamotrigine (qua con đường UGT), dẫn đến giảm nồng độ Lamotrigine trong huyết tương. Điều này có thể làm giảm hiệu quả của Lamotrigine và đòi hỏi phải tăng liều Lamotrigine để duy trì tác dụng.
Tại sao các lựa chọn khác lại sai: Carbamazepine là chất cảm ứng, không phải ức chế, do đó nó làm giảm, không phải tăng nồng độ Lamotrigine. Các tương tác khác không đáng kể.
Câu 4: Tác dụng phụ nào sau đây là mối lo ngại chung khi sử dụng cả Valproate và Lamotrigine, mặc dù cơ chế có thể khác nhau?
A. Loãng xương
B. Sỏi thận
C. Run 
D. Giảm cân
Đáp án: C
Giải thích: Run là một tác dụng phụ thần kinh có thể gặp ở cả hai loại thuốc. Đối với Valproate, run thường liên quan đến liều lượng. Đối với Lamotrigine, run cũng là một tác dụng phụ đã được báo cáo. Khi phối hợp, tác dụng này có thể trở nên rõ rệt hơn.
Tại sao các lựa chọn khác lại sai: Loãng xương thường liên quan đến các thuốc cảm ứng men gan. Sỏi thận là đặc trưng của Topiramate. Valproate gây tăng cân, trong khi Lamotrigine thường trung tính về cân nặng.

TÌNH HUỐNG LÂM SÀNG 21
Một cậu bé 8 tuổi được đưa đến phòng khám vì mẹ bé báo cáo rằng cậu bé đã có hai lần bị thức giấc vào ban đêm. Cả hai lần, cậu bé đều tỉnh táo nhưng không thể nói được, và mẹ bé nhận thấy mặt bên phải của cậu bé co giật và chảy nhiều nước dãi. Các cơn này kéo dài khoảng 2 phút và tự hết. Cậu bé có sự phát triển và trí tuệ hoàn toàn bình thường. Khám thần kinh không ghi nhận bất thường. EEG trong lúc ngủ cho thấy các gai nhọn-sóng chậm ở vùng trung tâm-thái dương bên trái.
Câu 1: Hội chứng động kinh nào phù hợp nhất với bệnh cảnh này?
A. Hội chứng Lennox-Gastaut
B. Động kinh thùy thái dương
C. Động kinh vắng ý thức ở trẻ em
D. Động kinh Rolando lành tính 
Đáp án: D
Giải thích: Động kinh Rolando lành tính, hay động kinh cục bộ lành tính ở trẻ em có gai nhọn vùng trung tâm-thái dương, được đặc trưng bởi các cơn cục bộ vận động và cảm giác ảnh hưởng đến vùng mặt-hầu họng (co giật một bên mặt, rối loạn ngôn ngữ, tăng tiết nước bọt), thường xảy ra về đêm hoặc khi mới thức giấc. EEG có các gai nhọn đặc trưng ở vùng trung tâm-thái dương. Bệnh có tiên lượng rất tốt và thường tự khỏi ở tuổi vị thành niên.
Tại sao các lựa chọn khác lại sai: Hội chứng Lennox-Gastaut là một bệnh não động kinh nặng với nhiều loại cơn và suy giảm nhận thức. Động kinh thùy thái dương thường có các động tác tự động và aura phức tạp hơn. Động kinh vắng ý thức là cơn toàn thể với biểu hiện nhìn chằm chằm.
Câu 2: Hướng xử trí nào là phù hợp nhất cho bệnh nhân này?
A. Bắt đầu ngay lập tức điều trị bằng phác đồ hai loại thuốc chống động kinh.
B. Thảo luận với gia đình về việc bắt đầu đơn trị liệu bằng một ASM như Levetiracetam hoặc Oxcarbazepine, cân nhắc giữa lợi ích và nguy cơ.
C. Lên kế hoạch phẫu thuật động kinh để cắt bỏ vùng sinh động kinh.
D. Yêu cầu bệnh nhân đội mũ bảo hiểm 24/7 để phòng ngừa chấn thương.
Đáp án: B
Giải thích: Mặc dù hội chứng này là "lành tính" và sẽ tự khỏi, quyết định điều trị phụ thuộc vào tần suất và mức độ nặng của cơn, cũng như sự lo lắng của gia đình. Các cơn thường không thường xuyên. Nếu quyết định điều trị, đơn trị liệu với một ASM có hiệu quả cho động kinh cục bộ (như Levetiracetam, Oxcarbazepine, Sulthiame) thường được lựa chọn. Việc điều trị không phải lúc nào cũng cần thiết nếu cơn hiếm.
Tại sao các lựa chọn khác lại sai: Đa trị liệu là không cần thiết. Phẫu thuật không được chỉ định cho một hội chứng lành tính, tự giới hạn. Mũ bảo hiểm không cần thiết vì các cơn không gây ngã.
Câu 3: Tiên lượng cho khả năng nhận thức và học tập của trẻ mắc hội chứng này là gì?
A. Hầu hết trẻ sẽ bị suy giảm nhận thức nghiêm trọng.
B. Hầu hết trẻ có sự phát triển nhận thức hoàn toàn bình thường.
C. Một số trẻ có thể gặp khó khăn nhẹ trong học tập, đặc biệt về ngôn ngữ hoặc chú ý.
D. Tất cả trẻ em đều sẽ cần giáo dục đặc biệt.
Đáp án: C
Giải thích: Mặc dù hầu hết trẻ em có trí tuệ bình thường, một số nghiên cứu đã chỉ ra rằng trẻ mắc động kinh Rolando lành tính có thể có nguy cơ cao hơn một chút về các vấn đề học tập và hành vi, chẳng hạn như khó khăn về đọc, ngôn ngữ, hoặc rối loạn tăng động giảm chú ý. Tuy nhiên, những vấn đề này thường nhẹ và không ảnh hưởng đến tiên lượng tổng thể.
Tại sao các lựa chọn khác lại sai: Suy giảm nhận thức nghiêm trọng là không điển hình. Mặc dù nhiều trẻ hoàn toàn bình thường, việc bỏ qua khả năng có các vấn đề học tập nhẹ là không đầy đủ. Không phải tất cả trẻ đều cần giáo dục đặc biệt.
Câu 4: EEG của bệnh nhân cho thấy các gai nhọn ở vùng trung tâm-thái dương trái. Các triệu chứng lâm sàng (co giật mặt phải) nằm ở bên nào của cơ thể?
A. Bên phải (đối bên với bất thường EEG)
B. Bên trái (cùng bên với bất thường EEG)
C. Cả hai bên
D. Không liên quan đến bên của bất thường EEG
Đáp án: A
Giải thích: Vỏ não vận động và cảm giác ở mỗi bán cầu não chi phối cho nửa người đối diện. Do đó, một ổ động kinh ở vùng trung tâm-thái dương (Rolandic) bên trái sẽ gây ra các triệu chứng vận động và cảm giác ở nửa người bên phải. Đây là một nguyên tắc cơ bản trong định khu thần kinh.

TÌNH HUỐNG LÂM SÀNG 22
Một cụ ông 78 tuổi, có tiền sử tăng huyết áp đang điều trị bằng Hydrochlorothiazide, được chẩn đoán động kinh cục bộ phức tạp 1 tháng trước và bắt đầu dùng Oxcarbazepine. Ông được đưa đến cấp cứu vì tình trạng lú lẫn và buồn nôn ngày càng tăng trong tuần qua. Xét nghiệm điện giải đồ cho thấy Natri máu là 122 mmol/L. Các xét nghiệm khác trong giới hạn bình thường.
Câu 1: Nguyên nhân có khả năng nhất gây hạ natri máu ở bệnh nhân này là gì?
A. Tác dụng phụ của Hydrochlorothiazide
B. Tác dụng phụ của Oxcarbazepine
C. Sự kết hợp của cả Hydrochlorothiazide và Oxcarbazepine
D. Hội chứng tiết hormone chống bài niệu không thích hợp (SIADH) do một khối u ẩn
Đáp án: C
Giải thích: Cả Oxcarbazepine và thuốc lợi tiểu thiazide đều là những nguyên nhân đã được biết rõ gây hạ natri máu. Oxcarbazepine gây ra tình trạng tương tự SIADH3. Khi sử dụng đồng thời, nguy cơ hạ natri máu nghiêm trọng trên lâm sàng tăng lên đáng kể4. Tuổi cao cũng là một yếu tố nguy cơ5.
Tại sao các lựa chọn khác lại sai: Mặc dù mỗi loại thuốc riêng lẻ đều có thể là nguyên nhân, sự kết hợp của chúng làm cho nguy cơ cao hơn nhiều và là lời giải thích toàn diện nhất. SIADH do u ẩn ít có khả năng xảy ra hơn so với tác dụng phụ của thuốc trong trường hợp này.
Câu 2: Bước xử trí ban đầu phù hợp nhất là gì?
A. Truyền tĩnh mạch dung dịch muối ưu trương 3%
B. Hạn chế dịch và tạm ngưng cả hai loại thuốc
C. Bắt đầu điều trị bằng Demeclocycline
D. Tiếp tục các thuốc hiện tại và theo dõi natri máu
Đáp án: B
